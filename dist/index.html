  if (isTuple(val)) return val[0];\\n     return val;\\n};\\n\\nconst getListData = (obj, path, def) => {\\n    const raw = getRaw(obj, path, def);\\n    \\n    // 1. Explicit Schema Override: If user marked as Collection (Record), force it to be a List.\\n    // Schema paths start with '.', so we check both 'path' and '.path'\\n    if (COLLECTION_PATHS.has(path) || COLLECTION_PATHS.has('.' + path)) {\\n        return raw;\\n    }\\n\\n    // 2. Strict Mode: No Heuristics. \\n    // If it's a tuple [List, Label], we return it as-is.\\n    // User must target 'path.0' or use Schema to control structure.\\n    return raw;\\n};\\n\\nconst getL = (obj, path, def) => {\\n    const val = getRaw(obj, path, def);\\n    if (isTuple(val)) return val[1];\\n    return def; \\n};\\n\\nconst formatValue = (val) => {\\n    if (val === null || val === undefined) return LOCALE.empty_none;\\n    if (isTuple(val)) return formatValue(tupleVal(val));\\n    if (Array.isArray(val)) return JSON.stringify(val);\\n    if (typeof val === 'object') {\\n        if (val.Desc !== undefined) return formatValue(val.Desc);\\n        if (val.description !== undefined) return formatValue(val.description);\\n        if (val.name !== undefined) return formatValue(val.name);\\n        return null; \\n    }\\n    return val;\\n};\\n\\nconst tupleLabel = (v, fallback) => isTuple(v) ? (v[1] || fallback) : fallback;\\n\\nconst setVal = (obj, path, newVal) => {\\n    const raw = getRaw(obj, path);\\n    if (isTuple(raw)) {\\n        if (_ && _.set) _.set(obj, path, [newVal, raw[1]]);\\n        else {\\n            const parts = path.split('.');\\n            let cur = obj;\\n            for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];\\n            cur[parts[parts.length - 1]] = [newVal, raw[1]];\\n        }\\n    } else {\\n        if (_ && _.set) _.set(obj, path, newVal);\\n        else {\\n            const parts = path.split('.');\\n            let cur = obj;\\n            for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];\\n            cur[parts[parts.length - 1]] = newVal;\\n        }\\n    }\\n};\\n\\n        /**\\n * Global Recalculation Hook\\n * This function is called whenever an item is equipped or unequipped.\\n * Use it to calculate derived stats (HP, MP, Attack, etc) based on base attributes.\\n */\\nwindow.recalculateDerivedStats = function(charObj) {\\n    if (!charObj) return;\\n    console.log(\\"Recalculating stats for:\\", charObj.Name);\\n\\n    // Default Example logic (Antigravity System)\\n    const Lvl = getV(charObj, 'Level', 1);\\n    const Con = getV(charObj, 'Constitution', 0);\\n    const Str = getV(charObj, 'Strength', 0);\\n    const Agi = getV(charObj, 'Agility', 0);\\n    const Int = getV(charObj, 'Intelligence', 0);\\n    const Wis = getV(charObj, 'Wisdom', 0);\\n\\n    // Flat Bonuses from Equipment\\n    let eqHP = 0, eqMP = 0, eqPAtk = 0, eqMAtk = 0, eqPDef = 0, eqMDef = 0;\\n    if (charObj.Equipment) {\\n        for (const item of Object.values(charObj.Equipment)) {\\n            if (item && typeof item === 'object') {\\n                eqHP   += Number(item.MaxHPBonus || 0);\\n                eqMP   += Number(item.MaxMPBonus || 0);\\n                eqPAtk += Number(item.WeaponDamage || 0);\\n                eqMAtk += Number(item.WeaponMagDamage || 0);\\n                eqPDef += Number(item.ArmorPDefBonus || 0);\\n                eqMDef += Number(item.ArmorMDefBonus || 0);\\n            }\\n        }\\n    }\\n\\n    const oldMaxHp = getV(charObj, 'Hp_max', 0);\\n    const oldMaxMp = getV(charObj, 'Mp_max', 0);\\n    const oldMaxSta = getV(charObj, 'Sta_max', 0);\\n\\n    // Apply Formulas\\n    const Hp_max  = Math.floor(20 + (Con * 3) + (Lvl * 6)) + eqHP;\\n    const Sta_max = Math.floor(50 + (Con * 3) + (Agi * 2) + Math.floor((Lvl * 5) / 3));\\n    const Mp_max  = Math.floor((50 + (Int * 4) + (Wis * 2) + (Lvl * 5)) / 3) + eqMP;\\n\\n    const P_Atk = Math.floor((Str * 2) + (Lvl * 2)) + eqPAtk;\\n    const M_Atk = Math.floor((Int * 2) + (Lvl * 2)) + eqMAtk;\\n    const P_Def = Math.floor((Con / 2) + (Lvl * 3)) + eqPDef;\\n    const M_Def = Math.floor((Wis / 2) + (Lvl * 3)) + eqMDef;\\n    const M_Ast = Math.floor((Wis * 1.5) + (Int * 0.5) + (Lvl * 1.5));\\n\\n    // Set Values\\n    setVal(charObj, 'Hp_max', Hp_max);\\n    setVal(charObj, 'Mp_max', Mp_max);\\n    setVal(charObj, 'Sta_max', Sta_max);\\n    setVal(charObj, 'Physical_attack', P_Atk);\\n    setVal(charObj, 'Magic_attack', M_Atk);\\n    setVal(charObj, 'Physical_defense', P_Def);\\n    setVal(charObj, 'Magic_defense', M_Def);\\n    setVal(charObj, 'Magic_assist', M_Ast);\\n\\n    // Bounds/Healing on Level Up\\n    if (oldMaxHp > 0) setVal(charObj, 'Hp_curr', Math.max(0, getV(charObj, 'Hp_curr', 0) + (Hp_max - oldMaxHp)));\\n    if (oldMaxMp > 0) setVal(charObj, 'Mp_curr', Math.max(0, getV(charObj, 'Mp_curr', 0) + (Mp_max - oldMaxMp)));\\n    if (oldMaxSta > 0) setVal(charObj, 'Sta_curr', Math.max(0, getV(charObj, 'Sta_curr', 0) + (Sta_max - oldMaxSta)));\\n\\n    // Ensure current < max\\n    if (getV(charObj, 'Hp_curr', 0) > Hp_max) setVal(charObj, 'Hp_curr', Hp_max);\\n    if (getV(charObj, 'Mp_curr', 0) > Mp_max) setVal(charObj, 'Mp_curr', Mp_max);\\n    if (getV(charObj, 'Sta_curr', 0) > Sta_max) setVal(charObj, 'Sta_curr', Sta_max);\\n};\\n\\n        \uFEFF// Helper to extract Name/Qty from various object keys (ported from Builder)\\nfunction getItemSummary(item) {\\n    if (typeof item !== 'object' || !item) return { name: String(item), qty: '' };\\n    \\n    // Heuristics for Name (dictionary key is already promoted to Name by flatten())\\n    const nameKeys = ['Name', 'name'];\\n    let name = 'Item';\\n    for (const k of nameKeys) {\\n        if (item[k]) { name = item[k]; break; }\\n    }\\n    \\n    // Heuristics for Quantity\\n    const qtyKeys = ['Qty', 'qty'];\\n    let qty = '';\\n    for (const k of qtyKeys) {\\n        if (item[k] !== undefined) { qty = String(item[k]); break; }\\n    }\\n    \\n    return { name, qty };\\n}\\n\\n// Delete List Item with confirmation\\nfunction deleteListItem(listPath, itemKey) {\\n    // console.log('[MZSMB] [deleteListItem] Path:', listPath, 'Key:', itemKey);\\n    \\n    const confirmed = confirm('Delete \\"' + itemKey + '\\"?\\\\n\\\\nAre you sure you want to delete this item?');\\n    if (!confirmed) return;\\n    \\n    // Get current stat_data from _lastStatData (which is kept in sync)\\n    if (!_lastStatData) {\\n        console.error('No stat data available');\\n        return;\\n    }\\n    \\n    // Navigate to the list in _lastStatData using the full path\\n    const parts = listPath.split('.').filter(p => p);\\n    let target = _lastStatData;\\n    for (let i = 0; i < parts.length; i++) {\\n        if (target && parts[i] && target[parts[i]] !== undefined) {\\n            target = target[parts[i]];\\n        } else {\\n            console.error('[MZSMB][deleteListItem] Navigation failed at:', parts[i], 'Full path:', listPath);\\n            return;\\n        }\\n    }\\n    \\n    console.log('[MZSMB] [deleteListItem] Target object keys:', Object.keys(target || {}));\\n    console.log('[MZSMB] [deleteListItem] Looking for itemKey:', itemKey, 'HasOwn:', target && (itemKey in target));\\n    \\n    if (target && typeof target === 'object' && itemKey in target) {\\n        delete target[itemKey];\\n        console.log('[MZSMB] [deleteListItem] Deleted successfully');\\n        \\n        // Re-render the UI\\n        updateStatusPanel({ stat_data: _lastStatData });\\n        \\n        // Save to SillyTavern\\n        saveStatData(_lastStatData);\\n    } else {\\n        console.error('[MZSMB] [deleteListItem] Item not found. Target:', target, 'Key:', itemKey);\\n        if (target && typeof target === 'object') {\\n            console.log('[MZSMB] [deleteListItem] Available keys:', Object.keys(target));\\n        }\\n    }\\n}\\n\\n// --- Pagination State ---\\nconst _listPageState = new Map(); // Store current page per container ID\\nconst _blockPageState = new Map(); // Store current page per block container\\n\\n// ============================================\\n// PAGE SIZE CONFIGURATION (Change these values as needed)\\n// ============================================\\nconst LIST_PAGE_SIZE = 5;   // For QuestList (simple/quest templates)\\nconst BLOCK_PAGE_SIZE = 5;  // For Familiar-type blocks\\n// ============================================\\n\\n// --- Merged Generic List Renderer (with Pagination) ---\\nfunction renderTemplateList(containerOrId, data, templateId, emptyText = LOCALE.empty_none, shouldFlatten = false, rootData) {\\n     const container = typeof containerOrId === 'string' ? document.getElementById(containerOrId) : containerOrId;\\n     if (!container) return;\\n     \\n     // Get container ID for pagination state\\n     const containerId = container.id || containerOrId;\\n     \\n     // Reset container style/class\\n     container.innerHTML = '';\\n     container.className = ''; \\n     container.removeAttribute('style');\\n\\n     // Handle Grid View specific styling (legacy support for existing CSS)\\n     if (templateId === 'tmpl-grid') {\\n         container.className = 'list-grid-view'; \\n     } else if (templateId === 'tmpl-inventory') {\\n         container.className = 'list-inventory-view';\\n     }\\n\\n     // 1. Prepare Items\\n     let items = [];\\n     \\n     if (!data || Object.keys(data).length === 0) {\\n         // Empty State\\n     } else {\\n         if (shouldFlatten) {\\n             // Flattening Logic (for Grid)\\n             function flatten(obj) {\\n                 let res = [];\\n                 if (!obj || typeof obj !== 'object') return res;\\n                 for (const [key, value] of Object.entries(obj)) {\\n                     if (key === '$meta' || value === null || value === undefined) continue;\\n                     const unwrapped = isTuple(value) ? tupleVal(value) : value;\\n                     if (unwrapped === null || unwrapped === undefined) continue;\\n                     \\n                     if (typeof unwrapped === 'object' && !Array.isArray(unwrapped)) {\\n                         // Use dictionary key as Name when item lacks its own Name/name\\n                         const hasName = unwrapped.Name || unwrapped.name ;\\n                         // Dictionary key MUST be the source of truth for $key (place it last so it overwrites any $key in unwrapped)\\n                         res.push({ ...(!hasName ? { Name: key } : {}), ...unwrapped, $key: key });\\n                     } else {\\n                         res.push({ name: isTuple(value) ? tupleLabel(value, key) : key, quantity: unwrapped });\\n                     }\\n                 }\\n                 return res;\\n             }\\n             items = flatten(data);\\n         } else {\\n             // Direct mapping (for Simple/Quest)\\n             for (const [key, raw] of Object.entries(data)) {\\n                 if (key === '$meta' || key === 'template') continue;\\n                 items.push({ $key: key, $raw: raw });\\n             }\\n         }\\n     }\\n\\n     if (items.length === 0) { \\n         container.innerHTML = '<div style=\\"text-align:center; color:var(--text-secondary); padding:10px;\\">' + emptyText + '</div>';\\n         if (templateId === 'tmpl-grid' || templateId === 'tmpl-inventory') {\\n              container.innerHTML = '<div style=\\"grid-column:1/-1; text-align:center; color:var(--text-secondary);\\">' + emptyText + '</div>'; \\n         }\\n         return; \\n     }\\n     \\n     const tmpl = document.getElementById(templateId);\\n     if (!tmpl) {\\n         console.error('[MZSMB] Template not found:', templateId);\\n         return;\\n     }\\n\\n     // --- Pagination Logic (skip for Grid) ---\\n     const totalItems = items.length;\\n     const totalPages = Math.ceil(totalItems / LIST_PAGE_SIZE);\\n     const isGrid = templateId === 'tmpl-grid' || templateId === 'tmpl-inventory';\\n     const needsPagination = !isGrid && totalItems > LIST_PAGE_SIZE;\\n     \\n     // Get or initialize current page\\n     let currentPage = _listPageState.get(containerId) || 0;\\n     // Clamp to valid range\\n     if (currentPage >= totalPages) currentPage = totalPages - 1;\\n     if (currentPage < 0) currentPage = 0;\\n     _listPageState.set(containerId, currentPage);\\n     \\n     // Calculate visible items (only slice if pagination is needed)\\n     let visibleItems;\\n     if (needsPagination) {\\n         const startIdx = currentPage * LIST_PAGE_SIZE;\\n         const endIdx = Math.min(startIdx + LIST_PAGE_SIZE, totalItems);\\n         visibleItems = items.slice(startIdx, endIdx);\\n     } else {\\n         visibleItems = items; // Show all items (e.g., for Grid)\\n     }\\n\\n     // --- Render Function for Items ---\\n     const renderItems = (itemsToRender) => {\\n          const listPath = container.getAttribute('data-bind-list-fullpath') || container.getAttribute('data-bind-list') || '';\\n          const isQuestSource = listPath.includes('Quests') || listPath.includes('quest');\\n         itemsToRender.forEach(item => {\\n             let lastUpdated = ''; let title = '', desc = '', qty = '', difficulty = '', reward = '', status = '';\\n             \\n             // Extraction Logic\\n             if (shouldFlatten) {\\n                  // Item is an object from flatten()\\n                  const summary = getItemSummary(item);\\n                  title = summary.name; // Use name as title\\n                  // qty\\n                  let qVal = Number(summary.qty);\\n                  if (!isNaN(qVal) && qVal >= 1) qty = 'x' + qVal;\\n                  \\n                  // Try to find other fields if they exist in the flattened object\\n                  // (desc intentionally omitted: grid/inventory only shows $key)\\n                  if (item.Difficulty !== undefined) difficulty = String(formatValue(item.Difficulty));\\n                  else if (item.difficulty !== undefined) difficulty = String(formatValue(item.difficulty));\\n                  if (item.Reward !== undefined) reward = String(formatValue(item.Reward));\\n                  else if (item.reward !== undefined) reward = String(formatValue(item.reward));\\n\\n             } else {\\n                  // Item is { $key, $raw }\\n                  const key = item.$key;\\n                  const raw = item.$raw;\\n                  \\n                  title = key;\\n\\n                  if (isTuple(raw)) {\\n                      title = tupleLabel(raw, key);\\n                      desc = String(formatValue(tupleVal(raw)));\\n                  } else {\\n                      // Array/Object handling\\n                      if (Array.isArray(data)) { // Check original data is array?\\n                          // Simplification: In loop of Object.entries(data), if data is array, key is index.\\n                          // But we want value as title if primitive.\\n                          if (raw && typeof raw !== 'object') {\\n                              title = String(raw);\\n                          }\\n                      }\\n\\n                      if (raw && typeof raw === 'object') {\\n                          if (raw.Desc !== undefined) desc = String(formatValue(raw.Desc));\\n                          else if (raw.description !== undefined) desc = String(formatValue(raw.description));\\n                          else if (raw.name !== undefined) desc = String(formatValue(raw.name));\\n                          else if (raw.type !== undefined) desc = String(formatValue(raw.type));\\n                          \\n                          if (raw.Difficulty !== undefined) difficulty = String(formatValue(raw.Difficulty));\\n                          else if (raw.difficulty !== undefined) difficulty = String(formatValue(raw.difficulty));\\n                          if (raw.   if (currentPage < totalPages - 1) {\\n            _blockPageState.set(containerId, currentPage + 1);\\n            renderBlock(containerId, data, templateId);\\n        }\\n    };\\n\\n    bar.appendChild(prevBtn);\\n    bar.appendChild(pageIndicator);\\n    bar.appendChild(nextBtn);\\n    return bar;\\n}\\n\\nfunction renderBlock(containerId, data, templateId, rootData) {\\n     const container = document.getElementById(containerId);\\n     const template = document.getElementById(templateId);\\n     if (!container || !template) return;\\n     \\n     container.innerHTML = '';\\n     if (!data || (typeof data === 'object' && Object.keys(data).length === 0)) {\\n         container.innerHTML = '<div style=\\"width:100%; text-align:center; padding:10px; color:#666;\\">No Data</div>';\\n         return;\\n     }\\n\\n     // Determine items to loop\\n     let items = [];\\n     if (Array.isArray(data)) {\\n         items = data;\\n     } else if (typeof data === 'object') {\\n         // STRICT MODE: Check Schema (COLLECTION_PATHS)\\n         const rootKey = container.getAttribute('data-bind-root');\\n         const isSchemaCollection = COLLECTION_PATHS.has(rootKey) || COLLECTION_PATHS.has('.' + rootKey);\\n         \\n         if (!isSchemaCollection) {\\n            items = [data]; // Treat as single Record\\n         } else {\\n             // It is a Collection -> Loop values\\n             items = Object.entries(data)\\n                 .filter(([k, v]) => k !== '$meta' && k !== 'template' && v && typeof v === 'object' && !Array.isArray(v))\\n                 .map(([k, v]) => ({ $key: k, ...v }));\\n         }\\n     } else {\\n         items = [data];\\n     }\\n\\n     if (items.length === 0) {\\n         container.innerHTML = '<div style=\\"width:100%; text-align:center; padding:10px; color:#666;\\">No Data</div>';\\n         return;\\n     }\\n\\n     // --- Block Pagination Logic ---\\n     const totalItems = items.length;\\n     const totalPages = Math.ceil(totalItems / BLOCK_PAGE_SIZE);\\n     const needsPagination = totalItems > BLOCK_PAGE_SIZE;\\n\\n     let currentPage = _blockPageState.get(containerId) || 0;\\n     if (currentPage >= totalPages) currentPage = totalPages - 1;\\n     if (currentPage < 0) currentPage = 0;\\n     _blockPageState.set(containerId, currentPage);\\n\\n     const startIdx = needsPagination ? currentPage * BLOCK_PAGE_SIZE : 0;\\n     const endIdx = needsPagination ? Math.min(startIdx + BLOCK_PAGE_SIZE, totalItems) : totalItems;\\n     const visibleItems = items.slice(startIdx, endIdx);\\n\\n     // Add TOP pagination bar\\n     if (needsPagination) {\\n         container.appendChild(createBlockPaginationBar(containerId, currentPage, totalPages, data, templateId, 'top'));\\n     }\\n\\n     // Render visible items\\n     for (const item of visibleItems) {\\n         const clone = template.content.cloneNode(true);\\n         const wrapper = document.createElement('div');\\n         wrapper.style.display = 'contents';\\n         wrapper.appendChild(clone);\\n         container.appendChild(wrapper);\\n         updateBindingsIn(wrapper, item, rootData);\\n     }\\n\\n     // Add BOTTOM pagination bar\\n     if (needsPagination) {\\n         container.appendChild(createBlockPaginationBar(containerId, currentPage, totalPages, data, templateId, 'bottom'));\\n     }\\n}\\n\\n        \uFEFFfunction updateBindingsIn(root, data, rootData) {\\n     if (!root || !data) return;\\n     \\n    root.querySelectorAll('[data-bind-val]').forEach(el => {\\n        const path = el.getAttribute('data-bind-val');\\n        if (path !== null) { \\n            const val = getV(data, path, '???');\\n            el.textContent = val;\\n        }\\n    });\\n\\n    root.querySelectorAll('[data-bind-label]').forEach(el => {\\n        const path = el.getAttribute('data-bind-label');\\n        if (path !== null) {\\n            const label = getL(data, path, null);\\n            if (label) el.textContent = label;\\n        }\\n    });\\n\\n    // --- Inject $key into fullpaths for nested components ---\\n    if (data.$key) {\\n        root.querySelectorAll('[data-bind-list-fullpath]').forEach(el => {\\n            const fullpath = el.getAttribute('data-bind-list-fullpath');\\n            // For example, fullpath might be \\"Familiar.Equipment\\"\\n            // And data.$key is \\"Bob\\"\\n            // We need it to be \\"Familiar.Bob.Equipment\\"\\n            // To do this simply, we assume any nested list inside a collection is relative to that collection's root.\\n            // A quick heuristic: if the first part of the full path matches the root collection (Familiar), insert the key.\\n            // Though actually, if it's rendered here, it *must* belong to this item.\\n            if (fullpath && !fullpath.includes('.' + data.$key + '.')) {\\n                const parts = fullpath.split('.');\\n                if (parts.length > 1) {\\n                    // parts[0] is root (e.g. Familiar), parts[1] is prop (e.g. Equipment)\\n                    // insert $key after root\\n                    parts.splice(1, 0, data.$key);\\n                    el.setAttribute('data-bind-list-fullpath', parts.join('.'));\\n                }\\n            }\\n        });\\n\\n        // Do the same for data-bind-fullpath (e.g., checkboxes inside grid items)\\n        root.querySelectorAll('[data-bind-fullpath]').forEach(el => {\\n            const fullpath = el.getAttribute('data-bind-fullpath');\\n             if (fullpath && !fullpath.includes('.' + data.$key) && fullpath !== data.$key) {\\n                const parts = fullpath.split('.');\\n                if (parts.length > 1) {\\n                    parts.splice(1, 0, data.$key);\\n                    el.setAttribute('data-bind-fullpath', parts.join('.'));\\n                } else if (parts.length === 1) {\\n                    // If it's just 'Familiar', make it 'Familiar.Bob'\\n                    el.setAttribute('data-bind-fullpath', parts[0] + '.' + data.$key);\\n                }\\n            }\\n        });\\n    }\\n\\n    root.querySelectorAll('[data-bind-curr]').forEach(el => {\\n         const path = el.getAttribute('data-bind-curr');\\n         if(path !== null) el.textContent = getV(data, path, 0);\\n    });\\n    \\n    // --- Image Edit & Popup Handlers ---\\n    // We attach the data source to the element for the handler to read\\n    root.querySelectorAll('.img-edit-btn').forEach(el => {\\n        // Store the current data context \\n        // We can't easily pass the whole object, but we can pass the key if it exists\\n        if (data.$key) el.dataset.key = data.$key;\\n    });\\n\\n    root.querySelectorAll('[data-bind-max]').forEach(el => {\\n         const path = el.getAttribute('data-bind-max');\\n         if(path !== null) el.textContent = getV(data, path, 100);\\n    });\\n    root.querySelectorAll('[data-bind-bar]').forEach(el => {\\n        const path = el.getAttribute('data-bind-bar');\\n        if (path !== null) {\\n            let maxPath = path.replace('_curr', '_max');\\n            if(maxPath === path) maxPath = path + '_max';\\n            const cur = Number(getV(data, path, 0)) || 0;\\n            const max = Number(getV(data, maxPath, 100)) || 100;\\n            const pct = Math.min(100, Math.max(0, (cur / max) * 100));\\n            el.style.width = pct + '%';\\n        }\\n    });\\n\\n    root.querySelectorAll('[data-bind-img]').forEach(el => {\\n        const path = el.getAttribute('data-bind-img');\\n        if (path !== null) {\\n            // --- Image Loading Priority ---\\n            // 1. localStorage (local files uploaded by user, base64 data: URIs)\\n            // 2. MVU variable (URLs, synced across sessions)\\n            // 3. Placeholder (when no image is set)\\n            let url = '';\\n            \\n            // For localStorage lookup, use the full path from parent wrapper\\n            // This matches the key used when saving oot + Leaf\\n                     fullPath = saveRoot + '.' + saveLeaf;\\n                 } else {\\n                     // No root: just leaf (global variable?)\\n                     fullPath = saveLeaf;\\n                 }\\n                 applyValueUpdate(fullPath, el.checked);\\n             };\\n        }\\n    });\\n    \\n    // --- Dynamic Logic Execution (Phase 2) ---\\n    root.querySelectorAll('[data-dynamic-logic]').forEach(el => {\\n        const encodedLogic = el.getAttribute('data-dynamic-logic');\\n        if (encodedLogic) {\\n            try {\\n                const logic = atob(encodedLogic);\\n                // Safe execution context\\n                // We provide _output as a variable for the user to assign to.\\n                // We also provide 'el' for advanced direct manipulation if needed.\\n                const userFn = new Function('stat', 'getV', 'getL', 'getRaw', '_', 'el', 'root', \\n                    'let _output = undefined; ' + \\n                    logic + \\n                    '; return _output;'\\n                );\\n                \\n                const result = userFn(data, getV, getL, getRaw, _, el, rootData);\\n                \\n\\n\\n                \\n                // MAGIC LOOKUP: If this card is a Lorebook card, try to map the result (key) to content\\n                let finalResult = result;\\n                if (el.hasAttribute('data-lb-key')) {\\n                    const keyStr = String(result).trim().toLowerCase();\\n\\n\\n                    // 1. Check Cache (Sync)\\n                    if (window._lbContentCache && window._lbContentCache.has(keyStr)) {\\n                        finalResult = window._lbContentCache.get(keyStr);\\n\\n                    } else {\\n                        // 2. Async Fallback: Trigger fetch if not found\\n\\n                        fetchLorebookContent(keyStr).then(content => {\\n                            if (content) {\\n\\n                                // Update Cache\\n                                if (window._lbContentCache) window._lbContentCache.set(keyStr, content);\\n                                \\n                                // Update Element\\n                                if (el.tagName === 'IMG') {\\n                                    el.src = content;\\n                                    el.style.display = 'block';\\n                                } else {\\n                                    el.innerHTML = content;\\n                                }\\n                            } else {\\n                                console.warn('[MZSMB] Magic Lookup: Async fetch returned null for:', keyStr);\\n                            }\\n                        });\\n                    }\\n                }\\n\\n                if (finalResult !== undefined) {\\n                    if (el.tagName === 'IMG') {\\n                        // Only set src if it looks like a URL.\\n                        // Lorebook keys (e.g. 'pre-70-map') are NOT URLs and\\n                        // would cause 404s if assigned to src directly.\\n                        const strResult = String(finalResult);\\n                        if (strResult.startsWith('http://') || strResult.startsWith('https://') || strResult.startsWith('data:')) {\\n                            el.src = finalResult;\\n                            el.style.display = 'block';\\n                        } else {\\n                            // It's a lorebook key — hide img until async fetch resolves\\n                            el.style.display = 'none';\\n                        }\\n                    } else {\\n                        // Allow HTML injection for RichText/StatRow\\n                        el.innerHTML = finalResult;\\n                    }\\n                }\\n            } catch (e) {\\n                console.error(\\"[MZSMB] Dynamic Logic Error:\\", e);\\n                el.textContent = \\"Logic Error: \\" + e.message;\\n                el.style.color = 'red';\\n            }\\n        }\\n    });\\n\\n     // 4. Generic Lists (Simple & Grid & Quest & Custom & Equipment & Inventory)\\n    const listTypeMap = {\\n        'simple': (cid, data, txn, rootData) => renderTemplateList(cid, data, 'tmpl-simple', txn, false, rootData),\\n        'grid': (cid, data, txn, rootData) => renderTemplateList(cid, data, 'tmpl-grid', txn, true, rootData),\\n        'inventory': (cid, data, txn, rootData) => renderTemplateList(cid, data, 'tmpl-inventory', txn, true, rootData),\\n        'equipment-action': (cid, data, txn, rootData) => renderTemplateList(cid, data, 'tmpl-equipment-action', txn, false, rootData),\\n        'quest': (cid, data, txn, rootData) => renderTemplateList(cid, data, 'tmpl-quest', txn, false, rootData)\\n    };\\n\\n    root.querySelectorAll('[data-bind-list]').forEach(el => {\\n        const path = el.getAttribute('data-bind-list');\\n        const type = el.getAttribute('data-list-type') || 'simple';\\n        const emptyText = LOCALE['empty_' + type] || LOCALE.empty_none;\\n        \\n        if (path !== null) {\\n            // Use getListData to avoid aggressive tuple unwrapping\\n            const listData = getListData(data, path, {});\\n            \\n            // Check for custom-* type\\n            if (type.startsWith('custom-')) {\\n                const customName = type.substring(7); // strip 'custom-'\\n                const customTmplId = 'tmpl-custom-' + customName;\\n                const customTmpl = document.getElementById(customTmplId);\\n                \\n                if (customTmpl) {\\n                    // Use custom template with data-bind rendering\\n                    renderCustomTemplateList(el, listData, customTmplId, emptyText, rootData);\\n                } else {\\n                    // Fallback: show error banner + render with tmpl-simple\\n                    const errorBanner = document.createElement('div');\\n                    errorBanner.style.cssText = 'background:#ff525233; border:1px solid #ff5252; color:#ff8a80; padding:6px 10px; border-radius:4px; margin-bottom:8px; font-size:0.85em;';\\n                    errorBanner.textContent = '⚠ Custom template \\"' + customName + '\\" not found. Using fallback.';\\n                    el.appendChild(errorBanner);\\n                    renderTemplateList(el, listData, 'tmpl-simple', emptyText, false);\\n                }\\n            } else {\\n                const renderer = listTypeMap[type] || listTypeMap['simple'];\\n                renderer(el, listData, emptyText, rootData);\\n            }\\n        }\\n    });\\n    \\n    // --- Custom Template Renderer (data-bind based) ---\\n    function renderCustomTemplateList(container, data, templateId, emptyText, rootData) {\\n\\n        container.innerHTML = '';\\n        \\n        let items = [];\\n        if (data && Object.keys(data).length > 0) {\\n            for (const [key, raw] of Object.entries(data)) {\\n                if (key === '$meta' || key === 'template') continue;\\n                items.push({ $key: key, $raw: raw });\\n            }\\n        }\\n        \\n        \\n        if (items.length === 0) {\\n            container.innerHTML = '<div style=\\"text-align:center; color:var(--text-secondary); padding:10px;\\">' + emptyText + '</div>';\\n            return;\\n        }\\n        \\n        const tmpl = document.getElementById(templateId);\\n\\n        if (!tmpl) return;\\n        \\n        items.forEach(item => {\\n            const clone = tmpl.content.cloneNode(true);\\n            const raw = item.$raw;\\n            \\n            // Build a flat field map from the item's data\\n            const fieldMap = { '$key': item.$key };\\n            if (raw && typeof raw === 'object' && !Array.isArray(raw)) {\\n                for (const [k, v] of Object.entries(raw)) {\\n                    if (k === '$meta') continue;\\n                    fieldMap[k] = isTuple(v) ? formatValue(tupleVal(v)) : formatValue(v);\\n                }\\n            } else if (raw !== null && raw !== undefined) {\\n                fieldMap['$value'] = isTuple(raw) ? formatValue(tupleVal(raw)) : formatValue(raw);\\n            }\\n            \\n\\n            \\n            // Fill all data-bind elements\\n            clone.querySelectorAll('[data-bind]').forEach(bindEl => {\\n                const field = bindEl.getAttribute('data-bind');\\n\\n                if (field && fieldMap[field] !== undefined) {\\n                    bindEl.textContent = String(fieldMap[field]);\\n                    bindEl.style.display = '';\\n                } else if (field && fieldMap[field] === undefined) {\\n                    // Hide elements whose field doesn't exist in this item\\n                    bindEl.textContent = '';\\n                }\\n            });\\n            \\n            // Attach click handler for modal\\n            const rootEl = clone.firstElementChild;\\n            if (rootEl) {\\n                rootEl.style.cursor = 'pointer';\\n                const modalData = raw || {};\\n                rootEl.onclick = () => showModal(item.$key, modalData);\\n            }\\n            \\n            container.appendChild(clone);\\n        });\\n    }\\n}\\n\\n        \uFEFF// --- Lorebook Logic (Refactored Phase 6) ---\\nconst _lbContentCache = new Map(); // Cache content, not just images\\n\\n// Generic function to retrieve simple string content from a Lorebook Entry\\nasync function fetchLorebookContent(key) {\\n    if (!key) return null;\\n    const searchKey = String(key).trim().toLowerCase();\\n    if (_lbContentCache.has(searchKey)) return _lbContentCache.get(searchKey);\\n    \\n\\n\\n    try {\\n        // API Discovery (Match statusmenu.html exactly)\\n        const _getPrimaryBook = (typeof getCurrentCharPrimaryLorebook === 'function')\\n            ? getCurrentCharPrimaryLorebook\\n            : (window.parent && window.parent.getCurrentCharPrimaryLorebook);\\n\\n        const _getEntries = (typeof getLorebookEntries === 'function')\\n            ? getLorebookEntries\\n            : (window.parent && window.parent.getLorebookEntries);\\n\\n        if (typeof _getPrimaryBook === 'function' && typeof _getEntries === 'function') {\\n            const bookName = await _getPrimaryBook();\\n            // console.log(\\"[MZSMB] [LB] Primary Book:\\", bookName);\\n            if (bookName) {\\n                const entries = await _getEntries(bookName);\\n                if (Array.isArray(entries)) {\\n                     const entry = entries.find(e => {\\n                         // Check Keys (Array)\\n                         if (Array.isArray(e.keys)) {\\n                             if (e.keys.some(k => k.trim().toLowerCase() === searchKey)) return true;\\n                         }\\n                         // Check Comment\\n                         if (e.comment && e.comment.trim().toLowerCase() === searchKey) return true;\\n                         return false;\\n                     });\\n                     \\n                     if (entry && entry.content) {\\n                         const content = entry.content.trim();\\n                         _lbContentCache.set(searchKey, content);\\n                         return content;\\n                     }\\n                }\\n            }\\n        }\\n    } catch(e) { console.error(\\"[MZSMB][LB] Fetch Error:\\", e); }\\n    return null;\\n}\\n\\nasync function updateLorebookContent(root) {\\n    if (!root) return;\\n    const lbEls = root.querySelectorAll('[data-lb-key], [data-lb-text-key]');\\n    for (const el of lbEls) {\\n        const key = el.getAttribute('data-lb-key') || el.getAttribute('data-lb-text-key');\\n        if (key) {\\n            const content = await fetchLorebookContent(key);\\n            if (content) {\\n                 if (el.tagName === 'IMG') {\\n                      // Image handling (URL validation)\\n                      if (content.toLowerCase().startsWith('http://') || content.toLowerCase().startsWith('https://')) {\\n                          if (el.src !== content) {\\n                              el.src = content;\\n                              el.style.display = 'block';\\n                          }\\n                      }\\n                 } else {\\n                      // Text handling (RichText / StatRow)\\n                      if (el.innerHTML !== content) {\\n                          el.innerHTML = content;\\n                      }\\n                 }\\n            }\\n        }\\n    }\\n}\\n\\n        \uFEFFasync function updateStatusPanel(gameData) {\\n    if (!gameData || !gameData.stat_data) return;\\n    const stat = gameData.stat_data;\\n    \\n    // Phase 1: Update Unmapped (Global) Bindings\\n    updateBindingsIn(document.body, stat, stat);\\n    updateLorebookContent(document.body); // Async\\n\\n    // Phase 2: Update Mapped Blocks (Collections/Records)\\n    const containers = document.querySelectorAll('[data-bind-root]');\\n    for (const container of containers) {\\n         const rootKey = container.getAttribute('data-bind-root');\\n         const templateId = container.getAttribute('data-template');\\n         if (rootKey && templateId) {\\n              const rootData = getV(stat, rootKey, null);\\n              // Pass global 'stat' as rootData\\n              renderBlock(container.id, rootData, templateId, stat);\\n              updateLorebookContent(container); // Async\\n         }\\n    }\\n}\\n\\n// --- MVU Event Logic (Native) ---\\nlet _lastStatData = null;\\nlet _lastSaveTime = 0;\\n\\nconst parseMessageIdFromName = (name) => {\\n    if (!name || typeof name !== 'string' || !name.includes('message')) return -1;\\n    const match = name.match(/message.*?(\\\\d+)/i);\\n    if (!match) return -1;\\n    const parsed = Number(match[1]);\\n    return Number.isFinite(parsed) && parsed >= 0 ? parsed : -1;\\n};\\n\\nconst resolveCurrentMessageId = () => {\\n    // 1. Prefer SillyTavern API over iframe name to avoid stale IDs.\\n    if (typeof getCurrentMessageId === \\"function\\") {\\n        const apiId = Number(getCurrentMessageId());\\n        if (Number.isFinite(apiId) && apiId >= 0) return apiId;\\n    }\\n\\n    // 2. Iframe name\\n    const frameId = parseMessageIdFromName(window.name);\\n    if (frameId >= 0) return frameId;\\n\\n    // 3. Parent Iframe name\\n    const parentFrameId = parseMessageIdFromName(window.parent && window.parent.name);\\n    if (parentFrameId >= 0) return parentFrameId;\\n\\n    return -1;\\n};\\n\\nconst refreshFromMvu = async () => {\\n     // Polling Enabled (Parallel with Events)\\n    let latestStatData = null;\\n    const targetWindow = (typeof window.getVariables === \\"function\\" && window) || (window.parent && typeof window.parent.getVariables === \\"function\\" && window.parent) || null;\\n\\n    if (targetWindow) {\\n        const msgId = resolveCurrentMessageId();\\n        if (msgId >= 0) {\\n            const context = { type: 'message', message_id: msgId };\\n            const vars = targetWindow.getVariables(context);\\n            if (vars && vars.stat_data) latestStatData = vars.stat_data;\\n        }\\n        if (!latestStatData) {\\n            const globalVars = targetWindow.getVariables();\\n            if (globalVars && globalVars.stat_data) latestStatData = globalVars.stat_data;\\n        }\\n    }\\n    \\n    // Fallback\\n    if (!latestStatData) {\\n         try {\\n            const msgId = resolveCurrentMessageId();\\n            if (msgId >= 0) {\\n                const messages = await getChatMessages(msgId);\\n                if (messages?.[0]?.data?.stat_data) latestStatData = messages[0].data.stat_data;\\n            }\\n         } catch(e) {}\\n    }\\n\\n    if (latestStatData) {\\n        // Determine if we need to update\\n        // If we are editing (modal open), pause updates to prevent overwrite\\n        const modal = document.getElementById(\\"portrait-mode-modal\\");\\n        if (modal && modal.style.display === \\"flex\\") return;\\n        \\n        // NEW: Cooldown check to prevent race condition\\n        if (Date.now() - _lastSaveTime < 2000) return;\\n\\n        const isDifferent = JSON.stringify(latestStatData) !== JSON.stringify(_lastStatData);\\n        if (isDifferent) {\\n            await updateStatusPanel({ stat_data: latestStatData });\\n            _lastStatData = JSON.parse(JSON.stringify(latestStatData));\\n        }\\n    }\\n};\\n\\nconst initMvuConnection = async () => {\\n    // Find execution context\\n    let target = null;\\n    if (typeof window.waitGlobalInitialized === 'function') target = window;\\n    else if (window.parent && typeof window.parent.waitGlobalInitialized === 'function') target = window.parent;\\n    \\n    //console.log(\\"[MZSMB] Context Search:\\", { found: !!target, isParent: target === window.parent });\\n\\n    if (!target) {\\n         return;\\n    }\\n    \\n    // 1. Wait for Initialization\\n    try {\\n        await target.waitGlobalInitialized('Mvu');\\n    } catch (e) { }\\n\\n    const Mvu = target.Mvu;\\n    let initialStat = null;\\n\\n    // 2. Initial Fetch\\n    // 2. Initial Fetch (Prioritize Global Character Data for Upgrades)\\n    if (Mvu && Mvu.getMvuData) {\\n        // Try Global ('chat') first\\n        const chatData = Mvu.getMvuData({ type: 'chat' });\\n        if (chatData && chatData.stat_data) {\\n            initialStat = chatData.stat_data;\\n        } else {\\n            // Fallback to current message\\n            const msgId = resolveCurrentMessageId();\\n            if (msgId >= 0) {\\n                const msgData = Mvu.getMvuData({ type: 'message', message_id: msgId });\\n                if (msgData && msgData.stat_data) {\\n                    initialStat = msgData.stat_data;\\n                }\\n            }\\n        }\\n        \\n        if (initialStat) {\\n            await updateStatusPanel({ stat_data: initialStat });\\n            _lastStatData = JSON.parse(JSON.stringify(initialStat));\\n        }\\n    }\\n\\n    // 3. Event Scubscription\\n    if (target.eventOn && Mvu && Mvu.events && Mvu.events.VARIABLE_UPDATE_ENDED) {\\n        target.eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, async (data) => {\\n             // Check if we are editing\\n             const modal = document.getElementById(\\"portrait-mode-modal\\");\\n             if (modal && modal.style.display === \\"flex\\") return;\\n             if (Date.now() - _lastSaveTime < 1000) return;\\n\\n             // Use Lodash to extract data safely\\n             let stat = null;\\n             if (_ && _.get) {\\n                 stat = _.get(data, 'stat_data');\\n             } else {\\n                 stat = data?.stat_data;\\n             }\\n\\n             // If data came in directly\\n             if (stat) {\\n                 await updateStatusPanel({ stat_data: stat });\\n                 _lastStatData = JSON.parse(JSON.stringify(stat));\\n             }\\n        });\\n    }\\n\\n    // Polling Fallback (Runs in parallel to catch missed events)\\n    setInterval(refreshFromMvu, 2000);\\n\\n    return initialStat;\\n};\\n\\n\\n        \uFEFF\\n// Save Function\\nasync function saveStatData(updatedStat) {\\n    if (!updatedStat) return;\\n    _lastSaveTime = Date.now(); // Mark save time\\n    const messageId = resolveCurrentMessageId();\\n    const context = (messageId >= 0) ? { type: 'message', message_id: messageId } : null;\\n\\n    try {\\n        // 1. MVU Extension (Preferred)\\n        // Use updateVariablesWith to ensure we don't clobber other extensions\\n        if (typeof updateVariablesWith === 'function') {\\n            const saveContext = context || { type: 'chat' };\\n            await updateVariablesWith((vars) => {\\n                if (_ && _.set) {\\n                     _.set(vars, 'stat_data', updatedStat);\\n                } els ontainer {\\n            --text-primary: #e0f7fa;\\n            --text-secondary: #81d4fa;\\n            --accent-primary: #00e5ff;\\n            --border-color: rgba(0, 229, 255, 0.3);\\n            --background-card: rgba(0, 20, 40, 0.65);\\n            font-family: 'Segoe UI', sans-serif;\\n            color: var(--text-primary);\\n            background: linear-gradient(-45deg, #001f3f, #003366, #006064, #013243);\\n            background-size: 400% 400%;\\n            animation: gradient-flow-lvup 30s ease infinite;\\n            border: 1px solid var(--border-color);\\n            border-radius: 8px;\\n            padding: 15px;\\n            width: 100%;\\n            box-sizing: border-box;\\n            margin: 15px 0;\\n            overflow: hidden;\\n        }\\n\\n        @keyframes gradient-flow-lvup {\\n            0% {\\n                background-position: 0% 50%;\\n            }\\n\\n            50% {\\n                background-position: 100% 50%;\\n            }\\n\\n            100% {\\n                background-position: 0% 50%;\\n            }\\n        }\\n\\n        leveluppanel,\\n        LevelUpPanel {\\n            display: none !important;\\n        }\\n    </style>\\n    <div id=\\"mvu-levelup-panel-widget\\" class=\\"mvu-lvup-container\\" style=\\"display: none;\\">\\n        <h3 class=\\"card-header\\"\\n            style=\\"margin: 0 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; color: var(--accent-primary);\\">\\n            Level Up - Stat Allocation</h3>\\n        <div id=\\"mvu-levelup-rows-container\\">\\n            \x3C!-- Rows will be injected here -->\\n            <div id=\\"mvu-levelup-loading\\" style=\\"text-align: center; color: #81d4fa; font-style: italic;\\">Loading stat\\n                data...</div>\\n        </div>\\n        <div style=\\"margin-top: 15px; text-align: center;\\">\\n            <button id=\\"mvu-levelup-save-btn\\" onclick=\\"saveLevelUpStats()\\" class=\\"tab-btn\\"\\n                style=\\"background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-color); border-radius: 4px; font-weight: bold; font-size: 1.1em; transition: 0.2s; display: none;\\">Save\\n                Changes</button>\\n        </div>\\n    </div>\\n\\n    <script>\\n        (function () {\\n            // 1. Context and Helper Functions\\n            let targetWindow = null;\\n            let _ = null;\\n\\n            if (typeof window.getVariables === 'function') targetWindow = window;\\n            else if (window.parent && typeof window.parent.getVariables === 'function') targetWindow = window.parent;\\n\\n            if (typeof window._ !== 'undefined') _ = window._;\\n            else if (window.parent && typeof window.parent._ !== 'undefined') _ = window.parent._;\\n\\n            if (!targetWindow) {\\n                document.getElementById('mvu-levelup-loading').textContent = \\"Error: Cannot access SillyTavern environment.\\";\\n                return;\\n            }\\n\\n            // Tuple Helpers\\n            const isTuple = (v) => Array.isArray(v) && v.length >= 2 && typeof v[1] === 'string';\\n            const tupleVal = (v) => isTuple(v) ? v[0] : v;\\n\\n            const getRaw = (obj, path, def) => {\\n                if (!obj) return def;\\n                if (!path) return obj;\\n                if (_ && _.get) return _.get(obj, path, def);\\n                const parts = path.split('.');\\n                let cur = obj;\\n                for (const p of parts) {\\n                    if (cur === undefined || cur === null) return def;\\n                    cur = cur[p];\\n                }\\n                return (cur === undefined || cur === null) ? def : cur;\\n            };\\n\\n            const getV = (obj, path, def) => {\\n                const val = getRaw(obj, path, def);\\n                const v = isTuple(val) ? val[0] : val;\\n                return typeof v === 'number' ? v : (Number(v) || def);\\n            };\\n\\n            const getL = (obj, path, def) => {\\n                const val = getRaw(obj, path, def);\\n                return isTuple(val) ? val[1] : def;\\n            }\\n\\n            // Internal State\\n            let _originalStatData = null;\\n            let _stagedStatData = null;\\n            let _allocationState = {}; // charKey -> { pointsLeft, allocated: { Str: 0, Con: 0, etc. } }\\n\\n            const STATS = ['Strength', 'Constitution', 'Agility', 'Intelligence', 'Wisdom'];\\n            const STAT_LABELS = {\\n                'Strength': 'Str',\\n                'Constitution': 'Con',\\n                'Agility': 'Agi',\\n                'Intelligence': 'Int',\\n                'Wisdom': 'Wis'\\n            };\\n\\n            // 2. Data Fetching\\n            const fetchStatData = () => {\\n                let statData = null;\\n                if (!targetWindow) {\\n                    console.error(\\"[LvUpPanel] Error: targetWindow is null! Cannot fetch data.\\");\\n                    return null;\\n                }\\n\\n                const msgId = (typeof getCurrentMessageId === \\"function\\") ? getCurrentMessageId() : -1;\\n                const context = { type: 'message', message_id: msgId };\\n\\n                let vars = null;\\n                try {\\n                    vars = targetWindow.getVariables(context);\\n                } catch (e) {\\n                    console.error(\\"[LvUpPanel] getVariables context error:\\", e);\\n                }\\n\\n                if (vars && vars.stat_data) {\\n                    statData = vars.stat_data;\\n                } else {\\n                    let globalVars = null;\\n                    try {\\n                        globalVars = targetWindow.getVariables();\\n                    } catch (e) {\\n                        console.error(\\"[LvUpPanel] getVariables global error:\\", e);\\n                    }\\n\\n                    if (globalVars && globalVars.stat_data) {\\n                        statData = globalVars.stat_data;\\n                    } else {\\n                        console.error(\\"[LvUpPanel] Error: stat_data not found in both local and global variables.\\");\\n                    }\\n                }\\n                return statData;\\n            };\\n\\n            // 3. UI Rendering & Interactions\\n            const renderPanel = () => {\\n                const statData = fetchStatData();\\n                if (!statData) {\\n                    document.getElementById('mvu-levelup-loading').textContent = \\"Waiting for stat data...\\";\\n                    return false;\\n                }\\n\\n                // Deep clone for staging\\n                _originalStatData = JSON.parse(JSON.stringify(statData));\\n                _stagedStatData = JSON.parse(JSON.stringify(statData));\\n                _allocationState = {};\\n\\n                const container = document.getElementById('mvu-levelup-rows-container');\\n                container.innerHTML = '';\\n\\n                let foundLevelUp = false;\\n\\n                // Helper to check and render a character\\n                const processCharacter = (charObj, charPathPrefix, charKey) => {\\n                    if (!charObj) return false;\\n\\n                    const corePointsRaw = getRaw(charObj, 'Core-points');\\n                    const corePoints = Number(isTuple(corePointsRaw) ? corePointsRaw[0] : corePointsRaw) || 0;\\n\\n                    if (corePoints <= 0) return false;\\n\\n                    // Character Names\\n                    const nameRaw = getRaw(charObj, 'Name');\\n                    const charName = isTuple(nameRaw) ? nameRaw[0] : (nameRaw || charKey);\\n\\n                    // Initialization for state tracking\\n                    _allocationState[charPathPrefix] = {\\n                        pointsLeft: corePoints,\\n                        startPoints: corePoints,\\n                        base: {\\n                            'Strength': getV(charObj, 'Strength', 0),\\n                            'Constitution': getV(charObj, 'Constitution', 0),\\n                            'Agility': getV(charObj, 'Agility', 0),\\n                            'Intelligence': getV(charObj, 'Intelligence', 0),\\n                            'Wisdom': getV(charObj, 'Wisdom', 0),\\n                        },\\n                        allocated: { 'Strength': 0, 'Constitution': 0, 'Agility': 0, 'Intelligence': 0, 'Wisdom': 0 }\\n                    };\\n\\n                    // Build UI Row\\n                    const row = document.createElement('div');\\n                    row.style.cssText = 'background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 10px; margin-bottom: 10px;';\\n\\n                    const header = document.createElement('div');\\n                    header.className = 'nested-section-header';\\n                    header.style.cssText = 'display: flex; justify-content: space-between; align-items: center; border-bottom-style: dashed; padding-bottom: 5px; margin-bottom: 8px; margin-top: 0;';\\n                    header.innerHTML = \`\\\\n<strong style=\\"color: var(--accent-primary); font-size: 1.1em; text-transform: none; letter-spacing: normal;\\">\${charName}</strong>\\\\n<span style=\\"font-size: 0.9em; font-weight: bold; color: #ffab40; text-transform: none; letter-spacing: normal;\\">Unspent Core-points: <span id=\\"pool-\${charKey}\\" style=\\"font-size: 1.2em;\\">\${corePoints}</span></span>\\\\n\`;\\n                    row.appendChild(header);\\n\\n                    const grid = document.createElement('div');\\n                    grid.style.cssText = 'display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; padding-bottom: 5px;';\\n\\n                    STATS.forEach(stat => {\\n                        const statBox = document.createElement('div');\\n                        statBox.style.cssText = 'display: flex; align-items: center; background: rgba(0,0,0,0.4); border: 1px solid rgba(0,229,255,0.2); padding: 4px; border-radius: 4px; gap: 4px; min-width: 90px; justify-content: center; flex-shrink: 0; margin: 0;';\\n\\n                        const label = document.createElement('span');\\n                        label.className = 'prop-label';\\n                        label.style.cssText = 'width: 25px; font-weight: bold; font-size: 0.9em; margin-right: 4px; text-align: right;';\\n                        label.textContent = STAT_LABELS[stat];\\n\\n                        const minusBtn = document.createElement('button');\\n                        minusBtn.textContent = '-';\\n                        minusBtn.style.cssText = 'background: rgba(255,0,0,0.1); border: 1px solid var(--border-color); color: #ff6b6b; padding: 0; border-radius: 3px; cursor: pointer; font-weight: bold; width: 20px; height: 20px; line-height: 18px; text-align: center;';\\n                        minusBtn.onclick = () => adjustStat(charPathPrefix, charKey, stat, -1);\\n\\n                        const valSpan = document.createElement('span');\\n                        valSpan.id = \`val-\${charKey}-\${stat}\`;\\n                        valSpan.style.cssText = 'font-weight: bold; width: 26px; text-align: center; color: #fff;';\\n                        valSpan.textContent = _allocationState[charPathPrefix].base[stat];\\n\\n                        const plusBtn = document.createElement('button');\\n                        plusBtn.textContent = '+';\\n                        plusBtn.style.cssText = 'background: rgba(0,255,0,0.1); border: 1px solid var(--border-color); color: #4caf50; padding: 0; border-radius: 3px; cursor: pointer; font-weight: bold; width: 20px; height: 20px; line-height: 18px; text-align: center;';\\n                        plusBtn.onclick = () => adjustStat(charPathPrefix, charKey, stat, 1);\\n\\n                        statBox.appendChild(label);\\n                        statBox.appendChild(minusBtn);\\n                        statBox.appendChild(valSpan);\\n                        statBox.appendChild(plusBtn);\\n                        grid.appendChild(statBox);\\n                    });\\n\\n                    row.appendChild(grid);\\n                    container.appendChild(row);\\n                    return true;\\n                };\\n\\n                // Scan Mainchar\\n                if (processCharacter(statData.Mainchar, 'Mainchar', 'Mainchar')) foundLevelUp = true;\\n\\n                // Scan Familiars\\n                if (statData.Familiar) {\\n                    for (const famKey in statData.Familiar) {\\n                        if (processCharacter(statData.Familiar[famKey], 'Familiar.' + famKey, famKey)) foundLevelUp = true;\\n                    }\\n                }\\n\\n                if (foundLevelUp) {\\n                    document.getElementById('mvu-levelup-panel-widget').style.display = 'block';\\n                    document.getElementById('mvu-levelup-save-btn').style.display = 'inline-block';\\n                } else {\\n                    document.getElementById('mvu-levelup-panel-widget').style.display = 'none';\\n                }\\n                return true;\\n            };\\n\\n            // 4. Adjust Logic\\n            const adjustStat = (charPathPrefix, charKey, stat, delta) => {\\n                const state = _allocationState[charPathPrefix];\\n\\n                // Bounds checking\\n                if (delta > 0 && state.pointsLeft <= 0) return; // Not enough points\\n                if (delta < 0 && state.allocated[stat] <= 0) return; // Cannot go below base\\n\\n                // Apply changes locally to tracking state\\n                state.allocated[stat] += delta;\\n                state.pointsLeft -= delta;\\n\\n                // Update UI\\n                const currentVal = state.base[stat] + state.allocated[stat];\\n                document.getElementById(\`val-\${charKey}-\${stat}\`).textContent = currentVal;\\n\\n                // Color coding for visual feedback\\n                const elVal = document.getElementById(\`val-\${charKey}-\${stat}\`);\\n                if (state.allocated[stat] > 0) elVal.style.color = 'var(--accent-primary)';\\n                else elVal.style.color = 'var(--text-primary)';\\n\\n                document.getElementById(\`pool-\${charKey}\`).textContent = state.pointsLeft;\\n            };\\n\\n            // 5. Calculations based on attribute_system.txt\\n            const recalculateDerivedStats = (charObj) => {\\n                // Safe extraction\\n                const Lvl = getV(charObj, 'Level', 1);\\n                const Str = getV(charObj, 'Strength', 0);\\n                const Con = getV(charObj, 'Constitution', 0);\\n                const Agi = getV(charObj, 'Agility', 0);\\n                const Int = getV(charObj, 'Intelligence', 0);\\n                const Wis = getV(charObj, 'Wisdom', 0);\\n\\n                // Get Equipment Bonuses (to ensure they are added back into the persistent total)\\n                let eqPAtk = 0, eqMAtk = 0, eqPDef = 0, eqMDef = 0, eqHP = 0, eqMP = 0;\\n                if (charObj.Equipment) {\\n                    for (const item of Object.values(charObj.Equipment)) {\\n                        if (item && typeof item === 'object') {\\n                            eqPAtk += Number(item.WeaponDamage || 0);\\n                            eqMAtk += Number(item.WeaponMagDamage || 0);\\n                            eqPDef += Number(item.ArmorPDefBonus || 0);\\n                            eqMDef += Number(item.ArmorMDefBonus || 0);\\n                            eqHP   += Number(item.MaxHPBonus || 0);\\n                            eqMP   += Number(item.MaxMPBonus || 0);\\n                        }\\n                    }\\n                }\\n\\n                // Formulas\\n                const Hp_max = Math.floor(20 + (Con * 3) + (Lvl * 6)) + eqHP;\\n                const Sta_max = Math.floor((50 + (Con * 3) + (Agi * 2) + Math.floor((Lvl * 5) / 3))); // Integer division implied\\n                const Mp_max = Math.floor((50 + (Int * 4) + (Wis * 2) + (Lvl * 5)) / 3) + eqMP;\\n\\n                const P_Atk = Math.floor((Str * 2) + (Lvl * 2)) + eqPAtk;\\n                const M_Atk = Math.floor((Int * 2) + (Lvl * 2)) + eqMAtk;\\n                const P_Def = Math.floor((Con / 2) + (Lvl * 3)) + eqPDef;\\n                const M_Def = Math.floor((Wis / 2) + (Lvl * 3)) + eqMDef;\\n                const M_Ast = Math.floor((Wis * 1.5) + (Int * 0.5) + (Lvl * 1.5));\\n\\n                // Setting values back (preserving Tuples if they existed)\\n                const setVal = (path, newVal) => {\\n                    const existingRaw = getRaw(charObj, path);\\n                    if (isTuple(existingRaw)) {\\n                        if (_ && _.set) _.set(charObj, path, [newVal, existingRaw[1]]);\\n                        else {\\n                            const parts = path.split('.');\\n                            let cur = charObj;\\n                            for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];\\n                            cur[parts[parts.length - 1]] = [newVal, existingRaw[1]];\\n                        }\\n                    } else {\\n                        if (_ && _.set) _.set(charObj, path, newVal);\\n                        else {\\n                            const parts = path.split('.');\\n                            let cur = charObj;\\n                            for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];\\n                            cur[parts[parts.length - 1]] = newVal;\\n                        }\\n                    }\\n                };\\n\\n                setVal('Hp_max', Hp_max);\\n                setVal('Hp_curr', Hp_max); // Fully restore on level up/allocation per standard RPG mechanics, assuming Con changes Hp\\n\\n                setVal('Sta_max', Sta_max);\\n                setVal('Sta_curr', Sta_max);\\n\\n                setVal('Mp_max', Mp_max);\\n                setVal('Mp_curr', Mp_max);\\n\\n                setVal('Physical_attack', P_Atk);\\n                setVal('Magic_attack', M_Atk);\\n                setVal('Physical_defense', P_Def);\\n                setVal('Magic_defense', M_Def);\\n                setVal('Magic_assist', M_Ast);\\n            };\\n\\n            // 6. Final Save\\n            window.saveLevelUpStats = async () => {\\n                const btn = document.getElementById('mvu-levelup-save-btn');\\n                btn.textContent = \\"Saving...\\";\\n                btn.disabled = true;\\n                btn.style.opacity = '0.5';\\n\\n                // Apply state to _stagedStatData\\n                for (const [charPathPrefix, state] of Object.entries(_allocationState)) {\\n                    // Retrieve character from root\\n                    let charObj = null;\\n                    if (charPathPrefix === 'Mainchar') charObj = _stagedStatData.Mainchar;\\n                    else if (charPathPrefix.startsWith('Familiar.')) {\\n                        const fKey = charPathPrefix.split('.')[1];\\n                        charObj = _stagedStatData.Familiar[fKey];\\n                    }\\n\\n                    if (!charObj) continue;\\n\\n                    // Apply base stats and core points\\n                    const setVal = (path, newVal) => {\\n                        const existingRaw = getRaw(charObj, path);\\n                        if (isTuple(existingRaw)) {\\n                            if (_ && _.set) _.set(charObj, path, [newVal, existingRaw[1]]);\\n                            else charObj[path] = [newVal, existingRaw[1]]; // Simplified, works for base\\n                        } else {\\n                            if (_ && _.set) _.set(charObj, path, newVal);\\n                            else charObj[path] = newVal;\\n                        }\\n                    };\\n\\n                    STATS.forEach(stat => {\\n                        setVal(stat, state.base[stat] + state.allocated[stat]);\\n                    });\\n                    setVal('Core-points', state.pointsLeft);\\n\\n                    // Recalculate derived\\n                    recalculateDerivedStats(charObj);\\n                }\\n\\n                // Save logic using official MVU API with JSONPatch audit trail\\n                try {\\n                    // Wait for MVU to be ready\\n                    if (typeof waitGlobalInitialized === 'function') {\\n                        await waitGlobalInitialized('Mvu');\\n                    }\\n\\n                    // Build JSONPatch operations for Core-points ONLY (audit trail)\\n                    // Derived stats are recalculated internally, so we only track core-points spending\\n                    const patches = [];\\n                    for (const [charPathPrefix, state] of Object.entries(_allocationState)) {\\n                        if (state.startPoints - state.pointsLeft > 0) {\\n                            // Only create patch if core-points were spent\\n                            // Convert dots to slashes for proper JSONPatch path (e.g., \\"Familiar.Eira\\" -> \\"Familiar/Eira\\")\\n                            const path = \`/stat_data/\${charPathPrefix.replace(/\\\\./g, '/')}/Core-points/0\`;\\n                            patches.push({\\n                                op: \\"replace\\",\\n                                path: path,\\n                                value: state.pointsLeft\\n                            });\\n                            console.log(\`[LvUpPanel] Core-points patch: \${path} = \${state.pointsLeft}\`);\\n                        }\\n                    }\\n\\n                    // Get current MVU data\\n                    const currentMsgId = (typeof getCurrentMessageId === 'function') ? getCurrentMessageId() : -1;\\n                    const mvuData = window.Mvu.getMvuData({ type: 'message', message_id: -1 });\\n\\n                    // Build JSONPatch content string\\n                    const jsonPatchContent = \`<JSONPatch>\\\\n\${JSON.stringify(patches, null, 2)}\\\\n</JSONPatch>\`;\\n                    console.log('[LvUpPanel] JSONPatch content:', jsonPatchContent);\\n\\n                    // Parse and apply JSONPatch using official MVU method\\n                    const updatedData = await window.Mvu.parseMessage(jsonPatchContent, mvuData);\\n\\n                    // Apply all stat changes (base stats + derived stats) directly\\n                    // This overwrites the data with our fully recalculated _stagedStatData\\n                    updatedData.stat_data = _stagedStatData;\\n\\n                    // Save back to MVU\\n                    await window.Mvu.replaceMvuData(updatedData, { type: 'message', message_id: currentMsgId });\\n\\n                    // Inject JSONPatch as prompt so AI can see the audit trail\\n                    if (patches.length > 0) {\\n                        if (typeof injectPrompts === 'function') {\\n                            injectPrompts([\\n                                {\\n                                    id: 'levelup-panel-core-points-audit',\\n                                    content: jsonPatchContent,\\n                                    position: 'none',\\n                                    depth: 0,\\n                                    role: 'system',\\n                                    should_scan: true,\\n                                }\\n                            ]);\\n                            //console.log('[LvUpPanel] JSONPatch injected into prompt for AI visibility');\\n                        }\\n\\n                        // Also create a chat message with the JSONPatch for visibility in chat history\\n                        if (typeof createChatMessages === 'function') {\\n                            const auditMessage = \`\x3C!-- SYSTEM: The user allocated Core-points via the Level-Up Panel GUI. The JSONPatch below shows the Core-points spending that was applied. The updated values are now in <CURRENT_VARIABLE_DATA>. This spending is legitimate and already completed. -->\\\\n\${jsonPatchContent}\`;\\n                            await createChatMessages([{\\n                                role: 'system',\\n                                message: auditMessage,\\n                                is_hidden: true,\\n                                refresh: 'all',\\n                                data: { isSystem: true }\\n                            }]);\\n                            console.log('[LvUpPanel] JSONPatch audit trail added to chat history');\\n                        }\\n                    }\\n\\n                    console.log('[LvUpPanel] Stats saved successfully via MVU API with', patches.length, 'Core-points patches');\\n                    btn.textContent = \\"Saved Successfully!\\";\\n                    btn.style.background = 'rgba(100,255,100,0.2)';\\n                    btn.style.borderColor = '#4caf50';\\n                    btn.style.color = '#4caf50';\\n                    btn.style.opacity = '1';\\n\\n                } catch (e) {\\n                    console.error('[LvUpPanel] saveLevelUpStats failed:', e);\\n                    btn.textContent = \\"Error Saving\\";\\n                    btn.style.background = 'rgba(255,100,100,0.2)';\\n                    btn.style.color = '#ff5252';\\n                }\\n            };\\n\\n            // Auto-init with retry\\n            let retryCount = 0;\\n            const attemptRender = () => {\\n                const success = renderPanel();\\n                if (success === false && retryCount < 30) {\\n                    retryCount++;\\n                    setTimeout(attemptRender, 200);\\n                } else if (success === false) {\\n                    console.error(\\"[LvUpPanel] Failed to render panel after 30 attempts. stat_data could not be loaded.\\");\\n                    document.getElementById('mvu-levelup-loading').textContent = \\"Error: Could not load stat_data. Please check SillyTavern console.\\";\\n                }\\n            };\\n\\n            // Clean up any literal <LevelUpPanel/> text nodes that might have leaked into the DOM\\n            try {\\n                const doc = targetWindow ? targetWindow.document : document;\\n                // Run after a slight delay to ensure the chat message text is fully rendered\\n                setTimeout(() => {\\n                    const walk = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, null, false);\\n                    let n;\\n                    while (n = walk.nextNode()) {\\n                        if (n.nodeValue && n.nodeValue.match(/<\\\\/?leveluppanel\\\\s*\\\\/?>/i)) {\\n                            n.nodeValue = n.nodeValue.replace(/<\\\\/?leveluppanel\\\\s*\\\\/?>/gi, '');\\n                        }\\n                    }\\n                }, 100);\\n            } catch (e) {\\n                console.warn(\\"[LvUpPanel] Failed to hide raw tags:\\", e);\\n            }\\n\\n            setTimeout(attemptRender, 100);\\n        })();\\n    <\/script>\\n</body>\\n\\n</html>\\n\`\`\`","trimStrings":[],"placement":[2],"disabled":false,"markdownOnly":true,"promptOnly":false,"runOnEdit":true,"substituteRegex":0,"minDepth":null,"maxDepth":2}],"tavern_helper":{"scripts":[{"type":"script","enabled":false,"name":"變量監控","id":"d7266ca8-2419-4a2a-a4eb-b781a88edb76","content":"/**\\n * 通用角色戰鬥數值監護腳本\\n * Tavern Helper 全局腳本 v1.3\\n *\\n * v1.3 更新日誌:\\n * - [泛用性改造] 移除了對固定角色名“埃莉西婭”的依賴，現在腳本可適用於任何自定義創建的角色。\\n * - [健壯性提升] 入口檢查邏輯更新，僅驗證核心數據結構是否存在。\\n *\\n * 功能:\\n * - [核心] 自動計算並修正派生屬性。\\n * - [核心] 自動處理升級和屬性點分配。\\n * - [機制] 自動處理高潮邏輯。\\n * - [健壯性] 自動修正各類數值範圍。\\n */\\n\\n// --- 全局配置 ---\\nconst SCRIPT_NAME = '通用角色戰鬥數值監護腳本';\\nconst SCRIPT_VERSION = 'v1.3';\\n// const CHARACTER_NAME = '埃莉西婭'; // 已廢棄，腳本現在是通用的\\n\\n// --- 主處理函數 (調度中心) ---\\nfunction onVariableUpdateEnded(variables) {\\n    // [v1.4] 修正數據結構，指向正確的 stat_data 對象\\n    variables = variables?.stat_data;\\n\\n    // 確保角色核心數據存在，使其適用於任何角色\\n    if (!variables?.核心狀態 || !variables?.名字?.[0]) {\\n        // console.log(\`[\${SCRIPT_NAME}] 未找到核心數據或角色名，跳過監護。\`);\\n        return;\\n    }\\n\\n    try {\\n        console.log(\`[\${SCRIPT_NAME}] 開始 v\${SCRIPT_VERSION} 監護流程...\`);\\n\\n        // --- 核心數值處理流程 ---\\n        // 以下所有函數都會直接修改傳入的 \`variables\` 對象\\n        processDerivedStats(variables);\\n        clampStatValues(variables);\\n\\n        console.log(\`[\${SCRIPT_NAME}] 監護流程完畢。\`);\\n    } catch (error)\\n    {\\n        console.error(\`[\${SCRIPT_NAME}] 監護事件處理失敗:\`, error);\\n    }\\n}\\n\\n/**\\n * 核心模塊：根據基礎屬性計算並修正派生屬性\\n */\\nfunction processDerivedStats(variables) {\\n    const basePath = \`基礎屬性.\`;\\n    const derivedPath = \`派生屬性.\`;\\n    const equipmentPath = \`裝備服裝\`;\\n\\n    // 1. 獲取裸裝基礎屬性\\n    const baseStats = {\\n        strength: parseFloat(_.get(variables, \`\${basePath}力量[0]\`, 0)) || 0,\\n        agility: parseFloat(_.get(variables, \`\${basePath}敏捷[0]\`, 0)) || 0,\\n        stamina: parseFloat(_.get(variables, \`\${basePath}耐力[0]\`, 0)) || 0,\\n        spirit: parseFloat(_.get(variables, \`\${basePath}精神[0]\`, 0)) || 0,\\n        intelligence: parseFloat(_.get(variables, \`\${basePath}智力[0]\`, 0)) || 0,\\n        luck: parseFloat(_.get(variables, \`\${basePath}幸運[0]\`, 0)) || 0\\n    };\\n\\n    // 2. 計算裝備提供的屬性加成\\n    const equipmentBonuses = {\\n        strength: 0, agility: 0, stamina: 0, spirit: 0, intelligence: 0, luck: 0\\n    };\\n    const equippedItems = _.get(variables, equipmentPath, {});\\n    for (const itemName in equippedItems) {\\n        if (itemName === '$meta' || itemName === 'template') continue; // 跳過元數據\\n        const item = equippedItems[itemName];\\n        if (item && item.基礎屬性) {\\n            equipmentBonuses.strength += parseFloat(item.基礎屬性.力量) || 0;\\n            equipmentBonuses.agility += parseFloat(item.基礎屬性.敏捷) || 0;\\n            equipmentBonuses.stamina += parseFloat(item.基礎屬性.耐力) || 0;\\n            equipmentBonuses.spirit += parseFloat(item.基礎屬性.精神) || 0;\\n            equipmentBonuses.intelligence += parseFloat(item.基礎屬性.智力) || 0;\\n            equipmentBonuses.luck += parseFloat(item.基礎屬性.幸運) || 0;\\n        }\\n    }\\n\\n    // 3. 計算最終總屬性\\n    const totalStats = {\\n        strength: baseStats.strength + equipmentBonuses.strength,\\n        agility: baseStats.agility + equipmentBonuses.agility,\\n        stamina: baseStats.stamina + equipmentBonuses.stamina,\\n        spirit: baseStats.spirit + equipmentBonuses.spirit,\\n        intelligence: baseStats.intelligence + equipmentBonuses.intelligence,\\n        luck: baseStats.luck + equipmentBonuses.luck\\n    };\\n\\n    // 4. 根據最終總屬性計算派生屬性\\n    const derivedStatsFormulas = {\\n        '生命值.最大值[0]': () => totalStats.stamina * 10,\\n        '魔力值.最大值[0]': () => totalStats.spirit * 10,\\n        '精力.最大值[0]': () => (totalStats.stamina * 5) + (totalStats.agility * 5),\\n        '物理攻擊[0]': () => totalStats.strength * 2.5,\\n        '物理防禦[0]': () => Math.round(totalStats.stamina * 1.0),\\n        '魔法攻擊[0]': () => totalStats.intelligence * 2,\\n        '魔法防禦[0]': () => Math.round((totalStats.spirit * 1.5) + (totalStats.intelligence * 0.5)),\\n        '閃避率[0]': () => Math.min(totalStats.agility * 0.5, 99),\\n        '暴擊率[0]': () => parseFloat(((totalStats.agility * 0.2) + (totalStats.luck * 0.3) + (totalStats.intelligence * 0.1)).toFixed(2))\\n    };\\n\\n    // 5. 更新派生屬性\\n    for (const key in derivedStatsFormulas) {\\n        const path = \`\${derivedPath}\${key}\`;\\n        const currentValue = _.get(variables, path);\\n        const calculatedValue = derivedStatsFormulas[key]();\\n\\n        if (typeof currentValue !== 'number' || Math.abs(currentValue - calculatedValue) > 0.01) {\\n            console.log(\`[\${SCRIPT_NAME}] [數值修正] \${key}: \${currentValue} -> \${calculatedValue} (基於總屬性)\`);\\n            _.set(variables, path, calculatedValue); // 直接修改 variables 對象\\n        }\\n    }\\n}\\n\\n\\n\\n/**\\n * 健壯性模塊：修正數值範圍\\n */\\nfunction clampStatValues(variables) {\\n    const derivedPath = \`派生屬性.\`;\\n    const corePath = \`核心狀態.\`;\\n    \\n    // 注意：要從 variables 對象中獲取最新的最大值，因為它們可能在本輪 processDerivedStats 中剛被修正\\n    const maxHP = _.get(variables, \`\${derivedPath}生命值.最大值[0]\`, 1);\\n    const maxMP = _.get(variables, \`\${derivedPath}魔力值.最大值[0]\`, 1);\\n    const maxStamina = _.get(variables, \`\${derivedPath}精力.最大值[0]\`, 1);\\n\\n    const clampConfigs = [\\n        { path: \`\${derivedPath}生命值.當前值\`, min: 0, max: maxHP },\\n        { path: \`\${derivedPath}魔力值.當前值\`, min: 0, max: maxMP },\\n        { path: \`\${derivedPath}精力.當前值\`, min: 0, max: maxStamina },\\n    ];\\n\\n    for (const config of clampConfigs) {\\n        const value = _.get(variables, config.path);\\n        if (typeof value === 'number') {\\n            const clampedValue = Math.max(config.min, Math.min(config.max, value));\\n            if (clampedValue !== value) {\\n                console.log(\`[\${SCRIPT_NAME}] [數值範圍修正] \${config.path}: \${value} -> \${clampedValue}\`);\\n                _.set(variables, config.path, clampedValue);\\n            }\\n        }\\n    }\\n}\\n\\n// --- 腳本生命周期管理 (這部分無需更改) ---\\nlet scriptInitialized = false;\\n\\nfunction initializeEventListeners() {\\n    if (scriptInitialized) return;\\n    const Mvu = window.Mvu || window.parent?.Mvu || window.top?.Mvu;\\n    if (Mvu) {\\n        eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, onVariableUpdateEnded);\\n        scriptInitialized = true;\\n        console.log(\`[\${SCRIPT_NAME}] \${SCRIPT_VERSION} 已啟動。\`);\\n    } else {\\n        setTimeout(initializeEventListeners, 2000);\\n    }\\n}\\n\\nfunction cleanup() {\\n    const Mvu = window.Mvu || window.parent?.Mvu || window.top?.Mvu;\\n    if (Mvu) eventRemoveListener(Mvu.events.VARIABLE_UPDATE_ENDED, onVariableUpdateEnded);\\n    scriptInitialized = false;\\n}\\n\\n$(() => {\\n    setTimeout(initializeEventListeners, 1000);\\n});\\n\\n$(window).on('unload', cleanup);\\n\\n","info":"","button":{"enabled":true,"buttons":[]},"data":{}},{"type":"script","enabled":false,"name":"診斷","id":"c07601d7-9d69-41fb-834a-dcbe850ccdec","content":"/**\\n * 世界書《創世域沉淪詩篇》專屬變量監護系統 - Mvu對象結構終極診斷腳本\\n * Tavern Helper 全局腳本 v-Final-Debug\\n *\\n * @description\\n * 這是一個診斷專用腳本，它不執行任何遊戲邏輯修正。\\n * 它的唯一作用是，在變量更新結束后，捕獲 Mvu 實例 (即“遊戲管理員工具箱”)，並將其完整的內部結構打印到開發者控制台中。\\n * 這是解決“找不到 addCommands 函數”這一終極問題的唯一正確途徑。\\n */\\n\\n// --- 全局配置 ---\\nconst SCRIPT_NAME = '創世域沉淪詩篇-Mvu終極診斷腳本';\\nconst SCRIPT_VERSION = 'v-Final-Debug';\\n\\nlet scriptInitialized = false;\\nlet hasLogged = false; // 添加一個標誌位，確保只打印一次，避免信息刷屏\\n\\n// --- 輔助函數 ---\\nfunction getMvuInstance() { try { return window.Mvu || window.parent?.Mvu || window.top?.Mvu || null; } catch (e) { return null; } }\\n\\n// --- 主診斷函數 ---\\nfunction onVariableUpdateEnded(variables) {\\n    if (hasLogged) return; // 如果已經記錄過，就直接退出，避免重複輸出\\n\\n    console.log(\`[\${SCRIPT_NAME}] 事件已觸發，正在嘗試捕獲並分析 Mvu 實例...\`);\\n\\n    const Mvu = getMvuInstance();\\n    \\n    if (Mvu) {\\n        hasLogged = true; // 標記為已成功記錄\\n        console.log(\`%c[\${SCRIPT_NAME}] [成功捕獲] Mvu 實例已找到！正在打印其完整結構...\`, 'color: #4CAF50; font-weight: bold;');\\n        console.log('------------------- Mvu 實例(“管理員工具箱”) 結 構 分 析 開 始 -------------------');\\n\\n        // 打印完整的 Mvu 對象，這是最有價值的信息\\n        console.log('[診斷] 完整的 Mvu 對象本身:', Mvu);\\n\\n        // 嘗試遍歷並打印 Mvu 對象的第一層所有屬性和方法的名稱\\n        try {\\n            console.log('[診斷] Mvu 對象的第一層鍵名 (Keys):', Object.keys(Mvu));\\n        } catch (e) {\\n            console.error('[診斷] 無法獲取 Mvu.keys', e);\\n        }\\n        \\n        console.log('------------------- Mvu 實例(“管理員工具箱”) 結 構 分 析 結 束 -------------------');\\n        console.log(\`%c[\${SCRIPT_NAME}] 診斷完成。請將以上 \\"-----\\" 分割線內的所有內容，全部複製併發送給我。\`, 'color: #FF5722; font-weight: bold;'
