or Armor or Accessory.  And it's also for backward compatibility).\\n    Math & Logic:\\n      - GUI handles equip/unequip stat recalculation in MOST cases except newly add Familiar and narrative to equip/unequip.\\n      - AI MUST recalculate stats ONLY in these TWO cases:\\n        1. New Familiar created with equipment — GUI equip flow does not run for newly generated familiars.\\n        2. Narrative equip/unequip — user tells a character to equip/unequip an item via story dialogue, and AI moves item to/from Equipment path.\\n      - Recalculation steps (MANDATORY for above two cases):\\n        IMPORTANT — CURRENT_VARIABLE_DATA stats already include bonuses from OLD equipped items\\n        (because the GUI previously applied them). You MUST strip old bonuses first to find\\n        TRUE base stats, then apply the NEW equipment set.\\n\\n        Step 1 — Identify OLD and NEW equipment sets:\\n          a. List ALL items currently in the character's Equipment path in <CURRENT_VARIABLE_DATA> (the OLD set).\\n          b. Determine which items are being removed/unequipped and which are being added/equipped.\\n          c. List the FINAL equipment set AFTER the change (the NEW set) with all their stat bonuses.\\n\\n        Step 2 — Derive TRUE base stats (strip OLD equipment bonuses):\\n          The stats in <CURRENT_VARIABLE_DATA> (Strength, Agility, etc.) already have OLD equipment bonuses baked in.\\n          For EACH core stat, subtract ALL bonuses from the OLD equipment set:\\n            true_base_Str = CURRENT_Strength − sum(StrBonus from OLD items)\\n            true_base_Agi = CURRENT_Agility − sum(AgiBonus from OLD items)\\n            true_base_Con = CURRENT_Constitution − sum(ConBonus from OLD items)\\n            true_base_Int = CURRENT_Intelligence − sum(IntBonus from OLD items)\\n            true_base_Wis = CURRENT_Wisdom − sum(WisBonus from OLD items)\\n          Show each calculation explicitly.\\n          EXCEPTION — New Familiar (no CURRENT_VARIABLE_DATA): use stats from <fam_stat_scratch_check> as true base stats directly (no stripping needed).\\n\\n        Step 3 — Apply NEW equipment bonuses to true base stats:\\n          For EACH core stat, add ALL bonuses from the NEW equipment set:\\n            effective_Str = true_base_Str + sum(StrBonus from NEW items)\\n            effective_Agi = true_base_Agi + sum(AgiBonus from NEW items)\\n            effective_Con = true_base_Con + sum(ConBonus from NEW items)\\n            effective_Int = true_base_Int + sum(IntBonus from NEW items)\\n            effective_Wis = true_base_Wis + sum(WisBonus from NEW items)\\n          Show each calculation explicitly.\\n\\n        Step 4 — Recalculate ALL 8 derived stats using the EFFECTIVE stats from Step 3 and formulas from <character_attributes_system>. Substitute actual values.\\n\\n        Step 5 — MUST print verification block named <stat_recal_scratch_check> BEFORE <UpdateVariable>.\\n             Required content inside <stat_recal_scratch_check>:\\n               - Character name and Level\\n               - OLD equipment set (list each item and its stat bonuses)\\n               - Stats from CURRENT_VARIABLE_DATA (these include OLD bonuses)\\n               - TRUE base stats after stripping OLD bonuses (show subtraction for each)\\n               - NEW equipment set (list each item and its stat bonuses)\\n               - Effective stat calculations with NEW bonuses (show addition for each):\\n                 Strength = true_base_Str + sum(StrBonus from NEW items) = result\\n                 Agility = true_base_Agi + sum(AgiBonus from NEW items) = result\\n                 Constitution = true_base_Con + sum(ConBonus from NEW items) = result\\n                 Intelligence = true_base_Int + sum(IntBonus from NEW items) = result\\n                 Wisdom = true_base_Wis + sum(WisBonus from NEW items) = result\\n               - Derived stat calculations with substituted values:\\n                 Hp_max  = 20 + (effective_Con × 3) + (Lv × 6) + sum(MaxHPBonus from NEW items) = result\\n                 Sta_max = (50 + (effective_Con × 3) + (effective_Agi × 2) + (Lv × 5)) / 3 = result\\n                 Mp_max  = (50 + (effective_Int × 4) + (effective_Wis × 2) + (Lv × 5)) / 3 + sum(MaxMPBonus from NEW items) = result\\n                 Physical_attack  = (effective_Str × 2) + (Lv × 2) + sum(WeaponDamage from NEW items) = result\\n                 Magic_attack     = (effective_Int × 2) + (Lv × 2) + sum(WeaponMagDamage from NEW items) = result\\n                 Physical_defense = (effective_Con / 2) + (Lv × 3) + sum(ArmorPDefBonus from NEW items) = result\\n                 Magic_defense    = (effective_Wis / 2) + (Lv × 3) + sum(ArmorMDefBonus from NEW items) = result\\n                 Magic_assist     = (effective_Wis × 1.5) + (effective_Int × 0.5) + (Lv × 1.5) = result\\n               - Final verdict: PASS (all 8 stats calculated and strip/re-apply verified) or FAIL (missing stats or wrong formula)\\n        Step 6: If verdict is FAIL, STOP and regenerate stats. Do NOT output JSONPatch until PASS.\\n        Step 7: For new familiars, set curr = max (Hp_curr = Hp_max, etc.). For narrative equip, adjust max only; keep curr unchanged unless curr > new max.\\n        Step 8: Generate JSONPatch for ALL recalculated fields (core stats AND derived stats) using replace. Do NOT rely on previous JSONPatch. Always read <CURRENT_VARIABLE_DATA>.\\n\\nSKILLS RULES\\n  path: /Mainchar/Skills\\n  check:\\n    - Only Mainchar can have skills.\\n    - Skills may be objects or numeric values.\\n    - Updates should target individual skill keys.\\n\\nQUEST RULES\\n  path: /Mainchar/Quests\\n  required_fields:\\n    - Desc\\n    - Reward\\n    - Difficulty\\n    - Status\\n    - LastUpdated\\n  check:\\n    - Only Mainchar can have quests.\\n    - LastUpdated in the format of \\"1577-07-28 18:30\\"\\n    - Quests should contain a description.\\n    - Completed quests must be removed.\\n\\nREA
