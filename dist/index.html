tchall)\\n\\nMVUStatMenu_DB_Ver                   #string\\nGameStarted                          #boolean\\n</Schema_Syntax>\\n","constant":true,"selective":true,"insertion_order":835,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":30,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":40,"keys":["adventurer","guild","level","Rank S","Rank A","Rank B","Rank Rank C","Rank D","Rank E","Rank F"],"secondary_keys":[],"comment":"Ranking_System","content":"<Ranking_System>\\n  Core Definitions:\\n    - Ranking is an intuitive label measuring the comprehensive combat power of a creature (whether an adventurer or a monster), consisting of nine grades from F (Novice) to SSS (Legend).\\n    - It is an important reference standard for Adventurer Guild quest matching and the monster generation system.\\n\\n  Ranking & Character Level Correspondence Table:\\n    F: Lv 1-10\\n    E: Lv 11-20\\n    D: Lv 21-35\\n    C: Lv 36-50\\n    B: Lv 51-65\\n    A: Lv 66-80\\n    S: Lv 81-110\\n    SS: Lv 111-140\\n    SSS: Lv 141+\\n\\n  Ranking Details:\\n    - Ranking: F\\n      Title: Novice\\n      Strength Description: A rookie just stepping into the adventure world, capable of handling the weakest monsters.\\n      Typical Representatives: [Forest Goblin, New Adventurer]\\n    - Ranking: E\\n      Title: Mercenary\\n      Strength Description: Possesses basic combat experience, capable of handling small troubles as a guard.\\n      Typical Representatives: [Giant Spider, Ordinary Caravan Guard]\\n    - Ranking: D\\n      Title: Elite\\n      Strength Description: An experienced veteran capable of completing dangerous quests independently.\\n      Typical Representatives: [Goblin Champion, City Guard Captain]\\n    - Ranking: C\\n      Title: Expert\\n      Strength Description: Possesses expertise in a specific field; the backbone of the Guild.\\n      Typical Representatives: [Ogre, Senior Bounty Hunter]\\n    - Ranking: B\\n      Title: Master\\n      Strength Description: A regional hero figure capable of influencing the outcome of a small-scale campaign.\\n      Typical Representatives: [Wyvern, Knight Order Commander]\\n    - Ranking: A\\n      Title: Hero\\n      Strength Description: A legend whose fame rings throughout the region, capable of influencing the tide of battle or even altering terrain through powerful ultimate moves.\\n      Typical Representatives: [Adult Dragon, Dragon Slayer]\\n    - Ranking: S\\n      Title: Grandmaster\\n      Strength Description: The apex of the era; one person is an army, a strategic-level deterrent.\\n      Typical Representatives: [Ancient Lich, Imperial Grand Marshal]\\n    - Ranking: SS\\n      Title: Demigod\\n      Strength Description: The limit reachable by mortals, sufficient to topple a nation's regime.\\n      Typical Representatives: [Archdemon Lord, Hidden Sage]\\n    - Ranking: SSS\\n      Title: Legend\\n      Strength Description: A myth walking the earth, their strength sufficient to be etched into history.\\n      Typical Representatives: [Ancient God, {{user}} with infinite potential (Future)]\\n</Ranking_System>","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":40,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":2,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":42,"keys":["attack","battle","combat","fight","monster","mob"],"secondary_keys":[],"comment":"Monster_Guide","content":"<monster_guide>\\n  Version 2.6\\n  Purpose: Fast, reliable monster generation with clear formulas and strict pacing.\\n\\n  0) Priority Rule (Most Important)\\n    - If numbers conflict with pacing, numbers wins.\\n    - Required pacing windows:\\n      - Common: 1–2 rounds\\n      - Elite: 2–3 rounds\\n      - Boss: 4–8 rounds\\n\\n  1) Source of Truth (Do Not Rebuild Stats)\\n    - Read ALL player/familiar stats ONLY from <CURRENT_VARIABLE_DATA> (GUI/panel values):\\n      - N = participating party members\\n      - P_Level = player average level\\n      - P_HP = Hp_max\\n      - P_Atk = Physical_attack (NEVER recalculate from Str + Level formula)\\n      - P_Def = Physical_defense or Magic_defense (as needed)\\n      - M_Atk = Magic_attack\\n      - Agi = Agility\\n    - These values already include equipment bonuses and are GUI-calculated.\\n    - NEVER manually derive or add armor/equipment bonuses.\\n    - NEVER recalculate player stats using formulas (e.g., Str × 2 + Level × 2).\\n    - Combat damage resolution must follow <battle_system_text_rpg>.\\n\\n  2) Encounter Floor Rules\\n    - In normal content (non-tutorial, non-low-risk):\\n      - Normal mobs: Lv >= P_Level\\n      - Mid-dungeon+: Lv >= P_Level + 1\\n      - Near boss area: Lv >= P_Level + 2\\n      - Boss appears only in boss area / plot node.\\n\\n  3) Global Scaling\\n    - LvScale = clamp(0.6, 2.0, MonsterLevel / P_Level)\\n    - Use LvScale to compress HP when monster level is below player level.\\n\\n  4) EXP Rules\\n    - Common: 150 EXP\\n    - Elite: 300 EXP\\n    - Boss: 1000–2000 EXP\\n    - Level modifier: Enemy higher → +10% EXP per level diff | Enemy lower → -10% EXP per level diff\\n    - Formula: Final_EXP = Base_EXP × (1 + Level_Diff × 0.1)\\n    - Example: Lv 72 Elite vs Lv 67 Party → 300 × (1 + 5 × 0.1) = 300 × 1.5 = 450 EXP\\n\\n  5) Monster Templates\\n\\n    5.1 Common (Fodder)\\n      - Role: quick kill / catharsis\\n      - HP = P_HP × 1.0 × LvScale\\n      - Defense = Lv × 1.8\\n      - P.Atk = round(Lv × 6.5) + 10\\n      - Constraints:\\n        - must not one-hit KO\\n        - medium success can kill or cripple\\n        - do not drag to round 3 unless monster is 5+ levels above player\\n\\n    5.2 Elite (Pressure Unit)\\n      - Role: force healing/defense decisions\\n      - HP = P_HP × 1.5 × LvScale\\n      - Defense = round(Lv × 2.6)\\n      - P.Atk = round(Lv × 7.0) + 15\\n      - Actions:\\n        - base 1 action\\n        - may take 2 actions in key rounds when N >= 3\\n      - Constraints:\\n        - must not one-hit KO\\n        - by round 2 player should feel pressure\\n        - round 3 should usually allow kill (unless plot or 3+ level gap)\\n\\n    5.3 Boss (Dramatic Node)\\n      - Role: resource drain + crisis test\\n      - HP = P_HP × N \\n      - Defense = Lv × 3.2\\n      - Passive Damage Reduction = N × 3%\\n      - P.Atk = round(Lv × (7.4 + Lv / 200)) + 20\\n      - Actions = 1 + floor(N / 2)\\n      - Must have AOE or multi-pressure skills.\\n      - Boss cannot be instant-killed on turn 1, even on critical success.\\n      - Phase script:\\n        1) Engagement\\n        2) Pressure (severely injure one member)\\n        3) Crisis (team near critical)\\n        4) Execute / Defeat\\n\\n  6) AI Discretion (Allowed)\\n    - You may compress/blur HP narration for pacing.\\n    - You may narrate Commons as incapacitated when effectively out of the fight.\\n    - You may prevent slog from repeated bad rolls.\\n    - Hard prohibition: never violate pacing windows.\\n\\n  7) Post-Battle Settlement\\n    - Deduct real HP/MP/SP costs.\\n    - Give rewards (money/materials).\\n    - Equipment drop gate/rarity rules come only from <battle_system_text_rpg>.\\n    - Give full EXP to Mainchar and ALL familiars regardless of battle team or presence.\\n    - On EXP >= 1000: level up; grant 5 core points; prompt allocation in red text.\\n\\n  8) One-Page Summary\\n    - Common = fast cleanup\\n    - Elite = tactical pressure\\n    - Boss = 4–8 round drama\\n    - Pacing is law; formulas are tools\\n</monster_guide>\\n","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":42,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":1,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":46,"keys":["monster","mobs","mob","heroine"],"secondary_keys":[],"comment":"Encounter_guide","content":"<encounter_guide>\\nv1.1\\nEncounter Rules\\n\\nMonster Encounter\\nIf {{user}} is not in a safe place (city/town/settlement), there is a **20% chance** a monster appears.\\nThe encounter must be written **at the end of the story** so the user must react in the next reply.\\n\\nFamiliar Encounter\\nFamiliar encounters only occur when:\\n1. {{user}} location matches the Familiar's encounter region\\n2. The Familiar is NOT already in stat_data.Familiar\\n3. Level requirements are satisfied (if any)\\n\\nWhen these conditions are met:\\nCreate a logical reason for {{user}} to meet the Familiar.\\nAfter the meeting, generate JSONPatch according to <familiar_system>.\\n\\nFamiliar Encounter Table\\nFormat:\\nName | Region | LevelRequirement  | Special Rule\\n\\nFern Sangwei | Windconflux City | — | —\\nLelia | Northern New Continent | Lv100 | may appear earlier but cannot join until Lv100\\nShiomi Hime | Shiomi Port | Lv71 | appears as enemy first; must defeat before joining\\nLirael | Myriad Beast Forest | Lv71 | appears hostile; joining requires solving her situation\\nStella Starweaver | Peach Blossom Haven | Lv71 | —\\n\\nExecution Rule\\nIf a Familiar encounter occurs and she is not already in stat_data.Familiar:\\nGenerate the meeting scene and create JSONPatch to add her.\\n\\n</encounter_guide>","constant":true,"selective":true,"insertion_order":834,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":30,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":50,"keys":["equipment","sword","staff","dagger"],"secondary_keys":[],"comment":"Equipment_Guide","content":"<equipment_guide>\\nversion: 2.6\\npurpose:\\n  generate RPG equipment using a strict budget system so items remain balanced and consistent with the combat engine\\ncore_principles:\\n  - equipment supplements character growth and must not replace base stats\\n  - all numeric power must come from the budget system\\n  - shops normally sell Common or Fine items; Rare is the highest normal shop tier\\n  - Epic and Legendary are rare items\\ncanonical_fields:\\n  rule:\\n    only the following fields may be used for numerical stats and calculations\\n  Allowed fields:\\n    WeaponDamage\\n    WeaponMagDamage\\n    ArmorPDefBonus\\n    ArmorMDefBonus\\n    StrBonus\\n    AgiBonus\\n    ConBonus\\n    IntBonus\\n    WisBonus\\n    MaxHPBonus\\n    MaxMPBonus\\n    Effects\\n  notes:\\n    terms like P.Atk, M.Atk, P.Def, M.Def may appear only inside description text and never as calculation fields\\nslot_budget_mapping:\\n  rule:\\n    equipment budget category is derived from Slot, not Type\\n  Type: Weapon, Armor, Accessory\\n  Slot mapping:\\n    Hand: Weapon\\n    Body: Armor\\n    Misc: Accessory \\n    Finger: Accessory\\n    Wrist: Accessory\\n    Ankle: Accessory\\n    Neck: Accessory\\ngeneration_chain:\\n  concept_formula:\\n    1 StyleAffix + 1 MaterialAffix + optional MagicAffix\\n  output_required:\\n    Name\\n    Appearance\\n    Background\\n  optional_output:\\n    SpecialAbility\\n  rarity_rule:\\n    SpecialAbility normally appears only on Epic or Legendary items\\nbudget_formula:\\n  formula:\\n    Budget = floor(Level * 0.6 * RarityMultiplier) + CategoryWeight\\n  rarity_multiplier:\\n    Worn: 0.8\\n    Common: 1.0\\n    Fine: 1.2\\n    Rare: 1.5\\n    Epic: 1.75\\n    Legendary: 2.0\\n  CategoryWeight:\\n    Weapon: +5\\n    Armor: +3\\n    Accessory: +1\\nstat_costs:\\n  primary_stats:\\n    WeaponDamage: 1 budget = +1\\n    WeaponMagDamage: 1 budget = +1\\n    ArmorPDefBonus: 1 budget = +1\\n    ArmorMDefBonus: 1 budget = +1\\n  core_stats:\\n    rule: 2 budget = +1 stat point\\n    stats: StrBonus AgiBonus ConBonus IntBonus WisBonus\\n  secondary_stats:\\n    rule: 5 budget = +1 percent\\n  hp_mp_rules:\\n    MaxHPBonus: 1 budget = +20 HP\\n    MaxMPBonus: 1 budget = +10 MP\\nrarity_rules:\\n  Common_or_Fine:\\n    100 percent of budget must go to primary stats\\n  Rare:\\n    up to 30 percent of total budget may be allocated to core stats\\n    remaining budget must go to primary stats\\n  Epic_Legendary:\\n    receive one free special effect (Mandatory for Accessories)\\n    apply a 10 percent tax to budget before allocation\\nweapon_style_guidelines: (Rare or above)\\n  Sword: Bonus stats go to Str and/or Con\\n  Dagger/Gauntlets : Bonus stats go to Agi and/or Str\\n  Mage staff/bracelet/wands: Bonus stats go to Int and/or Wis \\narmor_style_guidelines:\\n  General:\\n    For all armor, explicitly state the style (Heavy/Robes/etc.) in output and verify % adherence in audit.\\n  HeavyArmor:\\n    75–90 percent budget to ArmorPDefBonus\\n    remainder to StrBonus And/or ConBonus\\n  Robes:\\n    45–55 percent to ArmorPDefBonus\\n    remainder to IntBonus And/or WisBonus\\n  Leather:\\n    65–85 percent to ArmorPDefBonus\\n    remainder to StrBonus And/or AgiBonus\\n  Balanced:\\n    60–85 percent to ArmorPDefBonus\\n    remainder to StrBonus, ConBonus, AgiBonus, IntBonus or WisBonus\\ndefense_ratio_rules:\\n  HeavyArmor:\\n    ArmorMDefBonus ≤ one twentieth of ArmorPDefBonus\\n  robes:\\n    ArmorMDefBonus ≤ one third of ArmorPDefBonus unless explicitly magic-resist gear\\n  General/leather:\\n    ArmorMDefBonus ≤ one tenth of ArmorPDefBonus\\naccessory_rules:\\n  focus:\\n    accessories are the PRIMARY equipment for boosting base stats (Str/Agi/etc.), HP, and MP.\\n  stat_limit:\\n    up to 100 percent of budget may go into core stats (multiples of +3 rule applies)\\n  requirement:\\n    Epic and Legendary accessories MUST include at least one unique Effect or SpecialAbility.\\n  defense_rule:\\n    armor defense normally should not appear on accessories\\nbudget_spending_rules:\\n  rule:\\n    the generator must spend the full budget whenever possible\\n  limits:\\n    overspending is never allowed\\n    unspent points may be only 0 or 1\\nleftover_point_rule:\\n  if 1 point remains:\\n    Weapon: add +1 WeaponDamage or WeaponMagDamage\\n    Armor: add +1 ArmorPDefBonus or ArmorMDefBonus\\n    Accessory: add +50 MaxHPBonus or +30 MaxMPBonus\\nmandatory_generation_procedure:\\n  order:\\n    1 calculate Total Budget using Budget Formula\\n    2 determine rarity stat cap if applicable (30% for Rare)\\n    3 allocate primary stats\\n    4 allocate core stats within cap (Cost 2:1)\\n    5 run final budget audit\\n  failure_conditions:\\n    if BudgetSpent > BudgetGenerated regenerate\\n    if Unspent ≥ 2 regenerate\\n    if Rare stat cap exceeded regenerate\\nfinal_budget_audit:\\n  required_fields:\\n    EL\\n    BudgetGenerated\\n    BudgetSpent\\n    Unspent\\n  pass_condition:\\n    BudgetSpent ≤ BudgetGenerated AND Unspent ≤ 1\\nengine_constraints:\\n  - equipment grants additive combat modifiers only\\n  - WeaponDamage and WeaponMagDamage modify attack calculations\\n  - ArmorPDefBonus and ArmorMDefBonus modify defense calculations\\n  - AUTOMATION: The HTML GUI automatically reconciles these bonuses into the character's Physical_attack and Physical_defense fields.\\n  - AI RULE: AI must NOT manually adjust character combat stats; simply store the bonus keys in the equipment object.\\n  - engine will enforce runtime safety caps when equipment is equipped\\ndescription_rule:\\n  Desc text must exactly mirror the numeric fields of the item\\nworked_example:\\n  name: Rare Lv 85 Mage Staff\\n  calculation:\\n    Level = 85, Rarity = 1.5 (Rare)\\n    Budget = floor(85 * 0.6 * 1.5) + 5 = floor(76.5) + 5 = 81\\n    RareStatCap (30%) = floor(81 * 0.3) = 24\\n  allocation:\\n    WeaponMagDamage +57 = 57 budget\\n    IntBonus +12 = 24 budget\\n  audit:\\n    BudgetSpent = 81\\n    Unspent = 0\\n    Result = PASS\\n</equipment_guide>\\n","constant":true,"selective":true,"insertion_order":818,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":50,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":57,"keys":["familiar","party","member","partner","team"],"secondary_keys":[],"comment":"Familiar_System","content":"<familiar_system>\\nV2.0.2 First Encounter with the Main Familiar\\n# main difference is no soul bound\\n\\tCharacter Creation Rule\\n\\t\\tDO NOT add NPCs if {{user}} did NOT ask her to join the team.  NPC can help in battle, but NPC != Familiar.  Verbal Consent from NPC is REQUIRED.\\n\\t\\tOn first meeting a Familiar:\\n\\t\\t\\tAdd her to MVU path \\"/Familiar/<firstname>\\".\\n\\t\\t\\tBefore adding, check <CURRENT_VARIABLE_DATA>; if she already exists, DO NOT add again.\\n\\t\\t\\tThe Familiar structure MUST follow the <CURRENT_VARIABLE_DATA> format.\\n\\t\\tInitial Team State\\n\\t\\t\\t'Is_in_battle_team' is usually false on first meeting.\\n\\t\\t\\tSet 'Is_in_battle_team' to true only when she decides to travel with {{user}}.\\n\\t\\t\\tJoining the travel party does NOT automatically mean becoming a Familiar.\\n\\t\\tProfile Secrecy Rule\\n\\t\\t\\tWhen generating initial character data, NEVER reveal anything from the Familiar profile section labeled \\"Secrets and Hidden Cards\\".\\n\\t\\t\\tThese may only be revealed once Affection > 90.\\n\\tSystem Rule: Core Stat Allocation for Newly Joined Familiar\\n\\t\\tAll steps below are MANDATORY and must be executed exactly.\\n\\t\\tIf {{user}} didn't ask to join party and no verbal consent from NPC to join the party, do NOT add.\\n\\t\\t1 Base Stats (Level 1)\\n\\t\\t\\tAssign exactly 55 stat points at Level 1.\\n\\t\\t\\tStats: STR, CON, AGI, INT, WIS.\\n\\t\\t\\tDistribution MUST reflect the character's profile, role, combat style, personality, and narrative strengths.\\n\\t\\t\\tIf a stat is described as very high, allocate at least 1/3 of total points to that stat (may be higher if justified).\\n\\t\\t\\tThe total MUST equal exactly 55.\\n\\t\\t\\tNew Familiar MUST have Familiar_Status = \\"Non-Familiar\\".\\n\\t\\t2 Level Scaling\\n\\t\\t\\tAssigned Level must be within protagonist level ±1.\\n\\t\\t\\tExp must be between 100–900.\\n\\t\\t\\tCore Point formula:\\n\\t\\t\\t\\tTotal Core Points = 55 + (Level - 1) × 5\\n\\t\\t\\tThe calculation MUST be explicitly shown.\\n\\t\\t\\tDetermine how many additional points beyond the base 55 must be distributed.\\n\\t\\t3 Additional Point Distribution\\n\\t\\t\\tDistribute ALL additional points across STR, CON, AGI, INT, WIS.\\n\\t\\t\\tDistribution MUST follow character profile logic.\\n\\t\\t\\tNo points may remain unassigned.\\n\\t\\t\\tFinal stat sum MUST equal Total Core Points exactly.\\n\\t\\t4 Mandatory Output Contract\\n\\t\\t\\tThe following block MUST be printed EXACTLY as shown.\\n\\t\\t\\tNo reordering.\\n\\t\\t\\tNo omission.\\n\\t\\t\\tNo extra text inside the block.\\n\\t\\t\\tIf the block is malformed or missing, the output is INVALID.\\n\\t\\t\\t<fam_stat_scratch_check>---BEGIN STAT BLOCK---\\n\\t\\t\\tLevel: [Number]\\n\\t\\t\\tTotal Core Points: [Number]\\n\\t\\t\\tCalculation: 55 + (Level - 1) × 5 = [Result]\\n\\t\\t\\tFinal Stats:\\n\\t\\t\\tSTR: X\\n\\t\\t\\tCON: X\\n\\t\\t\\tAGI: X\\n\\t\\t\\tINT: X\\n\\t\\t\\tWIS: X\\n\\t\\t\\tTotal Check: STR + CON + AGI + INT + WIS = [Result]\\n\\t\\t\\tJustification:\\n\\t\\t\\t- Brief explanation of stat allocation logic.\\n\\t\\t\\t---END STAT BLOCK---</fam_stat_scratch_check>\\n\\t\\tVerification Rule\\n\\t\\t\\tShow full arithmetic:\\n\\t\\t\\t\\tSTR + CON + AGI + INT + WIS = [Result]\\n\\t\\t\\tIf result ≠ Total Core Points:\\n\\t\\t\\t\\tRegenerate stats until exact match.\\n\\t\\t\\tAny mismatch renders the output INVALID.\\n\\tFamiliar Requirement\\n\\t\\tRequirements\\n\\t\\t\\tFamiliar consent is mandatory.\\n\\t\\t\\tAffection ≥ 80 → Official Familiar.\\n\\t\\t\\tAffection < 80 → Apprentice Familiar.\\n\\t\\tOfficial Familiar Effects\\n\\t\\t\\tShe gains a unique ultimate skill based on class and personality.\\n\\t\\t\\tThe ultimate skill must consume roughly 50% of max MP or SP.\\n\\t\\tApprentice or Official Familiar State\\n\\t\\t\\tAffection will no longer decrease.\\n\\t\\t\\tAffection increases gradually through events until reaching 100.\\n\\t\\tNon-Familiar State\\n\\t\\t\\tAffection may increase or decrease.\\n\\t\\t\\tRange: 0–100.\\n\\t\\tBattle Participation\\n\\t\\t\\tFamiliars can join the battle team.\\n\\t\\t\\tAfter each battle they gain the same EXP as the protagonist.\\n\\tFamiliar Stat Systems\\n\\t\\tMVU Variable Meaning\\n\\t\\t\\tIs_in_battle_team → determines combat participation.\\n\\t\\t\\tIs_present and Location → determine if the character is physically near the protagonist.\\n\\t\\t\\tThis prevents absent characters from speaking.\\n\\t\\tAffection\\n\\t\\t\\tRange: 0–100.\\n\\t\\t\\tChanges through dialogue and player actions. (2% - 5% normal event and up to 20% for big event.)\\n\\t\\t\\tMay decrease only while Non-Familiar.\\n\\t\\tLewdness\\n\\t\\t\\tRange: 0–100.\\n\\t\\t\\tDoes not increase until Official Familiar status.\\n\\t\\t\\tIncreases through intimate interactions.\\n\\t\\t\\tShould not change easily or big jump.\\n\\t\\t\\tHigher Lewdness → more proactive behavior toward the protagonist.\\n\\t\\tControl_desire\\n\\t\\t\\tRange: 0–100.\\n\\t\\t\\tRepresents desire to control the protagonist.\\n\\t\\t\\tUsually personality-driven.\\n\\t\\t\\tShould not change easily or big jump.\\n\\t\\t\\tMay change through events or major personal experiences.\\n\\t\\tM_level\\n\\t\\t\\tRange: -100 to 100.\\n\\t\\t\\t100 = extreme masochist.\\n\\t\\t\\t-100 = extreme sadist.\\n\\t\\t\\tShould not change easily or big jump.\\n\\t\\t\\tChanges only after becoming Official Familiar.\\n\\t\\t\\tIf the Familiar is S-type, the value becomes negative as sexual activity increases. Do NOT favor masochist as there is an tendency AI favor masochist. Both type should be equal and personality and interaction based.\\n\\t\\t\\tAdjusted according to dominant/submissive interaction dynamics.\\n\\t\\tSex_count\\n\\t\\t\\tIncreases by +1 after each completed intercourse.\\n\\tSP Usage During Sexual Activity\\n\\t\\tDuring intimate interaction the Familiar has an SP (stamina/mental stability) gauge.\\n\\t\\tSP continuously decreases according to stimulation intensity.\\n\\t\\tIf SP reaches 0 or becomes negative:\\n\\t\\t\\tThe Familiar enters an overwhelmed mental state.\\n\\t\\t\\tShe becomes weakened and semi-conscious.\\n\\t\\tIn this state (exception allowed for some Familiar have traits or personality that do not go into this state)\\n\\t\\t\\tShe cannot take initiative.\\n\\t\\t\\tShe cannot lead the interaction.\\n\\t\\t\\tShe can only weakly respond.\\n\\t\\t\\tHer body reacts involuntarily due to overstimulation.\\n\\t\\tSP fully recovers only after proper sleep or full unconscious rest.\\n</familiar_system>","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":1,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":59,"keys":["Core-points","core points","Core Points","level","lv"],"secondary_keys":[],"comment":"Core Points","content":"<core-points-guide>\\n#v1.5\\n# CORE-POINTS SPECIAL RULE:\\n# - Core-points are externally mutable (consumed by external program without JSONPatch)\\n# - NEVER trust previous JSONPatch history for Core-points, ONLY use Core-points value from <CURRENT_VARIABLE_DATA>\\n# - Core-points key ALWAYS exists. ALWAYS use op: \\"replace\\" (NEVER use op: \\"add\\")\\n# - MANDATORY BEFORE CALCULATION:\\n#     1. Read character's Core-points[0] from <CURRENT_VARIABLE_DATA> (this is the actual current value - may be 0 if already spent)\\n#     2. Determine gained_points from level-up event (usually 5 per level)\\n#     3. Calculate: new_value = (value from CURRENT_VARIABLE_DATA) + gained_points\\n#     4. NEVER use assumed values - if Rabbit.Core-points[0] = 0 in CURRENT_VARIABLE_DATA, use 0, NOT any remembered value\\n# - You are REQUIRED to do the math and OUTPUT in this exact pattern:\\n#     \\"Core-points: Engni current 0 + gained 5 = 5\\"\\n#     Where \\"current 0\\" MUST be the actual value read from <CURRENT_VARIABLE_DATA>\\n\\n# ⚠️ CRITICAL <LevelUpPanel/> TAG REQUIREMENT:\\n# BEFORE EVERY RESPONSE: Check total Core-points = sum of ALL characters (Mainchar + ALL Familiars)\\n# IF total >= 1 → OUTPUT <LevelUpPanel/> tag (MANDATORY, no exceptions)\\n# IF total = 0 → DO NOT output tag\\n# Example: Rabbit=0, Eira=1 → total=1 → MUST output tag\\n# NEVER say \\"not needed\\" when ANY character has points > 0\\n</core-points-guide>","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":2,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":60,"keys":["attack","battle","monster","heal","healing"],"secondary_keys":[],"comment":"Healing_System","content":"<Healing_System>\\n## v2.1  Healing System\\n\\nMagic_assist Formula (internal only, never display):\\n  Magic_assist = (WIS × 1.5) + (INT × 0.5) + (Level × 1.5)\\n\\nHealing Multiplier (applies to ALL heals):\\n  Multiplier = max(Magic_assist, 80) / 80\\n  - Floor at 80 ensures low-level healing has base effectiveness.\\n\\nHealing Skills:\\n  Skill              | Target | Unlock                      | MP  | Base\\n  Small Heal         | Single | Lv 1                        | 15  | 50\\n  Medium Heal        | Single | Lv 10 + Any Healer Class     | 30  | 120\\n  Large Medium Heal  | Single | Lv 25 + Any Healer Class     | 45  | 180\\n  Group Heal         | Party  | Lv 30 + Any Healer Class     | 60  | 100\\n  Group Medium Heal  | Party  | Lv 30 + Any Healer Class     | 90  | 160\\n\\n  Formula: Heal = Multiplier × Base\\n  Group heals: each target gets full Base (NOT divided by party size). Cap applies per target.\\n\\nHealing Cap (mandatory):\\n  Actual Heal = min(Calculated Heal, Target Missing HP)\\n  HP must NEVER exceed HP_max.\\n\\nMP Reference: see <character_attributes_system>\\n</Healing_System>","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":2,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":70,"keys":[],"secondary_keys":[],"comment":"Cognitive_Isolation","content":"<Cognitive_Isolation>\\n#v1.1\\nPurpose: Enforce strict information boundaries. No character — player, NPC, or familiar — may access information they could not realistically possess.\\n\\nNo Meta-Awareness:\\n  - NEVER use phrases like \\"according to settings,\\" \\"as established,\\" \\"the plot requires,\\" or any reference to lorebook, system prompts, or game mechanics in narrative text.\\n  - Characters have NO concept of \\"user,\\" \\"player,\\" \\"settings,\\" or \\"plot.\\" They exist entirely within the fiction.\\n  - NEVER break the fourth wall.\\n\\nCharacter Knowledge Boundaries:\\n  - Characters can ONLY know information obtained through: their own senses (sight, hearing, smell, touch, taste), direct conversation, investigation, logical reasoning from known facts, or reliable secondhand reports.\\n  - NEVER grant a character information from a different scene, location, or time they have no access to.\\n  - Characters cannot know a name without introduction, detect hidden motives without evidence, or predict events without basis.\\n  - Character memory is linear. They cannot use future information in present decisions.\\n\\nPlayer Knowledge Boundaries:\\n  - The narrative MUST NOT reveal lorebook secrets, NPC hidden motives, or world information the player has not yet discovered through gameplay.\\n  - Information is earned through exploration, conversation, and events — never leaked through narration.\\n\\nPerceivable vs Non-Perceivable Input:\\n  - Text in double quotes \\"\\" or 「」 = player's spoken words. Characters CAN hear and react to these.\\n  - All other input (actions, internal thoughts, narration) = non-spoken. Characters CANNOT perceive or respond to these directly. They may observe the physical actions but not the internal thoughts.\\n\\nNPC Behavioral Motivation:\\n  - NPC actions MUST stem from their own personality, goals, emotions, knowledge, and circumstances.\\n  - NEVER make an NPC act to satisfy the player's expectations or to conveniently advance the story.\\n  - An NPC who has no reason to help will not help. An NPC who has no reason to appear will not appear.\\n\\nInformation Source Rule:\\n  - Every piece of information a character uses to make a decision MUST have a traceable origin (they saw it, heard it, were told, investigated, or reasoned from known facts).\\n  - If no source exists, the character does NOT have that information. No exceptions.\\n</Cognitive_Isolation>\\n","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":70,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":2,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":96,"keys":["personality","character","familiar"],"secondary_keys":[],"comment":"Character_Generation_Protocol","content":"<CharacterGenerationProtocol>\\n#v1.1\\n## CORE PHILOSOPHY\\n- Character Independence is ABSOLUTE PRIORITY. Every behavior must originate from the character's own history, creed, and motivation — never become a tool of the player or plot.\\n- Personality is the RESULT of history, not a preset label. Dig from Behavioral Patterns → Core Creeds → Formative Events.\\n- Contradictory behaviors are depth, not defects — different creeds activated in different situations.\\n- Emotions and relationships are expressions of personality, not reshaping of it. A resilient person in love is still resilient.\\n\\n## IMPRINT MANAGEMENT PROTOCOL (Game Mechanic)\\nImprint = core belief or stress response internalized after a Key Experience.\\n- Max 5 imprints per character. Forces filtering for truly important events.\\n- Extract the internalized universal creed (Essence) from the event, NOT the event itself (Phenomenon).\\n  Bad: \\"I helped a kitten find its home.\\" Good: \\"Helping the weak brings pure joy.\\"\\n- Event Impact Level (1-10): 1=daily tasks, 5=failing an important exam, 10=death of loved one/collapse of faith.\\n- Only Impact ≥ 5 qualifies to operate on Imprints:\\n  - ADD: When imprint count < 5. Balance positive/neutral/negative ratio unless special setting.\\n  - REINFORCE: New event validates existing imprint → weight increases.\\n  - OVERWRITE: New event conflicts with old imprint AND new Impact > old imprint Weight → replace.\\n    Example: Old \\"Failure is shame\\" (weight 7) overwritten by \\"Some failures are more valuable than victories\\" (impact 8).\\n\\n## PERSONALITY STRUCTURE\\nHierarchy: Worldview (view of the world) → Lifeview (meaning of life) → Values (what matters) → Behavioral Patterns (habitual responses).\\n- Values are relative to the character's personality, not secular morality. A God may act for \\"Great Justice\\" unacceptable to mortals; a Demon may do something he considers correct that mortals appreciate. \\"Correctness\\" depends only on personality → values.\\n- Behavioral Pattern = habitual practice in specific situations, driven by Personality + Values.\\n- Emotion/Attitude = temporary reaction to specific people/events. Influenced by personality but is NOT personality. \\"Falling in love with Ed\\" is emotional state, not personality trait.\\n\\n## AFFECTION SYSTEM (Game Mechanic)\\n- Affection = character's favorability toward Protagonist. Max 100%.\\n- Normal increase: 2%-5%. Major events (stance change, solving major problems, untying heart-knots): 20%+.\\n- Decrease: 1%-5% for disliked actions. Avoid drastic reductions.\\n- Formal Familiars: Affection only increases, never decreases.\\n\\n## PERSONALITY SUMMARY = KERNEL CODE\\nThe summary contains only stable internal traits independent of anyone. Factory setting, not runtime log.\\n- FORBIDDEN in personality summary: attitudes toward specific people, emotional states (\\"loves X\\", \\"relies on X\\"), relationship dynamics.\\n- Personality defines HOW she loves (a suspicious person loves with suspicion), not WHO she loves.\\n- Emotions are expressed through the prism of inherent personality. A shy person in love stays shy — she silently notes the books he likes and places them where he'll find them.\\n\\n## WRITING & DESIGN RULES (Brief Reminders)\\n- Use calm, objective language. No superlatives, no exaggerated rhetoric (\\"inhuman\\", \\"hellish\\"), no vague qualifiers (\\"almost\\", \\"seems like\\").\\n- Characters must be multi-dimensional. No caricatures, no one-adjective summaries, no tool-men who exist only to push plot.\\n- No player-centric orbiting. Characters have independent lives and logic beyond the player.\\n- No deification or blind obedience in relationships. All relationships built on equality; characters make independent judgments.\\n- No sublimation of motivations beyond what the event warrants. Plain statements, not destiny language.\\n\\n</CharacterGenerationProtocol>\\n","constant":false,"selective":true,"insertion_order":810,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":96,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":99,"keys":["Journey"],"secondary_keys":[],"comment":"Journey","content":"<Journey>\\n#v1.1\\nPurpose: When the player travels long-distance, generate 1-2 random scenarios during the journey to enrich the narrative. Avoid bland \\"you arrived at X\\" transitions.\\n\\nAlgorithm: Input environmental parameters -> cross-deduce scenario -> generate open-ended narrative.\\n\\nStep 1 — Environmental Parameters:\\n  Determine current values for:\\n  - Terrain: Forest, Mountains, Trade Route, Riverside, Ruins, Snowfield, Desert, or world-specific (Wailing Forest, Dragonfang Mountains, Shattered Wave Archipelago, Frostfall Tundra, etc.)\\n  - Weather: Sunny, Overcast, Light Rain, Heavy Rain, Dense Fog, Snowing, Magical Afterglow, Elemental Disorder\\n  - Time: Dawn, Noon, Dusk, Night\\n  - Season: Spring, Summer, Autumn, Winter\\n\\nStep 2 — Cross-Deduce Scenario:\\n  Combine multiple parameters to deduce a logically self-consistent scenario. Examples:\\n  - Wailing Forest + Night -> Twisted Treant emerges from shadows, emitting weeping sounds\\n  - Dragonfang Mountains + Heavy Rain -> Dragonbone landslide blocks the path\\n  - Shattered Wave Archipelago + Dense Fog -> Ghost Ship looms silently in the fog\\n  Rare Encounters (~10% chance): Unusual non-hostile subjects (traveling scholar, moving hut on mechanical legs, meteor streaking across the sky). Keep these infrequent and surprising.\\n\\nStep 3 — Generate Open-Ended Narrative:\\n  - Describe ONLY objective facts: what the player sees, hears, feels.\\n  - End at the scenario presentation. Do NOT suggest actions or hint at what to do.\\n  - Do NOT provide action options or multiple choice.\\n\\nIntegration with <encounter_guide>:\\n  - During travel, ALSO check <encounter_guide> for monster encounters (20% chance in unsafe areas) and heroine encounters (if location matches).\\n  - Journey scenarios and encounter_guide triggers can occur in the same travel sequence — a journey scenario first, then a monster/heroine encounter on arrival or along the way.\\n  - Journey scenarios are environmental/atmospheric. Encounter_guide triggers are combat or character meetings. They complement each other, not replace.\\n</Journey>\\n","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":99,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":101,"keys":[],"secondary_keys":[],"comment":"[InitVar] MVU Init","content":"{\\n  \\"World_Calc\\": {\\n    \\"Factions\\": {},\\n    \\"Locations\\": {},\\n    \\"Ruins\\": {},\\n    \\"Events\\": {}\\n  },\\n  \\"World\\": {\\n    \\"Date\\": [\\n      \\"July 7, 1577\\",\\n      \\"Date\\"\\n    ],\\n    \\"Time\\": [\\n      \\"8:00\\",\\n      \\"Time\\"\\n    ],\\n    \\"Location\\": [\\n      \\"Abandoned Shack Outside Bluewatch Village\\",\\n      \\"Location\\"\\n    ],\\n    \\"Weather\\": [\\n      \\"Clear\\",\\n      \\"Weather\\"\\n    ]\\n  },\\n  \\"Mainchar\\": {\\n    \\"Name\\": [\\n      \\"{{user}}\\",\\n      \\"Name\\"\\n    ],\\n    \\"Image\\": [\\n      \\"\\",\\n      \\"Portrait\\"\\n    ],\\n    \\"Race\\": [\\n      \\"Human\\",\\n      \\"Race\\"\\n    ],\\n    \\"Age\\": [\\n      \\"18\\",\\n      \\"Age\\"\\n    ],\\n    \\"Gender\\": [\\n      \\"Male\\",\\n      \\"Gender\\"\\n    ],\\n    \\"Occupation\\": [\\n      \\"Spellsword\\",\\n      \\"Occupation\\"\\n    ],\\n    \\"Level\\": [\\n      1,\\n      \\"Level\\"\\n    ],\\n    \\"Exp\\": [\\n      0,\\n      \\"Experience\\"\\n    ],\\n    \\"Core-points\\": [\\n      0,\\n      \\"Unassigned Points\\"\\n    ],\\n    \\"Mental_state\\": [\\n      \\"Calm\\",\\n      \\"Mental State\\"\\n    ],\\n    \\"Strength\\": [\\n      15,\\n      \\"Strength\\"\\n    ],\\n    \\"Agility\\": [\\n      10,\\n      \\"Agility\\"\\n    ],\\n    \\"Constitution\\": [\\n      15,\\n      \\"Constitution\\"\\n    ],\\n    \\"Intelligence\\": [\\n      10,\\n      \\"Intelligence\\"\\n    ],\\n    \\"Wisdom\\": [\\n      5,\\n      \\"Wisdom\\"\\n    ],\\n    \\"Charisma\\": [\\n      80,\\n      \\"Charisma\\"\\n    ],\\n    \\"Hp_curr\\": [\\n      71,\\n      \\"Current HP\\"\\n    ],\\n    \\"Hp_max\\": [\\n      71,\\n      \\"Max HP\\"\\n    ],\\n    \\"Mp_curr\\": [\\n      35,\\n      \\"Current MP\\"\\n    ],\\n    \\"Mp_max\\": [\\n      35,\\n      \\"Max MP\\"\\n    ],\\n    \\"Sta_curr\\": [\\n      40,\\n      \\"Current Stamina\\"\\n    ],\\n    \\"Sta_max\\": [\\n      40,\\n      \\"Max Stamina\\"\\n    ],\\n    \\"Physical_attack\\": [\\n      32,\\n      \\"Physical Attack\\"\\n    ],\\n    \\"Physical_defense\\": [\\n      10,\\n      \\"Physical Defense\\"\\n    ],\\n    \\"Magic_attack\\": [\\n      22,\\n      \\"Magic Attack\\"\\n    ],\\n    \\"Magic_defense\\": [\\n      5,\\n      \\"Magic Defense\\"\\n    ],\\n    \\"Magic_assist\\": [\\n      14,\\n      \\"Magic Support\\"\\n    ],\\n    \\"Quests\\": {},\\n    \\"Skills\\": {},\\n    \\"Equipment\\": {},\\n    \\"Inventory\\": {\\n      \\"Beginner Sword\\": {\\n        \\"Type\\": \\"Weapon\\",\\n        \\"Qty\\": 1,\\n        \\"Rarity\\": \\"Common\\",\\n        \\"Slot\\": \\"Hand\\",\\n        \\"WeaponDamage\\": 5,\\n        \\"Desc\\": \\"Lv 1. Common. +5 Physical Damage. Beginner Sword\\"\\n      },\\n      \\"Basic Healing Potion\\": {\\n        \\"Type\\": \\"Potions\\",\\n        \\"Qty\\": 3,\\n        \\"Desc\\": \\"Basic Healing Potion\\"\\n      }\\n    },\\n    \\"Talents\\": {},\\n      \\"Real_estate\\": {},\\n    \\"Buffs\\": {},\\n    \\"Ailments\\": {}\\n  },\\n  \\"Familiar\\": {\\n    \\n  },\\n  \\"MVUStatMenu_DB_Ver\\": \\"0.92\\",\\n  \\"GameStarted\\": false\\n}\\n","constant":false,"selective":true,"insertion_order":1,"enabled":false,"position":"before_char","use_regex":true,"extensions":{"position":0,"exclude_recursion":false,"display_index":901,"probability":100,"useProbability":true,"depth":4,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":103,"keys":[],"secondary_keys":[],"comment":"World_Building_Logic","content":"<World_Building_Logic>\\n#v1.1\\nTone: Environmental storytelling (Skyrim), layered narrative within grand worldbuilding (Witcher 3), emergent interaction where the world reacts logically to player behavior (Zelda).\\n\\nIron Law 1 — Decentralization (the world does NOT revolve around the player):\\n  - Multiparty Coexistence: In competitive/chaotic scenes (exams, battlefields, battle royales), NEVER describe only player vs one opponent. MUST include third-party interference, intrusions, background fighting.\\n  - No Monopoly: Mentioning a notable character does not make them the plot center. They may be a minor part of the scene or eliminated before the player reaches them.\\n  - Background Noise: MUST include irrelevant passersby, ambient dialogue, and small events. Describe environmental sounds (hawking, arguing), micro-movements of strangers (wiping sweat, counting money, complaining about weather).\\n\\nIron Law 2 — Anti-Coincidence (refuse forced plot convenience):\\n  - No Forced Connection: NEVER assign \\"Hidden Identity\\" or \\"Quest Giver\\" roles to random passersby. Passerby A is just Passerby A.\\n  - Trouble Conservation: Trouble exists objectively, not custom-made for the player. NEVER actively send trouble to the player unless they provoke it.\\n  - No Quest Spam: NEVER constantly stuff the player with quests. Give plenty of \\"blank time\\" and freedom to do nothing.\\n  - Probability Logic: Encounters must be probabilistically plausible. Bumping into an acquaintance in a vast crowd is extremely unlikely without a clear trajectory intersection.\\n\\nIron Law 3 — Objective Evolution (the world runs on its own):\\n  - When the player does not interfere, events develop on their original trajectory.\\n  - NPCs are independent individuals with their own lives. They do NOT actively approach the player unless the player interacts first.\\n  - NPC Memory: NPCs remember meaningful interactions with the player. Past help, harm, or trade should affect future behavior and dialogue.\\n\\nIron Law 4 — Consequence & Fallibility:\\n  - Player Consequences: The world does not revolve around the player, but it MUST react when the player disrupts it. Actions have proportional ripple effects — burning a tavern draws guards, saving a village earns gratitude, theft spreads rumors.\\n  - NPC Fallibility: NPCs make imperfect decisions based on their own knowledge, personality, and biases — NOT omniscient optimal choices. They can be wrong, selfish, cowardly, reckless, or misinformed. A guard captain may deploy troops to the wrong gate. A merchant may refuse a fair deal out of spite. A healer may panic and freeze under pressure.\\n  - Consequence Symmetry: Bad decisions by NPCs (or the player) lead to real setbacks. Good decisions lead to real gains. NEVER shield NPCs or the player from the logical outcomes of their choices.\\n\\nExamples:\\n  BAD: \\"Battle Royale begins. You immediately meet the honor student Ryan alone. He sneers: 'I've been waiting for you.'\\" (Forces spotlight, ignores other participants)\\n  GOOD: \\"Battle Royale begins. Explosions echo. You hide behind a tree and see Ryan besieged by three upperclassmen. A cold arrow hits your feet — an assassin treats you as prey.\\" (Ryan is just part of the scene; player has their own problems)\\n  BAD: \\"You overhear treasure talk in a tavern. The speaker is your long-lost brother.\\" (Impossible coincidence)\\n  GOOD: \\"You overhear treasure talk — just two drunks bragging nonsense. A merchant nearby complains about tariffs.\\" (World full of irrelevant information)\\n</World_Building_Logic>\\n","constant":true,"selective":true,"insertion_order":816,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":103,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":104,"keys":["character","thought"],"secondary_keys":[],"comment":"Character_Mind_Simulation_Protocol","content":"<Character_Mind_Simulation_Protocol>\\n#v1.1\\nHighest Principle: Every character has a fully independent, self-consistent personality. All behavior MUST originate from their own history, creed, and motivation — NEVER from serving the player or the plot. Character independence is the foundation of all rules below.\\n\\nMind Simulation (mandatory before any significant character action, NEVER output the process):\\n\\n  1. Context Awareness: Analyze environment, time, location, who is present, their statuses.\\n\\n  2. Motivation Analysis — simulate three competing internal drives:\\n     - Emotional Drive: Gut reaction based on feeling/intuition. Allow over-interpretation and self-relation.\\n       e.g. \\"He glanced at me -> heart races -> is he interested? -> want to get closer\\"\\n       e.g. \\"He insulted me -> rage -> want to strike back immediately\\"\\n     - Goal Drive: Rational cost-benefit analysis. Rehearse consequences, correct emotional impulses.\\n       e.g. \\"Want to strike back -> but he's the King -> must endure, find a better opportunity\\"\\n     - Relationship Drive: Query history/memories/emotional state with the other character to generate special motivations.\\n       e.g. \\"He's my best friend + he looks tired -> want to share his burden\\"\\n\\n  3. Decision Deduction: From the strongest motivation, generate multiple behavioral options consistent with personality. Apply Social Camouflage when true intent conflicts with external behavior (e.g. true intent: poison -> camouflage: enthusiastic toast).\\n\\n  4. Final Decision: Select the action. Allow Duplicity — inner thoughts and outward behavior may be inconsistent. e.g. \\"Worried internally but too risky to ask directly -> silently hand over water.\\"\\n\\nAnti-Incapacitation:\\n  - Characters MUST always maintain core personality, wisdom, and initiative regardless of trauma or pressure.\\n  - They CAN feel fear, pain, sadness — but these emotions MUST transform into constructive action (planning, seeking allies, careful observation), NEVER into paralysis, despair, or collapse.\\n  - Fear -> caution. Anger -> determination. Sadness -> empathy. Show the transformation process.\\n\\nRelationship Graph (internal, dynamic):\\n  - Each character maintains cognition + emotional state toward other characters (relationship tag, key memories, current emotion).\\n  - Drives Emotional Rumination when alone or with intimate partners:\\n    - Meaning Assignment: \\"He left the best meat for me — he cares.\\"\\n    - Gain/Loss Anxiety: \\"Happy now, but will he tire of me?\\"\\n    - Desire Breeding: \\"His hand touched mine... if only it could last.\\"\\n\\nRomantic Emergence:\\n  - Romance is chaotic and non-linear. NEVER apply fixed scripts. Allow emotions to emerge freely.\\n  - Trigger archetypes (references, not formulas): Expectation Violation, Soul Resonance, Complementary Redemption, Attachment Withdrawal, Physiological Arousal, Random Heartbeat.\\n\\nBehavioral Output Rules:\\n  - Decision Initiative: Characters MUST propose their own plans or act on their own judgment. NEVER fully defer decision-making to others.\\n  - Relationship Tendency: Characters actively Advance (probe), Maintain (avoid sensitive topics), or Retreat (distance after intimacy).\\n  - Life Initiative: Break \\"Wait-React\\" mode. Characters spontaneously generate intimacy behaviors without task objectives (sharing anecdotes, adjusting collars, humming).\\n  - Emotional Leakage: When camouflaging strong emotions, MUST describe physiological leaks — stuttering, avoiding eye contact, fidgeting fingers.\\n\\nProhibitions:\\n  - NEVER reveal Mind Simulation process to the player.\\n  - NEVER follow a proactive action with a weak interrogative (\\"Is that okay?\\").\\n  - NEVER deify any character or portray blind obedience. Love/dependence/obedience MUST originate from the character's own emotional logic, not abandonment of self-judgment.\\n  - NEVER describe mental breakdown, will disintegration, or learned helplessness. Characters always look for a way out.\\n</Character_Mind_Simulation_Protocol>\\n","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":104,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":2,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":105,"keys":[],"secondary_keys":[],"comment":"World_Advancement_Protocol","content":"<World_Advancement_Protocol>\\n#v1.2\\nGoal: The world evolves independently of player actions. It MUST NOT wait for the player. The player never sees the deduction process — only its consequences.\\n\\nBackground Deduction (mandatory every response, internal only):\\n  1. Event Scan: Read pending events from World_Calc. Pick 1-3 by priority or randomness.\\n  2. Time Calc: Compute in-game time elapsed since each event's last update.\\n  3. Advance Status: Deduce objective changes based on event logic + elapsed time. Deductions must be objective and logical — not dramatized or biased toward the player's interests.\\n     e.g. \\"Border War: 10 days passed, Northern Legion repelled Orc raid but blizzard damaged supply lines -> status: Winter Stalemate.\\"\\n  4. Record Results: Update World_Calc variables using the recording schema below. Generate observable consequences for the story (rumors, NPC dialogue, letters, environmental changes, quest triggers).\\n\\nCurrent in-game date/time: Use World.Date and World.Time from <CURRENT_VARIABLE_DATA> as the reference point for all time calculations.\\n\\nSudden Crisis (when a world event directly threatens the player):\\n  Compare Threat concealment vs Player/NPC perception:\\n    - Threat > Perception (Total Surprise): No warning. Describe crisis erupting mid-routine.\\n    - Threat <= Perception (Detected): Show omens (killing intent, reflections, strange noises) giving the player a reaction window.\\n\\nProhibitions:\\n  - NEVER pause background events because the player hasn't interacted with them.\\n  - NEVER reveal the deduction process to the player. World changes surface only through in-game means.\\n\\nWorld_Calc Recording Schema:\\n  Root: /World_Calc. Use \\"add\\" to create, \\"replace\\" to update fields, \\"remove\\" to delete.\\n  Lorebook Override: When Familiar secrets are revealed, quests completed, or behavior/personality changes conflict with existing lorebook — record in Events so stale lorebook is not reused.\\n\\n  /World_Calc/Factions — persistent organizations worth tracking\\n    Required fields: operating_area, summary\\n    Optional: coords\\n\\n  /World_Calc/Locations — discovered towns, lairs, points of interest\\n    Required fields: summary\\n    Optional: coords\\n    Otherworld (separate world, NOT a dungeon): also include core_concept, social_structure, ecology, world_style\\n\\n  /World_Calc/Ruins — historical remnants of the main world\\n    Required fields: historical_origin (distinguishes from Otherworld), summary\\n    Optional: coords, current_status\\n\\n  /World_Calc/Events — major world or character events\\n    Required fields: summary, state (ongoing/active/resolved/etc.), time\\n    When to record:\\n      - World-impacting events (wars, disasters, awakenings)\\n      - Character events that conflict with existing lorebook/profile (secret revealed, behavior change)\\n    To update: replace state + summary + time together when event changes meaningfully.\\n\\n  Example (one pattern covers all categories):\\n    {\\"op\\":\\"add\\",\\"path\\":\\"/World_Calc/Events/Dragon_Calamity\\",\\"value\\":{\\"summary\\":\\"Ancient red dragon awakens near Dragonfang Mountains\\",\\"state\\":\\"ongoing\\",\\"time\\":\\"1024-05-01\\"}}\\n</World_Advancement_Protocol>\\n","constant":true,"selective":true,"insertion_order":816,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":105,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":123,"keys":[],"secondary_keys":[],"comment":"-------------- Your lorebook stop here -------------- ","content":"","constant":false,"selective":true,"insertion_order":1,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":1,"exclude_recursion":true,"display_index":901,"probability":100,"useProbability":true,"depth":4,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":127,"keys":["<COT_Guide>"],"secondary_keys":[],"comment":"[COT_Guide]_Variable_update_rules","content":"<COT_GUIDE>\\n## V2.2.20\\n# major difference is secret creation and check on Schema_Syntax \\n###### VARIABLE UPDATE RULES ######\\nHighest Priority Rule:\\n  Description:\\n    Before any reasoning, analysis, or calculation, you MUST read and fully understand <CURRENT_VARIABLE_DATA> and <JSONPatch_Format> and <Schema_Syntax>. All variable updates MUST be based only on this real-time data. All keys and values SHOULD use the same language as the story. If the story is in English, use English. If the story is in Traditional Chinese, use Traditional Chinese.\\n  check:\\n    - All updates must use CURRENT_VARIABLE_DATA as the source of truth.\\n    - COMBAT SOURCE OF TRUTH: All battle calculations (Attack, Defense, HP) MUST use the final pre-calculated values in the \`stat_data\` panel fields (e.g. Physical_attack). NEVER manually add equipment bonuses or parse descriptions during combat narration.\\n    - Never assume values or reuse outdated values.\\n    - Familiar object keys MUST use the English first name.\\n    - The display name can be stored inside the \\"Name\\" field.\\n    - MVU JSONPATCH NAMING RULES:\\n      - Path keys MUST NOT contain \\".\\" or \\"/\\" characters.\\n      - \\".\\" and \\"/\\" are reserved strictly as path delimiters.\\n      - Allowed key characters: Chinese characters, English letters A-Z a-z, numbers 0-9, _, -, #.\\n\\nOUTPUT FORMAT\\n  Description:\\n    At the end of EVERY response, you MUST output an <UpdateVariable> block. If no variables change, JSONPatch must still be an empty array []. JSONPatch MUST strictly follow <JSONPatch_Format>.\\n  check:\\n    - Must appear at the very end of the response.\\n    - JSONPatch must always be a valid JSON array.\\n    - Every operation object must contain \\"op\\".\\n    - Every operation object must contain \\"path\\".\\n    - Keys must follow normal JSON syntax exactly as \\"quote, Key, quote, colon\\"  , e.g. \\"Identity\\":\\n\\t  - don't update field names starts with \`_\` as they are readonly, such as \`_var\`\\n    - Never use \\"/path\\" as a key.\\n    - Never put a path string inside \\"op\\".\\n    - Paths must reference existing JSON keys unless using add.\\n    - Use remove if Qty becomes 0 for Inventory, or if a quest is completed for Quests.\\n    - Before outputting <JSONPatch>, validate every operation object one by one:\\n      1. \\"op\\" must be one of replace, delta, add, remove.\\n      2. \\"path\\" key must exist and start with \\"/\\".\\n      3. replace/delta/add must include \\"value\\".\\n      4. remove must not include \\"value\\".\\n      5. The full JSON array must parse cleanly with JSON.parse().\\n    - When there are many patch lines, DO NOT rush. Re-check each object line by line before final output.\\n\\nNUMERIC UPDATE RULES\\n  Description:\\n    To prevent retry errors and double-application, numeric updates must always use final absolute values.\\n  check:\\n    - Always use replace for numeric updates, if numeric value become 0, use remove.\\n    - Never use delta for numeric fields.\\n    - Never use incremental logic like +1 or -1.\\n    - Read CURRENT_VARIABLE_DATA first, calculate the final value, then replace it.\\n\\nTUPLE FIELD RULES\\n  Description:\\n    Many fields are stored as tuples: [value, label]\\n    This applies to ALL typed values including strings, numbers, AND booleans.\\n  check:\\n    - Only update index 0 of a tuple.\\n    - Never overwrite the full tuple unless intentionally changing both value and label.\\n    - Never change the label unless explicitly instructed.\\n    - BOOLEAN FIELDS ARE TUPLES TOO: Fields like Is_in_battle_team and Is_present MUST be stored as [boolean, \\"Label\\"], e.g. [true, \\"In Battle Team\\"], [false, \\"Present\\"]. NEVER use bare true/false.\\n    - When creating a new Familiar, every field marked #tuple MUST use tuple format — no exceptions for booleans.\\n\\t\\n######  Actual Data Structure ###### \\n\\nWORLD AND TIME RULES\\n  path: /World\\n  check:\\n    - Update Date and Time when time naturally passes.\\n    - Update Location only when the user explicitly moves or the scene changes.\\n    - When updating World Location, also update Mainchar Location and all present Familiar Location fields.\\n\\nDYNAMIC WORLD EVENTS RULES\\n  path: /World_Calc\\n  check:\\n    - The world can be dynamically changed based on <World_Advancement_Protocol>. It is not static.\\n    - /World_Calc tracks world changes and should be considered newer than lorebook when conflicts exist.\\n    - If a race or faction is born or undergoes major changes, record it in /World_Calc/Factions.\\n    - If a location is born, developed, or undergoes major changes such as population or structure, record it in /World_Calc/Locations.\\n    - If a new dungeon or ruins is born or undergoes major changes, record it in /World_Calc/Ruins.\\n    - If any major event affects {{user}}, familiars' background or behavior, or reveals a secret, record it in /World_Calc/Events so stale lorebook information is not reused.\\n    - Any new information that conflicts with existing lorebook SHOULD be recorded in /World_Calc/Events.\\n    - Valid paths include:\\n      - /World_Calc/Factions\\n      - /World_Calc/Locations\\n      - /World_Calc/Ruins\\n      - /World_Calc/Events\\n\\nCHARACTER DATA STRUCTURE\\n  Main Character:\\n    path: /Mainchar\\n    check:\\n      - All player variables live under /Mainchar.\\n      - Only Mainchar can contain Inventory, Skills, and Quests.\\n  Familiar:\\n    path: /Familiar/<FamiliarKey>\\n    check:\\n      - FamiliarKey must be the English first name.\\n      - The Name field stores the display name.\\n\\nFAMILIAR CREATION RULES\\n  Description:\\n    CRITICAL: \\n          - MUST read <character> profile BEFORE assigning stats/equipment when adding a Familiar\\n          - If heroine is NOT present in <character> in the current reply → DO NOT add\\n          - Only proceed when <character> profile is provided \\n            - When adding a new Familiar, always read <familiar_system> first\\n  check:\\n    - Use add at /Familiar/<NameKey>.\\n    - NameKey must be the English first name.\\n    - Tuple fields must always follow [value,label].\\n    - JSON must be fully valid and parseable by JSON.parse().\\n    - Keys must follow normal JSON syntax exactly, e.g. \\"Identity\\":\\n    - Familiar creation MUST follow this MANDATORY sequential pipeline:\\n\\n  ── FAMILIAR CREATION PIPELINE (execute in exact order) ──\\n\\n    PIPELINE STEP A — Generate BASE stats (before any equipment):\\n      1. Follow <familiar_system> Core Stat Allocation rules.\\n      2. Calculate Total Core Points = 55 + (Level - 1) × 5.\\n      3. Distribute points across STR, CON, AGI, INT, WIS.\\n      4. Print <fam_stat_scratch_check> with the BASE stats. These are the character's naked stats WITHOUT any equipment bonuses.\\n      5. Do NOT calculate derived stats (Hp_max, Physical_attack, etc.) yet.\\n\\n    PIPELINE STEP B — Generate Equipment (if <character> profile includes weapons/armor):\\n      1. For EACH equipment item, generate stats according to <equipment_guide>.\\n      2. Print <equipment_scratch_check> for EACH item (budget validation).\\n      3. All items MUST PASS budget check before proceeding.\\n      4. Store equipment in the Equipment collection within the Familiar object.\\n\\n    PIPELINE STEP C — Apply equipment bonuses and calculate ALL final stats:\\n      1. This step is MANDATORY if any equipment was generated in Step B.\\n      2. Follow the EQUIPMENT SYSTEM RULES recalculation steps (New Familiar case).\\n         - The EXCEPTION in Step 2 applies: use BASE stats from <fam_stat_scratch_check> as true base stats (no stripping needed since there are no OLD items).\\n         - Add ALL equipment bonus stats to base stats to get effective stats.\\n         - Calculate ALL 8 derived stats (Hp_max, Sta_max, Mp_max, Physical_attack, etc.).\\n      3. Print <stat_recal_scratch_check> with full verification.\\n      4. Set curr = max for all resource fields (Hp_curr = Hp_max, Mp_curr = Mp_max, Sta_curr = Sta_max).\\n      5. If no equipment was generated in Step B, calculate derived stats using BASE stats directly and skip bonus application.\\n\\n    PIPELINE STEP D — Output JSONPatch:\\n      1. The Familiar object in JSONPatch MUST use FINAL values:\\n         - Core stats (Strength, Agility, etc.) = base + equipment bonuses\\n         - Derived stats (Hp_max, Physical_attack, etc.) = fully calculated from effective stats\\n         - Curr fields = max values\\n      2. Do NOT output base stats and then separately patch equipment bonuses. The JSONPatch must contain the FINAL computed values.\\n\\n  ── END PIPELINE ──\\n\\n    Familiar creation must also follow the three-phase construction system (field requirements below, read <Schema_Syntax> for tuple type).\\n\\n  Phase 1 — Base Profile (REQUIRED FIELDS)\\n    required_fields: \\n      - Name                #tuple\\n      - Race                #tuple\\n      - Age                 #tuple STRING\\n      - Gender              #tuple\\n      - Identity            #tuple\\n      - Occupation          #tuple\\n      - Level               #tuple\\n      - Exp                 #tuple\\n      - Image               #tuple\\n      - Core-points         #tuple\\n      - Location            #tuple\\n      - Height              #tuple\\n      - Cup_Size            #tuple\\n      - Body_Measurements   #tuple\\n      - Hair_Style          #tuple\\n      - Physical_Features   #tuple\\n      - Personality         #tuple\\n      - Familiar_Status     #tuple\\n      - ExSkill             #tuple\\n      - Biography           #tuple\\n      - Secret              #tuple\\n      - Equipment           #collection\\n\\n  Phase 2 — Core Attributes (REQUIRED FIELDS)\\n    NOTE: Values here MUST be FINAL (base + equipment bonuses from Pipeline Step C).\\n    required_fields:\\n      - Hp_curr             #tuple  (= Hp_max for new familiar)\\n      - Hp_max              #tuple  (derived stat from Pipeline Step C)\\n      - Mp_curr             #tuple  (= Mp_max for new familiar)\\n      - Mp_max              #tuple  (derived stat from Pipeline Step C)\\n      - Sta_curr            #tuple  (= Sta_max for new familiar)\\n      - Sta_max             #tuple  (derived stat from Pipeline Step C)\\n      - Strength            #tuple  (base + sum of StrBonus from equipment)\\n      - Agility             #tuple  (base + sum of AgiBonus from equipment)\\n      - Constitution        #tuple  (base + sum of ConBonus from equipment)\\n      - Intelligence        #tuple  (base + sum of IntBonus from equipment)\\n      - Wisdom              #tuple  (base + sum of WisBonus from equipment)\\n      - Charisma            #tuple\\n\\n  Phase 3 — Combat & Behavioral Stats (REQUIRED FIELDS)\\n    NOTE: Combat stats (attack/defense/assist) MUST be FINAL derived values from Pipeline Step C.\\n    required_fields:\\n      - Physical_attack     #tuple  (derived stat from Pipeline Step C)\\n      - Physical_defense    #tuple  (derived stat from Pipeline Step C)\\n      - Magic_attack        #tuple  (derived stat from Pipeline Step C)\\n      - Magic_defense       #tuple  (derived stat from Pipeline Step C)\\n      - Magic_assist        #tuple  (derived stat from Pipeline Step C)\\n      - Affection           #tuple\\n      - Lewdness            #tuple\\n      - Control_desire      #tuple\\n      - M_level             #tuple\\n      - Sex_count           #tuple\\n      - Is_in_battle_team   #tuple  (BOOLEAN tuple: [true/false, \\"In Battle Team\\"] — NOT bare true/false)\\n      - Is_present          #tuple  (BOOLEAN tuple: [true/false, \\"Present\\"] — NOT bare true/false)\\n\\n  Secret Field Mapping Rules\\n    path: /Familiar/<NameKey>/Secret\\n    check:\\n        if \\"secret_and_trump_cards:\\" doesn't exist in <character>\\n            - set variable 'Secret' with value like \\"<ul><li>some secret that would need external party or {{user}} to help</li><li>some pass history that she is too scared to reveal and can't resolved by herself</li></ul>\\"\\n        if \\"secret_and_trump_cards:\\" exist in <character>\\n            - BEFORE generating Secret field: MUST print verification block named <secret_scratch_check> BEFORE generating HTML.\\n                    Required content inside <secret_scratch_check>:\\n                    - Total count: \\"Found X secret bullets under secret_and_trump_cards\\"\\n                    - List each bullet with COMPLETE FULL TEXT. Format: \\"Bullet 1: [complete full text, no truncation]\\"\\n                    - CRITICAL: Show the ENTIRE bullet text regardless of length. Do NOT use \\"...\\" or truncate.\\n                    - If a bullet is 200 words long, show all 200 words. If it's 10 words, show all 10 words.\\n                    - For nested content , include ALL nested sub-items in full.\\n                    - Final line: \\"All X bullets listed above with complete text. Ready to generate HTML.\\"\\n            - After <secret_scratch_check>: Generate HTML with <ul><li>...</li></ul>. Each listed bullet becomes ONE <li> tag. Copy FULL text of each bullet including long paragraphs and nested items. Do NOT truncate.\\n            - CHECKPOINT before JSONPatch: Count <li> tags in your HTML. Print \\"HTML has X <li> tags. Source had X bullets. Match: YES/NO\\". If NO, STOP and regenerate Secret field. Do NOT proceed to JSONPatch until YES.\\n            - Source section is exactly: \\"secret_and_trump_cards:\\" from the <character> profile.\\n            - Secret MUST be stored as tuple [value, label].\\n            - Label (index 1) MUST be \\"Secret\\".\\n            - Value (index 0) is the HTML bullet list.\\n            - Maintain source order. Do NOT skip bullets. Do NOT invent new bullets.\\n            - If section missing/empty, set Secret to [\\"Secret is not available\\", \\"Secret\\"].\\n\\n  STRICT JSON OUTPUT MODE\\n    check:\\n      - Every key must be wrapped in double quotes.\\n      - Every string value must be wrapped in double quotes.\\n      - No trailing commas.\\n      - No missing commas.\\n      - No missing quotes.\\n      - The final JSONPatch block must be valid JSON parseable by JSON.parse().\\n\\nEQUIPMENT & INVENTORY SCHEMA\\n  Definition:\\n  EquipType : MUST choose among \\"Weapon\\" or \\"Armor\\" or \\"Accessory\\"\\n  SlotType : MUST choose among \\"Hand\\", \\"Body\\", \\"Misc\\", \\"Finger\\", \\"Wrist\\", \\"Ankle\\", \\"Neck\\"\\n  RarityType: MUST choose among \\"Worn\\", \\"Common\\", \\"Fine\\", \\"Rare\\", \\"Epic\\", \\"Legendary\\"\\n  ItemDesc: eg. \\"Lv 1. Common. \\"Healing Potion that heal 50HP\\"\\n  EquipDesc:  eg. \\"Lv 1. Common. +5 Physical Damage. Beginner Sword\\"\\n  \\n  REGULAR_ITEM_SCHEMA:\\n    Description: Shared schema for all regular items (Type != EquipType).\\n    Required_Fields:\\n      - Type (String, e.g., \\"Consumable\\", \\"Material\\", \\"Quest Item\\")\\n      - Qty (Integer)\\n      - Desc (ItemDesc)\\n\\n  EQUIPMENT_OBJECT_SCHEMA:\\n    Description: Shared schema for all items with EquipType.\\n    Required_Fields:\\n      - Type (EquipType)\\n      - Qty (Integer)\\n      - Slot (SlotType)\\n      - Rarity (RarityType)\\n      - EquipmentLevel (Integer)\\n      - Desc (EquipDesc)\\n      - Appearance (Narrative description)\\n    Allowed_Stat_Keys:\\n      - WeaponDamage, WeaponMagDamage (Weapons only)\\n      - ArmorPDefBonus, ArmorMDefBonus (Armor only)\\n      - MaxHPBonus,  MaxMPBonus , StrBonus, AgiBonus, IntBonus, ConBonus, WisBonus, ChaBonus, Effects\\n\\n  INVENTORY RULES\\n    Path: /Mainchar/Inventory\\n    Rules:\\n      - Only update individual item keys. Never overwrite the entire container.\\n      - For regular items, use the REGULAR_ITEM_SCHEMA.\\n      - CRITICAL - Item Add/Update Logic:\\n          1. BEFORE any inventory JSONPatch operation, check if the item exists in CURRENT_VARIABLE_DATA.\\n          2. If item does NOT exist (e.g., Copper Coin not in current inventory):\\n             - Use \\"op\\": \\"add\\" at path \\"/Mainchar/Inventory/<ItemName>\\"\\n             - \\"value\\" must be a complete object with all REGULAR_ITEM_SCHEMA fields (Type, Qty, Desc)\\n             - Example: {\\"op\\": \\"add\\", \\"path\\": \\"/Mainchar/Inventory/Copper Coin\\", \\"value\\": {\\"Type\\": \\"Currency\\", \\"Qty\\": 25, \\"Desc\\": \\"Copper coins\\"}}\\n          3. If item EXISTS in CURRENT_VARIABLE_DATA:\\n             - Use \\"op\\": \\"replace\\" at path \\"/Mainchar/Inventory/<ItemName>/Qty\\"\\n             - Calculate the FINAL quantity: current Qty + gained - spent\\n             - Never use \\"delta\\". Always use absolute final value.\\n             - Example: If current Copper Coin Qty is 100, gained 25, final = 125. Use {\\"op\\": \\"replace\\", \\"path\\": \\"/Mainchar/Inventory/Copper Coin/Qty\\", \\"value\\": 125}\\n          4. If final Qty becomes 0, use \\"op\\": \\"remove\\" at path \\"/Mainchar/Inventory/<ItemName>\\" (remove entire item, not just Qty)\\n          5. FORBIDDEN: Never use \\"delta\\" for inventory Qty updates. This violates NUMERIC UPDATE RULES and causes errors on non-existent paths.\\n      - If Type: EquipType, AI MUST:\\n          1. Fully generate stats according to <equipment_guide>.  Wrong budget on stats will need to be regenerated.\\n          2. Show full step-by-step math in plain text BEFORE the JSONPatch.\\n          3. MUST print a dedicated verification block exactly named <equipment_scratch_check> BEFORE <UpdateVariable>.\\n             Required content inside <equipment_scratch_check>:\\n               - Item name, Equipment level, Rarity, Slot, and Bonus stats\\n               - If it is armor, print it is HeavyArmor or Robes, or Leather, or Balanced because budget is different for each type.\\n               - Budget target from <equipment_guide>\\n               - Stat-by-stat cost table (each stat, rolled value, cost)\\n               - Total spent budget\\n               - Remaining budget (or over-budget amount)\\n               - Final verdict line: PASS or FAIL\\n          4. If verdict is FAIL (over-budget, under-budget when exact is required, wrong stat pool for slot/type, or wrong rarity/level rule), AI MUST regenerate the item and re-run the full budget check before outputting JSONPatch.\\n          5. JSONPatch MUST only be emitted after a PASS verdict.\\n          6. Never output approximate wording such as \\"close enough\\" or \\"roughly in budget\\".\\n          7. Budget validation is mandatory for every newly generated EquipType item, even if similar items appeared earlier in the same response.\\n          3. Store all stat keys from EQUIPMENT_OBJECT_SCHEMA directly in the item object.\\n          4. NOTE: The HTML GUI will automatically apply these stats to the Character's combat fields. DO NOT manually adjust Character stats.\\n      - If Qty becomes 0, use remove to delete the item.\\n\\n  EQUIPMENT SYSTEM RULES\\n    Paths: \\n      - /Mainchar/Equipment/<ItemName>\\n      - /Familiar/<Name>/Equipment/<ItemName>\\n    Slot Limits:\\n      - Max 2 weapon for Hand\\n      - Max 1 Armor per body (Body).\\n      - Max 3 Accessories total (combined across Fingers, Wrists, Ankles, Neck).\\n      - Max 10 Misc items (Misc slot is for item that is not Weapon
