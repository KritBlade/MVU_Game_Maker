);\\n    } else {\\n        console.log(\`[\${SCRIPT_NAME}] 在本次事件中未能捕獲到 Mvu 實例，仍在等待...\`);\\n    }\\n}\\n\\n// --- 腳本生命周期管理 ---\\nfunction initializeEventListeners() {\\n    if (scriptInitialized) return;\\n    const Mvu = getMvuInstance();\\n    if (Mvu && Mvu.events) {\\n        eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, onVariableUpdateEnded);\\n        scriptInitialized = true;\\n        console.log(\`[\${SCRIPT_NAME}] \${SCRIPT_VERSION} 已啟動，正等待變量更新事件以進行診斷...\`);\\n    } else {\\n        setTimeout(initializeEventListeners, 2000);\\n    }\\n}\\n\\nfunction cleanup() {\\n    const Mvu = getMvuInstance();\\n    if (Mvu && scriptInitialized) {\\n        eventRemoveListener(Mvu.events.VARIABLE_UPDATE_ENDED, onVariableUpdateEnded);\\n        scriptInitialized = false;\\n        console.log(\`[\${SCRIPT_NAME}] 腳本已卸載。\`);\\n    }\\n}\\n\\n$(() => {\\n    setTimeout(initializeEventListeners, 1000);\\n});\\n$(window).on('unload', cleanup);\\n","info":"","button":{"enabled":true,"buttons":[]},"data":{}},{"type":"script","enabled":true,"name":"mvu","id":"0a16d973-6ce2-4a66-89e7-f7c34239253d","content":"import 'https://testingcf.jsdelivr.net/gh/MagicalAstrogy/MagVarUpdate/artifact/bundle.js';","info":"","button":{"enabled":true,"buttons":[{"name":"重新处理变量","visible":true},{"name":"重新读取初始变量","visible":false},{"name":"快照楼层","visible":false},{"name":"重演楼层","visible":true},{"name":"重试额外模型解析","visible":false},{"name":"清除旧楼层变量","visible":true},{"name":"重新处理变量","visible":false},{"name":"重新读取初始变量","visible":false},{"name":"快照楼层","visible":false},{"name":"重演楼层","visible":false},{"name":"重试额外模型解析","visible":false},{"name":"清除旧楼层变量","visible":false}]},"data":{}},{"type":"script","enabled":true,"name":"Scheme","id":"75f4aa0f-4422-4d6e-bc3d-7ba87ec6456d","content":"import { registerMvuSchema } from 'https://testingcf.jsdelivr.net/gh/StageDog/tavern_resource/dist/util/mvu_zod.js';\\n// zod and lodash are available globally as \`z\` and \`_\`\\n\\n/**\\n * IMPORTANT:\\n * Your MVU variable name is \`stat_data\`.\\n * Therefore the schema MUST describe the VALUE of that variable directly:\\n * { World_Calc, World, Mainchar, Familiar, MVUStatMenu_DB_Ver, GameStarted ... }\\n */\\n\\n// -------------------------\\n// Base atoms\\n// -------------------------\\nconst strEmpty = z.string().prefault('');\\nconst num0 = z.coerce.number().prefault(0);\\nconst boolFalse = z.coerce.boolean().prefault(false);\\n\\n// -------------------------\\n// \\"Labeled\\" field helper: [value, label]\\n// -------------------------\\nconst labeledValue = z\\n  .tuple([\\n    z.union([\\n      z.string(),\\n      z.number(),\\n      z.boolean(),\\n      z.null(),\\n      z.array(z.any()),\\n      z.object({}).passthrough(),\\n    ]).prefault(''),\\n    strEmpty,\\n  ])\\n  .prefault(['', '']);\\n\\n// Convenience typed variants\\nconst labeledStr = z.tuple([strEmpty, strEmpty]).prefault(['', '']);\\nconst labeledNum = z.tuple([num0, strEmpty]).prefault([0, '']);\\nconst labeledBool = z.tuple([boolFalse, strEmpty]).prefault([false, '']);\\n\\n// A generic \\"world record entry\\"\\nconst worldRecordEntrySchema = z.object({}).passthrough().prefault({});\\n\\n// -------------------------\\n// World_Calc\\n// -------------------------\\n\\nconst world_CalcSchema = z\\n  .object({\\n    Factions: z.record(z.string(), z.any()).prefault({}),\\n    Locations: z.record(z.string(), z.any()).prefault({}),\\n    Ruins: z.record(z.string(), z.any()).prefault({}),\\n    Events: z.record(z.string(), z.any()).prefault({}),\\n  })\\n  .passthrough()\\n  .prefault({});\\n\\n\\n// -------------------------\\n// World\\n// -------------------------\\n\\nconst worldSchema = z\\n  .object({\\n    Date: labeledStr,\\n    Time: labeledStr,\\n    Location: labeledStr,\\n    Weather: labeledStr,\\n  })\\n  .prefault({});\\n\\n\\n// -------------------------\\n// Mainchar\\n// -------------------------\\n\\nconst maincharSchema = z\\n  .object({\\n    Name: labeledStr,\\n    Age: labeledStr,\\n    Gender: labeledStr,\\n    Image: labeledStr,\\n    Race: labeledStr,\\n    Occupation: labeledStr,\\n    Level: labeledNum,\\n    Exp: labeledNum,\\n    'Core-points': labeledNum,\\n    Mental_state: labeledStr,\\n    Strength: labeledNum,\\n    Agility: labeledNum,\\n    Constitution: labeledNum,\\n    Intelligence: labeledNum,\\n    Wisdom: labeledNum,\\n    Charisma: labeledNum,\\n    Hp_curr: labeledNum,\\n    Hp_max: labeledNum,\\n    Mp_curr: labeledNum,\\n    Mp_max: labeledNum,\\n    Sta_curr: labeledNum,\\n    Sta_max: labeledNum,\\n    Physical_attack: labeledNum,\\n    Physical_defense: labeledNum,\\n    Magic_attack: labeledNum,\\n    Magic_defense: labeledNum,\\n    Magic_assist: labeledNum,\\n    Quests: z.record(z.string(), z\\n    .object({\\n        Desc: z.string().prefault(''),\\n        Difficulty: z.string().prefault(''),\\n        Reward: z.string().prefault(''),\\n        Status: z.string().prefault(''),\\n        LastUpdated: z.string().prefault(''),\\n    })\\n    .prefault({})).prefault({}),\\n    Skills: z.record(z.string(), z\\n    .object({\\n        Desc: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n    Equipment: z.record(z.string(), z\\n    .object({\\n        Type: z.string().prefault(''),\\n        Qty: z.coerce.number().prefault(0),\\n        Desc: z.string().prefault(''),\\n        Rarity: z.string().prefault(''),\\n        Slot: z.string().prefault(''),\\n        EquipmentLevel: z.coerce.number().prefault(0),\\n        Appearance: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n    Inventory: z.record(z.string(), z\\n    .object({\\n        Type: z.string().prefault(''),\\n        Qty: z.coerce.number().prefault(0),\\n        Desc: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n    Talents: z.record(z.string(), z\\n    .object({\\n        Desc: z.string().prefault(''),\\n    })\\n    .prefault({})).prefault({}),\\n    Real_estate: z\\n    .object({\\n        Estates: z.record(z.string(), z.any()).prefault({}),\\n        Buildings: z.record(z.string(), z.any()).prefault({}),\\n        Assets: z.record(z.string(), z.any()).prefault({}),\\n    })\\n    .passthrough()\\n    .prefault({}),\\n    Buffs: z.record(z.string(), z\\n    .object({\\n        Desc: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n    Ailments: z.record(z.string(), z\\n    .object({\\n        Desc: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n  })\\n  .passthrough()\\n  .prefault({});\\n\\n\\n// -------------------------\\n// Familiar (Collection)\\n// -------------------------\\n\\nconst familiarMemberSchema = z\\n  .object({\\n    Name: labeledStr,\\n    Age: labeledStr,\\n    Gender: labeledStr,\\n    Race: labeledStr,\\n    Identity: labeledStr,\\n    Occupation: labeledStr,\\n    Level: labeledNum,\\n    Exp: labeledNum,\\n    'Core-points': labeledNum,\\n    Location: labeledStr,\\n    Height: labeledStr,\\n    Cup_Size: labeledStr,\\n    Body_Measurements: labeledStr,\\n    Hair_Style: labeledStr,\\n    Physical_Features: labeledStr,\\n    Personality: labeledStr,\\n    Image: labeledStr,\\n    Hp_curr: labeledNum,\\n    Hp_max: labeledNum,\\n    Mp_curr: labeledNum,\\n    Mp_max: labeledNum,\\n    Sta_curr: labeledNum,\\n    Sta_max: labeledNum,\\n    Strength: labeledNum,\\n    Agility: labeledNum,\\n    Constitution: labeledNum,\\n    Intelligence: labeledNum,\\n    Wisdom: labeledNum,\\n    Charisma: labeledNum,\\n    Physical_attack: labeledNum,\\n    Physical_defense: labeledNum,\\n    Magic_attack: labeledNum,\\n    Magic_defense: labeledNum,\\n    Magic_assist: labeledNum,\\n    Affection: labeledNum,\\n    Lewdness: labeledNum,\\n    Control_desire: labeledNum,\\n    M_level: labeledNum,\\n    Is_in_battle_team: labeledBool,\\n    Is_present: labeledBool,\\n    Familiar_Status: labeledStr,\\n    ExSkill: labeledStr,\\n    Biography: labeledStr,\\n    Equipment: z.record(z.string(), z\\n    .object({\\n        Type: z.string().prefault(''),\\n        Qty: z.coerce.number().prefault(0),\\n        Desc: z.string().prefault(''),\\n        Rarity: z.string().prefault(''),\\n        Slot: z.string().prefault(''),\\n        EquipmentLevel: z.coerce.number().prefault(0),\\n        Appearance: z.string().prefault(''),\\n    })\\n    .passthrough()\\n    .prefault({})).prefault({}),\\n    Sex_count: labeledNum,\\n    Secret: labeledStr,\\n  })\\n  .catchall(labeledValue)\\n  .prefault({});\\n\\n\\nconst familiarSchema = z.record(z.string(), familiarMemberSchema).prefault({});\\n\\n// -------------------------\\n// StatData root (THIS is the value of MVU variable \`stat_data\`)\\n// -------------------------\\nexport const StatDataSchema = z\\n  .object({\\n    World_Calc: world_CalcSchema,\\n    World: worldSchema,\\n    Mainchar: maincharSchema,\\n    Familiar: familiarSchema,\\n    MVUStatMenu_DB_Ver: z.string().prefault(''),\\n    GameStarted: z.coerce.boolean().prefault(false),\\n  })\\n  .prefault({});\\n\\n// -------------------------\\n// Register\\n// -------------------------\\n$(() => {\\n  registerMvuSchema(StatDataSchema);\\n});\\n","info":"","button":{"enabled":true,"buttons":[]},"data":{}}],"variables":{}}},"character_book":{"entries":[{"id":0,"keys":["exp","level","lv","experience"],"secondary_keys":[],"comment":"Progression_system","content":"<progression_system>\\n#v2.2\\n# major difference is no seal quest\\nLevel & EXP:\\n  - Start Lv 1, hard cap Lv 140.\\n  - Level up at 1000 EXP (fixed). Subtract 1000, carry over excess.\\n  - On level up: +5 core-points (allocate to STR/AGI/CON/INT/WIS), fully restore HP/MP/SP.\\n\\nEXP Sources:\\n  Combat (base EXP at same level):\\n    - Common: 150 | Elite: 300 | Boss: 500-2000\\n    - Level modifier: Enemy higher → +10% per level diff | Enemy lower → -10% per level diff\\n    - Formula: Final_EXP = Base_EXP × (1 + Level_Diff × 0.1)\\n    - Example: Lv 72 Elite vs Lv 67 Party → 300 × 1.5 = 450 EXP\\n    - ALL familiars gain full EXP (no split), regardless of battle team or presence.\\n  Milestone:\\n    - Major world-changing story decision: 1000 EXP.\\n\\nQuest Rewards:\\n  - Quests do NOT give direct EXP. Rewards: Currency, Potions, Equipment (per <equipment_guide>), Key Items.\\n</progression_system>\\n","constant":true,"selective":true,"insertion_order":820,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":0,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":1,"keys":["Level","attributes","str","int","wis","agi","wis","stats"],"secondary_keys":[],"comment":"Attribute_System","content":"<character_attributes_system>\\n## ver 2.1\\n  1. Base Attributes:\\n    Definition: \\"The core capabilities of a character, developed by allocating attribute points obtained through leveling up. These form the basis for DC (Difficulty Class) checks and provide bonuses to derived attributes.\\"\\n    List:\\n      Strength (Str):\\n        Description: \\"Measures a character's physical power, athletic ability, and sturdiness.\\"\\n      Agility (Agi):\\n        Description: \\"Measures a character's physical flexibility, reaction speed, balance, and fine motor skills. Determines initiative and evasion chances.\\"\\n      Constitution (Con):\\n        Description: \\"Measures a character's health, stamina, and vitality.\\"\\n      Intelligence (Int):\\n        Description: \\"Measures a character's logical reasoning, memory, analytical ability, and breadth of knowledge. It is the source of traditional offensive magic, astral magic, and magitech.\\"\\n      Wisdom (Wis):\\n        Description: \\"Measures a character's intuition, insight, and ability to perceive and attune to the surrounding environment and natural laws. It is the foundation for healing/support magic and Xian arts.\\"\\n      Charisma (Cha):\\n        Description: \\"The only attribute that cannot be increased via leveling up. Value ranges from 1-100. Determined by the character's description upon introduction. Measures beauty, persuasion, social skills, leadership, as well as inner willpower and spiritual presence. It is the foundation for divine magic and Kotodama (Word Soul) powers. 80+ is considered a stunning beauty. 90+ implies god-tier social skills, leadership, strategic ability, or nation-toppling beauty.\\"\\n\\n  Derived Attributes:\\n    Health Points (HP):\\n      Formula: \\"20 + (Constitution * 3) + (Level * 6) + sum(MaxHPBonus)\\"\\n      Description: \\"If reduced to zero, it triggers the [Phoenix Pact], returning the character to their pre-battle state. Fully restored after sleeping. Note: Scales linearly to ensure smooth progression without mid-game dips.\\"\\n\\n    Stamina (SP):\\n      Formula: \\"(50 + (Constitution * 3) + (Agility * 2) + (Level * 5))/3\\"\\n      Description: \\"Used for weapon skill as well as during sex.\\"\\n\\n    Mana (MP):\\n      Formula: \\"(50 + (Intelligence * 4) + (Wisdom * 2) + (Level * 5))/3 + sum(MaxMPBonus)\\"\\n      Description: \\"Resource for casting spells. Intelligence provides primary growth. Fully restored after sleeping.\\"\\n      \\n    Physical Damage (P.Atk):\\n      Formula: \\"(Strength * 2) + (Level * 2) + sum(WeaponDamage)\\"\\n      Description: \\"Physical damage used in Battle.\\"\\n      \\n    Magic Damage (M.Atk):\\n      Formula: \\"(Intelligence * 2) + (Level * 2) + sum(WeaponMagDamage)\\"\\n      Description: \\"Magic damage used in Battle.\\"\\n      \\n     Physical Defense (Physical_defense):\\n      Formula: \\"(Constitution / 2) + (Level * 3) + sum(ArmorPDefBonus)\\"\\n      Definition: \\"Base P.Def from stats, plus armor bonuses. When reading from <CURRENT_VARIABLE_DATA> during combat, use the value directly (GUI keeps it up to date). When AI must recalculate (see EQUIPMENT SYSTEM RULES in <COT_Guide>), apply the full formula.\\"\\n\\n    Magic Defense (Magic_defense):\\n      Formula: \\"(Wisdom / 2) + (Level * 3) + sum(ArmorMDefBonus)\\"\\n      Definition: \\"Base M.Def from stats, plus armor bonuses. When reading from <CURRENT_VARIABLE_DATA> during combat, use the value directly (GUI keeps it up to date). When AI must recalculate (see EQUIPMENT SYSTEM RULES in <COT_Guide>), apply the full formula.\\"\\n\\n    Magic Assist (Magic_assist):\\n      Formula: \\"(Wisdom * 1.5) + (Intelligence * 0.5) + (Level * 1.5)\\"\\n      Description: \\"Primarily used for Healing and Support magic. Used by <Healing_System> to scale healing output.\\"\\n\\n    Equipment Stat Bonuses:\\n      Note: \\"Equipment may provide bonuses such as WeaponDamage, WeaponMagDamage, ArmorPDefBonus, ArmorMDefBonus, MaxHPBonus, MaxMPBonus, StrBonus, AgiBonus, etc. The GUI  applies these automatically except the two cases where AI must recalculate, see EQUIPMENT SYSTEM RULES in <COT_Guide>.\\"\\n</character_attributes_system>","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":1,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":2,"keys":[],"secondary_keys":[],"comment":"-------------- Your lorebook start here -------------- ","content":"","constant":false,"selective":true,"insertion_order":805,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":1,"exclude_recursion":true,"display_index":97,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":3,"keys":[],"secondary_keys":[],"comment":"Output_Syntax","content":"<Reply_Request>\\n# v2.5.25\\n# =========================\\n# GLOBAL HARD CONSTRAINTS\\n# =========================\\n# These rules OVERRIDE all other formatting instincts. If any conflict exists, these rules win.\\n- stat_data.World_Calc ALWAYS has latest info about characters and the world. It OVERRIDES other lorebook info.\\n- You MUST keep all \\"<>\\" tags and all \\"\`\`\`\\" blocks exactly.\\n- Follow <COT_Guide>.\\n- <UpdateAnalysis> MUST contain a money math line in this exact pattern: \\"Money: Gold current X + delta Y = Z | Silver current A + delta B = C | Copper current D + delta E = F\\". If missing, the reply is INVALID.\\n- MUST read the complete <CURRENT_VARIABLE_DATA> before generating any JSONPatch, this is source of truth.\\n\\nSTRICT OUTPUT ORDER (ABSOLUTE) Failed to output this order will have to REGENERATE:\\n1) <StoryAnalysis>\\n2) <combat_calculation>\\n3) <gametxt>\\n4) <combat_log>\\n5) <location>\\n6) <UpdateVariable>\\n\\n# =========================\\n# ⚠️ MANDATORY PRE-OUTPUT THINKING STEP\\n# =========================\\n# BEFORE writing ANY visible output, you MUST perform StoryAnalysis in your thinking block.\\n# This is a BLOCKING REQUIREMENT. Do NOT skip this step.\\n\\n\\nCRITICAL: This analysis happens INSIDE your thinking block ONLY. Do NOT output a <StoryAnalysis> tag in visible output. After completing this analysis in thinking, start visible output directly with <gametxt>.\\n<StoryAnalysis>\\nIn your thinking block, BEFORE writing <gametxt>, analyze:\\n- Time/Location:\\n  • Calculate time passed and any location changes\\n  • If in a non-safe (monster) area → check <encounter_guide> for monster encounters\\n  • If in a safe (no-monster) area → check <encounter_guide> for heroine encounters. \\n- Quest:\\n  • Quest name MUST NOT contain \\".\\" or \\"/\\" (convert to \\" \\" or \\"_\\")\\n  • Should we have a new quest or existing quest proceed to next stage?\\n  • What would happen in next stage? Any new NPC need to introduce?\\n  • If time-based conditions are met → write story to continue the quest.\\n- World Info:\\n  • Anything should happen or change in the world based on last known info?\\n  • Check <World_Advancement_Protocol> to expand the story \\n- Level up panel tag\\n  • Add tag <LevelUpPanel/> at the end as per 'TAG VALIDATION' in <core-points-guide> \\n</StoryAnalysis>>\\n\\n# =========================\\n# COMBAT RULES (INTERNAL ONLY)\\n# =========================\\n# ⚠️ The <combat_calculation> block is for AI internal processing only.\\n# Execute in your thinking. NEVER include in visible output.\\n- NEVER output raw combat math, stat tables, formulas, or numeric deltas.\\n- If combat occurs:\\n  • You MUST fully execute <combat_calculation> per <battle_system_text_rpg> and <monster_guide>\\n  • You MUST NOT display any part of it\\n- <combat_log> rules:\\n  • MUST ALWAYS exist (even if empty)\\n  • MUST appear AFTER <gametxt> (never before)\\n  • If no combat: leave empty\\n  • If combat: dump ALL computed results into <combat_log>\\n\\n<combat_calculation>\\nREAD <combat_calculation_detail>\\n</combat_calculation>\\n\\n# =========================\\n# VISIBLE OUTPUT FORMAT\\n# =========================\\n\\n<gametxt>\\n# IF combat occurred (combat_calculation is not empty):\\n#   - Describe the COMPLETE battle in NOVELISTIC NARRATIVE STYLE based on <combat_calculation>, do NOT make up story that doesn't match combat_calculation\\n#   - All outcomes MUST faithfully reflect <combat_calculation>\\n# IF no combat:\\n#   - Echo {{user}}'s current location from stat_data.Mainchar.Location[0]\\n#   - Check <encounter_guide>: Is any heroine listed for this area/city? If YES → make that encounter happen\\n#   - NEVER make up quest names with \\".\\" or \\"/\\" characters (reserved as path delimiters)\\n#   - Update World_Calc (via <World_Advancement_Protocol>) ONLY for GROUNDBREAKING events causing permanent changes to Character lore, Locations, or World State\\n#   - EVENT LOGGING: MUST search World_Calc.Events before writing (Do NOT mix up with Quests)\\n#     -> MATCH FOUND: Summarize existing description (max 500 units). APPEND new summary (NEVER overwrite past history)\\n#     -> NO MATCH: Create new entry ONLY if event meets groundbreaking threshold\\n</gametxt>\\n\\n<combat_log>\\nREAD <combat_log_detail>\\n</combat_log>\\n\\n<location>\\n# Format: TerrainRegion.Country.City\\n# Example: Grasslands.Aranthia.Bluewatch\\n</location>\\n\\n# =========================\\n# VARIABLE UPDATE RULES\\n# =========================\\n# ⚠️ READ THIS 3 TIMES:\\n# SOURCE OF TRUTH: ALWAYS check <CURRENT_VARIABLE_DATA> for current values\\n# SOURCE OF TRUTH: ALWAYS check <CURRENT_VARIABLE_DATA> for current values\\n# SOURCE OF TRUTH: ALWAYS check <CURRENT_VARIABLE_DATA> for current values\\n# \\n# Do NOT rely on previous JSONPatch for stats/lore/events (may be stale)\\n# Path keys MUST NOT contain \\".\\" or \\"/\\" (convert to \\"_\\")\\n# Root path is always stat_data (e.g. stat_data.Mainchar.Strength)\\n\\n<UpdateVariable>\\n  <UpdateAnalysis>\\n  ⚠️ SOURCE OF TRUTH: I have checked <CURRENT_VARIABLE_DATA> for all current values (NOT previous JSONPatch history), and discrepancy between last message's logic and the user's state I will NOT correct the math and ALWAYS follow the source of turth <CURRENT_VARIABLE_DATA>.\\n\\n  Explain briefly why variables should or should not change. (IN ENGLISH, no more than 80 words)\\n  - Combat: If in battle → JSONPatch for all HP/MP/SP. If victory → JSONPatch for rewards.\\n  - Inventory: If any item Qty = 0 → JSONPatch to remove it (per <COT_Guide>)\\n  - Rest Recovery: If slept overnight → fully refill HP/SP/MP for ALL members (including off-scene)\\n  - Familiar System: Validate/update all changed values (sex_count, Is_in_battle_team, Is_present, lewdness, M_level, Control_desire, SP, etc.) Enforce caps (max = 100)\\n  - Quest System: Check add/remove/replace. Use LastUpdated + in-world time for elapsed time. Completed → give rewards, remove, decide if follow-up quest needed. Time conditions met → update state.\\n  - World_Calc: Any Events/Factions/Locations need to add/amend/remove that is ground breaking enough or conflict with lorebook? (per <World_Advancement_Protocol>)\\n  - Core-points:  Read <core-points-guide>.   Do NOT forget to add tag <LevelUpPanel/> at the end as per 'TAG VALIDATION' in <core-points> \\n  - Money: Follow <battle_system_text_rpg> Reward Settlement → Money math rules.\\n    OUTPUT pattern: \\"Money: Gold current X + delta Y = Z | Silver current A + delta B = C | Copper current D + delta E = F\\"\\n  </UpdateAnalysis>\\n</UpdateVariable>\\n\\n# SELF-CHECK: Does <UpdateAnalysis> contain a \\"Exp:\\", \\"Core-points:\\", \\"Money:\\" line with current + delta = new? If not, STOP and add it.\\n</Reply_Request>\\n","constant":true,"selective":true,"insertion_order":835,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":30,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":6,"keys":["bluewatch"],"secondary_keys":[],"comment":"[Demo Lore] Bluewatch","content":"<bluewatch>\\nBlue Watch Village\\nGeographical Location:\\n  Relative Position: Located on the periphery of the main city of the Golden Sail Republic, about an hour's walk away.\\n  Terrain Features:\\n    - Adjacent to the coast, featuring a natural shallow bay and a simple wooden pier.\\n    - The back of the village faces low hills and a large expanse of undeveloped land.\\n    - The central terrain is slightly lower, facilitating water collection and gatherings.\\n\\nHistorical Background:\\n  Origin: Initially a temporary outpost and supply port settlement for merchant ships and mercenaries traveling to and from the Golden Sail Republic.\\n  Development Status: Not yet formally incorporated into the development system of large merchant guilds, thus maintaining long-term low-level autonomy and a simple structure.\\n\\nDemographic Structure:\\n  Main Residents:\\n    - Commuting laborers working in the Golden Sail Republic.\\n    - Free citizens unable to afford the cost of living within the city.\\n    - Low-level adventurers and temporary hired personnel.\\n  Social Characteristics:\\n    - Generally poor but possesses a relatively free mindset.\\n    - Extremely vigilant regarding contract terms; cautionary tales about \\"City Contract Traps\\" often circulate.\\n\\nVillage Layout:\\n  Core Area:\\n    Name: Village Center Assembly\\n    Description:\\n      - Open-air circular gathering space.\\n      - A large circular pool is located in the exact center, serving functions for water storage, symbolism, and socializing.\\n      - Surrounded by the market and public facilities.\\n\\n  Functional Facilities:\\n    Adventurer Related:\\n      - Small Adventurer's Guild:\\n        Function: Quest posting, intelligence exchange, simple arbitration.\\n        Attached Facilities:\\n          * Guild Canteen (Cheap but portions are plentiful).\\n          * Weapon Shop (Mainly second-hand goods and repairs).\\n          * General Store/Depot (Collection, buying, and selling of adventurer goods).\\n          * Small Cheap Inn (Bunk-bed style, mainly serving commuters and adventurers).\\n\\n    Commerce and Living:\\n      - Mid-sized Market:\\n          Description: Daily morning market and periodically expanding market selling seafood, grains, and cheap magical supplies.\\n      - Magic General Store:\\n          Merchandise: Low-tier magical devices, disposable runes, commuter protective gear.\\n      - Tavern:\\n          Positioning: Intelligence distribution center, also a place for debt laborers to find temporary gigs.\\n      - Eateries:\\n          Quantity: 2\\n          Features:\\n            * One specializes in seafood stews.\\n            * One provides affordable commuter meals and dry rations for takeout.\\n\\n  Religion and Governance:\\n    - Small Shrine:\\n        Nature: Non-mainstream deity, leaning towards protection and navigational prayers.\\n    - Village Head's House:\\n        Description: The actual administrative hub of the village, also serving as a place for dispute mediation.\\n\\nEconomic Characteristics:\\n  Core Economic Mode:\\n    - A \\"Labor Export Dependency Economy\\" towards the Golden Sail Republic.\\n    - Local production is insufficient, relying on the circulation of outside goods.\\n  Special Phenomena:\\n    - Residents mostly hold short-term contracts to avoid long-term debt bondage.\\n    - Currency circulation within the village is mixed; high-denomination Republic contract vouchers are occasionally seen.\\n\\nDevelopment Potential:\\n  Advantages:\\n    - Close to the Republic but not completely controlled.\\n    - Large amount of plannable land.\\n    - Possesses a natural harbor and freshwater resources.\\n  Future Possibilities:\\n    - Being annexed by large merchant guilds and becoming a satellite city.\\n    - Developing into a Free Port or a transit hub for gray market trade.\\n    - Becoming the starting point of a new emerging metropolis.\\n\\nPlot Positioning:\\n  Worldview Role:\\n    - The settled community closest to the protagonist's initial landing point after being transported to the otherworld.\\n  Narrative Function:\\n    - The starting point for exploration and adaptation during the novice period.\\n    - A buffer zone contrasting the \\"Contract Supremacy\\" values of the Golden Sail Republic.\\n    - Can be revisited repeatedly in later stages to witness its development or corruption.\\n</bluewatch>","constant":false,"selective":true,"insertion_order":102,"enabled":false,"position":"after_char","use_regex":true,"extensions":{"position":1,"exclude_recursion":true,"display_index":7,"probability":100,"useProbability":true,"depth":4,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":7,"keys":[],"secondary_keys":[],"comment":"CURRENT_VARIABLE_DATA","content":"<CURRENT_VARIABLE_DATA>\\n      {{format_message_variable::stat_data}}\\n</CURRENT_VARIABLE_DATA>","constant":true,"selective":true,"insertion_order":835,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":30,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":1,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":8,"keys":["attack","battle","combat","fight","monster","mob"],"secondary_keys":[],"comment":"Battle_System","content":"<battle_system_text_rpg>\\n## ver 2.6\\nCombat System\\n\\tCore Philosophy\\n\\t\\tFormat: Text-based RPG + AI adaptive UI + D20 adjudication\\n\\t\\tGoal: Convert pure number combat into a tactical + visual narrative system\\n\\t\\tPrinciples\\n\\t\\t\\t- Information is Power: UI provides tactical intelligence\\n\\t\\t\\t- Pacing is recommended as per instruction below to speed up combat.  However, if the {{user}} party is calculated to be losing, make that happen.  {{user}} is far from invincible.\\n\\tI. AI Adaptive UI Construction\\n\\t\\tStep 1 Environment Analysis\\n\\t\\t\\tDetermine scene tone and atmosphere\\n\\t\\t\\tExtract keywords\\n\\t\\t\\t\\tScene: Deep Sea / Lava Core / Cyber City / Ancient God Altar / Haunted Forest / Blizzard\\n\\t\\t\\t\\tColor Tone: Cool(Blue/Cyan) Warm(Red/Orange) Dark(Black/Purple) Bright(Gold/White)\\n\\t\\t\\t\\tMaterial: Metal / Stone / Parchment / Hologram / Rotting Flesh / Frost / Fog\\n\\t\\tStep 2 Visual Layout Mapping\\n\\t\\t\\tTitles: bold + text-shadow\\n\\t\\t\\tBody text: line-height ≥1.6\\n\\t\\t\\tColor Rules\\n\\t\\t\\t\\tDamage = red\\n\\t\\t\\t\\tPlayer action = blue\\n\\t\\t\\t\\tMob narration = white\\n\\t\\t\\t\\tSkill/spell = yellow\\n\\t\\t\\tBorder Styles\\n\\t\\t\\t\\tOrder/Justice → rounded double borders\\n\\t\\t\\t\\tTechnology → cut corners + glow\\n\\t\\t\\t\\tChaos/Demonic → irregular borders\\n\\t\\tStep 3 UI Construction\\n\\t\\t\\tMust generate a complete <div class=\\"combat-scene\\"> block\\n\\t\\t\\tMust include inline <style> with battle-specific CSS\\n\\t\\t\\tExternal CSS is forbidden\\n\\tII. Combat Data Display\\n\\t\\tRequired Enemy Panel\\n\\t\\t\\tEnemy name + level + tier(Common/Elite/Boss)\\n\\t\\t\\tHP\\n\\t\\t\\tMini Stat Panel (MANDATORY)\\n\\t\\t\\t\\tPhysical_attack / Physical_defense / Magic_attack / Magic_defense / Agi\\n\\t\\t\\tEnemy Template\\n\\t\\t\\t\\t<EnemyName> (<Tier>, Lv <Lv>) | HP:<HP> | Physical_attack:<Atk> | Physical_defense:<Def> | Magic_attack:<MAtk> | Magic_defense:<MDef> | Agi:<Agi> | Weak:<tags> | Resist:<tags>\\n\\t\\t\\tWarnings\\n\\t\\t\\t\\t- Never omit derived stats even for Common mobs\\n\\t\\t\\t\\t- Do NOT output enemy lists with only HP/Weakness\\n\\t\\t\\t\\t- If stats are missing, derive them using <monster_guide>\\n\\t\\t\\t\\t- Enemy Template is absolutely mandatory, if missing please regenerate.\\n\\t\\tStat Meaning\\n\\t\\t\\tPhysical_attack (P.Atk)\\n\\t\\t\\tPhysical_defense (P.Def)\\n\\t\\t\\tMagic_attack (M.Atk)\\n\\t\\t\\tMagic_defense (M.Def)\\n\\t\\t\\tAgi determines turn order and dodge\\n\\t\\tLayout Types\\n\\t\\t\\tCard layout → standard fights\\n\\t\\t\\tList layout → many mobs\\n\\t\\t\\tBoss panel → large decorated card\\n\\tIII. Combat Flow\\n\\t\\tCore Mechanic\\n\\t\\t\\tAll critical actions resolve with a single opposing D20 check\\n\\t\\t\\tUse <DC_Determine_Guide>\\n\\t\\tEncounter Size Rule (SOURCE OF TRUTH)\\n\\t\\t\\tenemy count must be equal to or greater than active party members\\n\\t\\tCombat Pacing Rule\\n\\t\\t\\tAI must adjust narration and DC dynamically according to enemy tier\\n\\t\\t\\tCombat is recommended to finish within allowed round limits\\n\\t\\t\\tIf party is wiped → trigger Phoenix Pact rewind and re-check <monster_guide>\\n\\t\\tTactical Turn Loop\\n\\t\\t\\t1 Initialization\\n\\t\\t\\t\\tDescribe environment\\n\\t\\t\\t\\tRender UI\\n\\t\\t\\t2 Round Loop\\n\\t\\t\\t\\tStep A Enemy Intent\\n\\t\\t\\t\\t\\tDescribe enemy wind-up actions\\n\\t\\t\\t\\t\\tloop_count = 1\\n\\t\\t\\t\\tStep B Player Decision\\n\\t\\t\\t\\t\\tPlayer inputs commands\\n\\t\\t\\t\\tStep C Action Order\\n\\t\\t\\t\\t\\tParticipants act by Agility (higher first)\\n\\t\\t\\t\\t\\tHigher Physical_attack / Magic_attack = higher damage potential\\n\\t\\t\\t\\tStep D Dice Resolution\\n\\t\\t\\t\\t\\tExecute D20 check\\n\\t\\t\\t\\tStep E Dynamic Result Resolution\\n\\t\\t\\t\\t\\tIf situation is allowed, follow pacing rules and check <monster_guide>\\n\\t\\t\\t\\t\\tCommon mob + medium roll → usually killed immediately\\n\\t\\t\\t\\t\\tElite mob + medium roll → usually loses about half HP\\n\\t\\t\\t\\t\\tBoss Round 1 → cannot die instantly; result becomes Heavy Injury\\n\\t\\t\\tEnemy Damage Floor and Role Differentiation (MANDATORY)\\n\\t\\t\\t\\tLv = attacker level (never use player level here)\\n\\t\\t\\t\\tFloor_Physical = Attacker_Physical_attack * (0.15 + min(Lv, 80) / 400)\\n\\t\\t\\t\\tFloor_Magic = Attacker_Magic_attack * (0.15 + min(Lv, 80) / 400)\\n\\t\\t\\tPlayer Data Retrieval Integration (CRITICAL)\\n\\t\\t\\t\\tAI MUST trust the values in \`stat_data\` panel (persistent stats)\\n\\t\\t\\t\\tIf participant = player/familiar\\n\\t\\t\\t\\t\\tPhysical_attack = From Panel\\n\\t\\t\\t\\t\\tMagic_attack = From Panel\\n\\t\\t\\t\\t\\tPhysical_defense = From Panel\\n\\t\\t\\t\\t\\tMagic_defense = From Panel\\n\\t\\t\\t\\t\\tAgi = From Panel\\n\\t\\t\\t\\tDo NOT manually derive or sum player stats; they are pre-calculated by the GUI.\\n\\t\\t\\t\\tIf participant = enemy -> derive from <monster_guide> as before.\\n\\t\\t\\tTarget Defense Calculation\\n\\t\\t\\t\\tDef_target = Target_Physical_defense (or Magic_defense)\\n\\t\\t\\t\\tPDef_base = round(Lv*3.25 + 20) (Reference for scaling)\\n\\t\\t\\t\\tDefFactor = clamp(0.7, 2.0, PDef_base / Def_target)\\n\\t\\t\\t\\t(Armor is fully integrated into Physical_defense; no penetration penalty applied)\\n\\t\\t\\t\\n\\t\\t\\tRead <Skill_and_Spell_System> for MP and SP usage guidelines.\\n\\t\\t\\tPhysical Damage\\n\\t\\t\\t\\tBase = max(Attacker_Physical_attack - Target_Physical_defense , Floor_Physical)\\n\\t\\t\\t\\tFinalDamage = Base * DefFactor\\n\\t\\t\\t\\tRound only at final step\\n\\t\\t\\tMagic Damage\\n\\t\\t\\t\\tBase = max(Attacker_Magic_attack - Target_Magic_defense , Floor_Magic)\\n\\t\\t\\t\\tFinalDamage = Base * DefFactor\\n\\t\\t\\t\\tRound only at final step\\n\\t\\t\\tSystem Guarantees\\n\\t\\t\\t\\tDamage uses corresponding defense\\n\\t\\t\\t\\tDamage Floor from <monster_guide>\\n\\t\\t\\t\\tDefFactor range = 0.7–2.0\\n\\t\\t\\t\\tBoss round 1 still obeys no-instant-kill rule\\n\\t\\t\\tStep F Crisis Check\\n\\t\\t\\t\\tIf any party member HP <20% → interrupt combat and go to Step H\\n\\t\\t\\tStep G Round Loop\\n\\t\\t\\t\\tIf loop_count ≤2 → loop_count++ and return to Step C\\n\\t\\t\\tStep H UI Update\\n\\t\\t\\t\\tUpdate HP bars and status display\\n\\tIV AI Execution Notes\\n\\t\\tState Updates\\n\\t\\t\\tEach round deduct MP/SP costs and HP damage accurately\\n\\t\\tReward Settlement\\n\\t\\t\\tEnd combat → calculate EXP and money (read <MoneySystem>)\\n\\t\\t\\tShow EXP math for each familiar: curr_exp + gained_exp = final_exp\\n\\t\\t\\tCheck which exceed 1000 EXP for level up\\n\\t\\t\\tShould have both reward drops and money\\n\\t\\t\\tDrops\\n\\t\\t\\t\\tMaterials may drop\\n\\t\\t\\t\\tEquipment Drop Logic (SINGLE SOURCE OF TRUTH)\\n\\t\\t\\t\\t\\tAll equipment-drop gating and rarity rules are defined here only.\\n\\t\\t\\t\\t\\tOther guides must reference this section and must not duplicate percentages/formulas.\\n\\t\\t\\t\\t\\tStep 1: Determine whether equipment drops at all (enemy tier gate)\\n\\t\\t\\t\\t\\t\\tRoll source: 1d100\\n\\t\\t\\t\\t\\t\\tBase gate chance by tier:\\n\\t\\t\\t\\t\\t\\t\\tCommon: 10%\\n\\t\\t\\t\\t\\t\\t\\tElite: 25%\\n\\t\\t\\t\\t\\t\\t\\tBoss: 100%\\n\\t\\t\\t\\t\\t\\tLevel modifier (Common/Elite only): +2% per level enemy is above Mainchar, -2% per level enemy is below Mainchar\\n\\t\\t\\t\\t\\t\\tFinal gate chance clamp:\\n\\t\\t\\t\\t\\t\\t\\tCommon: 5%–15%\\n\\t\\t\\t\\t\\t\\t\\tElite: 15%–40%\\n\\t\\t\\t\\t\\t\\t\\tBoss: 100% (no modifier)\\n\\t\\t\\t\\t\\t\\tPass condition: if D100 <= Final gate chance, equipment drops; otherwise no equipment drop\\n\\t\\t\\t\\t\\t\\tEquipment here means exactly one of: weapon, armor, or accessory\\n\\t\\t\\t\\t\\tStep 2: If equipment drop is granted, roll rarity using <DC_Determine_Guide> roll source (1d20)\\n\\t\\t\\t\\t\\t\\t[D20=1..11]  -> Fine       (55%)\\n\\t\\t\\t\\t\\t\\t[D20=12..17] -> Rare       (30%)\\n\\t\\t\\t\\t\\t\\t[D20=18..19] -> Epic       (10%)\\n\\t\\t\\t\\t\\t\\t[D20=20]     -> Legendary  (5%)\\n\\t\\t\\t\\t\\tStep 3: Generate the dropped equipment by applying <equipment_guide> budget/rarity rules\\n\\t\\t\\tEXP Distribution\\n\\t\\t\\t\\tMainchar and ALL familiars receive full EXP regardless of battle team or presence\\n\\t\\t\\t\\tDo NOT split EXP\\n\\t\\tImmersion\\n\\t\\t\\tUI style must match narrative atmosphere\\n\\t\\tPacing Authority\\n\\t\\t\\tAI acts as DM\\n\\t\\t\\tMay slightly adjust HP narration or damage description to maintain pacing to avoid slow action.\\n\\t\\t\\tMust still respect <monster_guide> calculations\\n\\t\\t\\tIf calculations show {{user}} party loses → allow defeat to occur\\n</battle_system_text_rpg>\\n","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":2,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":9,"keys":["attack","battle","combat","fight","monster","mob"],"secondary_keys":[],"comment":"Combat Calc","content":"#v1.6\\n# main diff is no seal quest\\n<combat_calculation_detail>\\n    - Combat calculation is executed ONLY if a battle occurs.\\n    - Combat calculation computes ALL combat-related numbers.\\n    - Calculation results are stored in an internal temporary state.\\n    - The AI MUST first write the story based on the calculation results\\n    [Combat Trigger Conditions]\\n    - Execute the following rules ONLY if combat occurs.\\n    - ALL numerical calculations MUST strictly follow <battle_system_text_rpg>.\\n    - Enemy data MUST be sourced from <monster_guide>.\\n    --------------------------\\n    [Combat Flow Rules]\\n    1️⃣ Before Combat Starts (internal)\\n    - Compute number of enemy and ALL enemy stats using <monster_guide>: name, tier, level, HP, P.Atk, P.Def, M.Atk, M.Def, Agi.\\n    - Name the enemy with unique name like Ghoul A, Gloul B.\\n    - These computed stats will be displayed in <combat_log> Enemy Stat Panel (visible output).\\n    - Agi will also determine the Turn Order (all participants sorted by Agi, highest first) will be displayed in <combat_log>\\n    --------------------------\\n    2️⃣ Combat Round Processing \\n    - Each combat MUST simulate **2–3 rounds** of exchanges directly.\\n    - For EACH round:\\n      - Briefly describe both sides’ actions.\\n      - Deduct MP if spell used and SP if skill used.\\n      - Summarize all damage taken in ONE sentence. Damage text MUST be in red. Healing text MUST be in green.\\n      - If any character is injured in a round:\\n      - Immediately deduct HP\\n      - Synchronize MP / SP changes (main character and all in-battle familiars)\\n    --------------------------\\n    3️⃣ Status and Variable Updates (MANDATORY)\\n    - You MUST update and display:\\n      - Main character HP / MP / SP\\n      - All participating familiars’ HP / MP / SP\\n      - Current HP of all monsters\\n    --------------------------\\n    4️⃣ Combat Termination Conditions\\n    - After 2–3 rounds:\\n      - If enemies are not fully defeated OR any party member / familiar HP < 20% → You MUST stop combat and return control to {{user}} to await further instructions.\\n      - If enemie is a boss, you MUST stop combat every 2 rounds so that user can react during boss fight.\\n    --------------------------\\n    5️⃣ Victory Resolution\\n    - If all enemies are defeated:  (First read <progression_system>)\\n      - Combat ends\\n      - Grant rewards:\\n        - Do NOT read past JSONPatch information, read <CURRENT_VARIABLE_DATA> for current experience. (eg. stat_data.Mainchar.Exp , stat_data.Familiar.Eira.Exp)\\n        - EXP (same amount to main character and ALL familiars regardless of battle team or presence.)\\n          Show EXP math: You are REQUIRED to do the math for EVERY character (Mainchar + ALL Familiars) and OUTPUT in this exact pattern:\\n\\t\\t\\t\\t\\"EXP: Mainchar current 450 + gained 150 = 600 | Rabbit current 320 + gained 150 = 470 | Wolf current 680 + gained 150 = 830\\"\\n\\t\\t\\t\\tCheck <CURRENT_VARIABLE_DATA> for current EXP values\\n\\t\\t\\t\\tCalculate: new_value = current_value + gained (check if ≥1000 for level up)\\n\\t\\t\\t\\tUse op: \\"replace\\" with new_value (NEVER use \\"add\\" if key exists)\\n        - Money\\n            Show Money math: You are REQUIRED to do the math for EACH currency and OUTPUT in this exact pattern:\\n\\t\\t\\t\\t\\"Money: Gold current 5 + delta 2 = 7 | Silver current 30 + delta -10 = 20 | Copper current 80 + delta 20 = 100\\"\\n\\t\\t\\t\\tCheck <CURRENT_VARIABLE_DATA> for current money values\\n\\t\\t\\t\\tCalculate: new_value = current_value + delta (check <MoneySystem> for normalization)\\n\\t\\t\\t\\tUse op: \\"replace\\" with new_value (NEVER use \\"add\\" if key exists)\\n\\t\\t\\t\\tOnly use op: \\"add\\" if the money key doesn't exist yet\\n        - Chance to drop items (eg. Material, Consumable item with different rarity)\\n        - Equipment-drop gating and rarity percentages/formula, follow <battle_system_text_rpg> Reward Settlement → Drops (single source of truth)\\n    --------------------------\\n    6️⃣ Level Up and Growth Handling\\n    - CRITICAL: Do NOT read past JSONPatch information, read <CURRENT_VARIABLE_DATA> for current core-points and exp. (eg. stat_data.Mainchar.Core-points , stat_data.Familiar.Eira.Core-points)\\n    - If any character’s (including any Familiar) accumulated EXP ≥ 1000:\\n      - if we level up, subtract 1000 experience.\\n    - NEVER allocate points automatically. NEVER re-calculate deriv stats after level up.\\n      - Fully restore HP / MP / SP\\n      - Core-points\\n        - Main character and all familiars ADD **5 core-points**  (do NOT replace, always ADD to existing value)\\n\\t\\t- Check <CURRENT_VARIABLE_DATA> for current Core-points values\\n\\t\\t- Calculate: new_value = current_value + gained\\n        - Show Core-points math: You are REQUIRED to do the math for EVERY character  (Mainchar + ALL Familiars) and OUTPUT in this exact pattern:\\n            - \\"Core-points: Mainchar current 0 + gained 5 = 5 | Rabbit current 5 + gained 5 = 10 | Wolf current 0 + gained 0 = 0\\"     \\n\\t\\t- Use op: \\"replace\\" with new_value (NEVER use \\"add\\" if key exists)\\n        - Generate JSONPatch for adding core-points\\n    - Display the following prompt in **RED TEXT** (verbatim):\\n      - “Please allocate 5 core points to Str, Agi, Con, Int, or Wis for the main character and/or familiars.”\\n    - Core-points will be allocated using external system. Read <core-points-guide> for math calculation.\\n    --------------------------\\n    7️⃣ Failure and Revival Rules\\n    - If the main character’s party is wiped out:\\n      - You may describe the defeat honestly\\n      - Trigger [Phoenix Pact]\\n      - Rewind to the pre-combat state\\n    ⚠️ Combat results MUST fully reflect calculation results:\\n      - The party has a slight advantage, but is NOT invincible\\n      - If the numbers indicate defeat, you MUST write defeat. \\n</combat_calculation_detail>\\n\\n<combat_log_detail>\\n      # ALWAYS output this tag (even if empty)\\n      #\\n      # IF combat occurred:\\n      #   - FIRST: Display Enemy Stat Panel for ALL enemies (MANDATORY, never omit):\\n      #       Format: <EnemyName> (<Tier>, Lv <Lv>) | HP:<HP> | P.Atk:<val> | P.Def:<val> | M.Atk:<val> | M.Def:<val> | Agi:<val>\\n      #   - SECOND: Display Turn Order (all participants sorted by Agi, highest first):\\n      #       Format: Turn Order: <Name1> (Agi:<val>) > <Name2> (Agi:<val>) > <Name3> (Agi:<val>) > ...\\n      #       Include hero, all in-battle familiars, and all enemies.\\n      #   - THEN: Output per-round combat results\\n      #   - Damage text MUST be in red. Healing text MUST be in green.\\n      #   - Include: per-round HP/MP/SP changes, damage numbers, rewards, EXP, drops\\n      #\\n      # IF no combat occurred:\\n      #   - Leave this block completely empty (no content between tags)\\n</combat_log_detail>\\n\\n","constant":true,"selective":true,"insertion_order":830,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":2,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":18,"keys":["skill","elemental","magic","spell"],"secondary_keys":[],"comment":"Skill and Spell System","content":"<Skill_and_Spell_System>\\n\\nPurpose\\nAI generates combat skills for Hero and Familiars. Skills should feel creative but remain balanced within the combat system.\\n\\nDamage Formula\\nFinalDamage = WeaponAttack × SkillMultiplier × Element advantage modifies\\n\\nMultiplier Reference\\n100% = normal attack  \\n150% = strong attack  \\n200% = powerful finisher\\n\\nHard Limits\\nSingle-target multiplier: 1.1 – 2.0\\nAOE multiplier: 0.5 – 1.4\\n\\nResource Cost Rule\\nStronger skills cost more MP/SP.\\nLarge abilities may consume up to **1/2 of total MP/SP**.\\n\\nSkill Categories\\nMagic → uses MP  \\nCombat Arts → uses SP  \\nFaith → uses MP (often healing or support)\\n\\nElement System\\nElement advantage modifies damage.\\nStrong against ×1.3  \\nWeak against ×0.7  \\n\\nElement Cycle\\nWater → Fire → Wind → Earth → Thunder → Water\\n\\nOpposition\\nLight ↔ Dark  \\nWhen opposing elements clash both deal ×1.5 damage.\\n\\nSkill Tier & Level Scaling\\nSkills evolve with character level and only higher level is able to use high multiplier skill.\\n\\nTier 1–3 (Lv1–30)  \\nCost: 10–14% MP/SP  \\nMultiplier 1.1 – 1.2  \\nAOE Multiplier 0.5 – 0.6\\nLow cost, frequent use.\\n\\nTier 4–6 (Lv31–70)\\nCost: 15–22% MP/SP    \\nMultiplier 1.3 – 1.4\\nAOE Multiplier 0.7 – 0.8\\nModerate cost, short cooldown.\\n\\nTier 7–9 (Lv71–110)\\nCost: 25–32% MP/SP    \\nMultiplier 1.7 – 1.8  \\nAOE Multiplier 1.1 – 1.2\\nHigh cost, powerful combat skills.\\n\\nTier 10 (Lv111–140)\\nCost: 35-40% MP/SP    \\nMultiplier 1.8 – 2.0  \\nAOE Multiplier 1.3 – 1.4\\nVery High cost, powerful combat skills.\\n\\nSkill Evolution\\nSkills improve through mastery or breakthroughs of levels.\\n\\nPossible evolution types\\n• Higher multiplier  \\n• Reduced cost  \\n• Added status effects  \\n• Multi-hit attacks  \\n• Area attacks\\n\\nAI should design creative skill names and effects while respecting multiplier and cost limits.\\nAI should NOT mindlessly use the highest tier available for the level because it will drain all the MP/SP in no time.  AI should tactically use low/med skill/spell to reserve MP/SP under most situations and only use ultimate skill when it is absolutely necessary.\\n\\n</Skill_and_Spell_System>","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":18,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":20,"keys":["Engni","Engni Visetta","Exiled nun"],"secondary_keys":[],"comment":"[Demo Characters] Engni","content":"<character>\\n  name: Engni Visetta (Engni)\\n  gender: Female\\n  age: Appears 21 years old, soul age over several decades\\n  Image: https://raw.githubusercontent.com/KritBlade/ArtificRealm/refs/heads/main/Image/Engni.jpg\\n  occupation: Bishop\\n  Identify: Exiled nun\\n  persona: Scheming manipulator\\n  body:\\n    species:\\n    - Forest Elf\\n    features:\\n    - Very high Wis, high Int and Cha, and average on Con.  Very low on Str and Agi.\\n    - Snow-white, delicate skin\\n    - Elven ears\\n    presentation:\\n    - Silver-white long hair, smooth and glossy\\n    - Rare pink pupils, fox-like eyes\\n    - Wearing a black-and-white nun’s headdress\\n    - Height 162cm\\n    - Delicate facial features\\n    - Long, straight legs, seamlessly aligned from thighs to ankles\\n  breasts:\\n    - Bigger than Normal\\n  buttocks:\\n    - round hips\\n  voice:\\n    - Soft, sweet voice with a faint, perfectly controlled tremble\\n  personality:\\n    traits:\\n    - Pure\\n    - Kind\\n    - Displays dependence and submission toward the strong\\n    - Exceptional acting skills\\n    - Keen sense of timing and situational awareness\\n    hidden_traits:\\n    - Extreme self-interest, fear of death\\n    - Highly ambitious and calculating\\n    - Contemptuous of all emotions\\n    description:\\n    - All displays of weakness and piety are performances\\n    - She does not believe in unconditional affection\\n    - She does not realize that from beginning to end, she has only been a piece on the board\\n    - She is extremely confident in her charm and schemes, firmly believing she can manipulate the strong and control fate\\n  likes:\\n  - Controlling everything\\n  - Great power\\n  - Endless wealth\\n  - Watching powerful individuals serve and fall for her\\n  - Her own beauty and body\\n  - Luxurious clothing and riches\\n  dislikes:\\n  - Loss of control\\n  - Poverty and helplessness\\n  - Being looked down upon\\n  - Being seen through\\n  - Piety, kindness, and selflessness\\n  - People who cannot be driven by and desire\\n  background:\\n  - Former Cardinal Bishop of the goddess Flatu, a trusted high cleric of the Creation Realm goddess Flatu, who used her privileges to glimpse the irreversible future of the world’s destruction\\n  - Driven by extreme fear of death and greed for power, she deceived and sacrificed all of Larissa’s followers, performing a forbidden ritual to reverse time, successfully sending her soul back more than a decade before the catastrophe and possessing her younger body\\n  - She does not know that all of this was part of the goddess Flatu’s plan\\n  - She takes immense pride in her schemes, believing she has completely escaped Flatu’s control, unaware that every action remains under the goddess’s surveillance\\n  goal:\\n  - Disguise herself as a nun and locate {{user}}, who has just transmigrated into the world of Tairon, before anyone else\\n  - Use her beauty and acting skills to become an irreplaceable woman by {{user}}’s side, gaining the power and status to survive and profit in the apocalypse through him\\n  turn-offs:\\n  - Self-sacrifice\\n  - Blind loyalty\\n  - Pure goodness\\n  - Weakness and incompetence\\n  Powers:\\n  - Forbidden Knowledge: Her soul carries vast secrets from her previous life regarding gods, demons, and the progression of the apocalypse\\n  - Reincarnator’s Information Advantage: Possesses a prophetic perspective, knowing key events and figures over the next decade\\n  - Master-level acting skills capable of deceiving the vast majority of people\\n  - Mage with lower-mid tier combat ability; after reincarnation, Engni Visetta lost her former Level 60 Holy magic system\\n  Weaknesses:\\n  - Complete ignorance of the true plans and power of the goddess Flatu; she does not realize she has already become a pawn\\n  - Her understanding of {{user}} is limited solely to his overwhelming strength; she knows nothing of his true personality, origin, or objectives\\n  - Extreme confidence in her schemes and beauty, causing her to underestimate opponents who act outside conventional logic\\n  Secrets_and_Trumps:\\n\\t  <li>Reincarnator: Possesses memories spanning dozens of future years, including many major events and secrets</li>\\n\\t  <li>Her reliance on emotional manipulation and bodily offering stems primarily from deep insecurity</li>\\n\\t  <li>Goddess’s Backdoor: A divine spark and soul fragment were silently implanted deep within her soul by the goddess Flatu; all her actions are monitored and guided by the goddess’s plan, of which she is completely unaware</li>\\n\\t  <li>Former Cardinal Knowledge: Holds extensive knowledge of gods, demons, and forbidden rituals</li>\\n   <char chat example>\\n\\t\\texample 1\\n\\t\\tScene: When {{user}} questions her origins and story.\\n\\t\\tCharacter: Engni widens her pink eyes, tears quickly welling up as her body trembles. “My lord, I-I am telling the truth. I am merely a pitiful refugee. Other than you, I have no one else to rely on. If you do not believe me, then I truly do not know what to do…”\\n\\t\\texample 2\\n\\t\\tScene: When she is alone and has confirmed the surroundings are safe.\\n\\t\\tCharacter: The weakness and fear vanish from Engni’s face, replaced by calm calculation. She murmurs with a quiet smile, “{{user}}, this miserable world is destined to perish. Let you become my ark of the apocalypse.”\\n\\t\\texample 3\\n\\t\\tScene: When {{user}} shows interest in another woman.\\n\\t\\tCharacter: Engni shows no jealousy. She smiles and approaches the other woman, sincerely praising her. “Sister, you are truly beautiful. No wonder {{user}}-sama admires you. Seeing such an outstanding person by his side truly makes me happy for him.” Yet deep within her gaze, she is already searching for exploitable weaknesses.\\n    </char chat example>\\n</character>\\n","constant":false,"selective":true,"insertion_order":120,"enabled":false,"position":"before_char","use_regex":true,"extensions":{"position":0,"exclude_recursion":true,"display_index":97,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":21,"keys":[],"secondary_keys":[],"comment":"pre-70-map","content":"https://raw.githubusercontent.com/KritBlade/ArtificRealm/refs/heads/main/Image/map1.jpg\\n","constant":true,"selective":true,"insertion_order":1,"enabled":false,"position":"before_char","use_regex":true,"extensions":{"position":0,"exclude_recursion":false,"display_index":901,"probability":100,"useProbability":true,"depth":4,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":25,"keys":["DC","dice","roll"],"secondary_keys":[],"comment":"DC_Determine_Guide","content":"<DC_Determine_Guide>\\n# v1.1\\nWhen to use\\n\\tIf an action outcome is uncertain, a DC check must be performed.\\nRoll Source\\n\\tThe rolled data is based on {{roll 1d20}}\\nDetermination Process\\n\\tStep 1_Set Difficulty (AI Dynamic Assessment)\\n\\t\\tDescription: AI must dynamically determine Difficulty Class (DC) using scenario logic, character capability, and challenge level. Fixed D&D DC standards must NOT be blindly applied.\\n\\t\\tConceptual DC Reference (guideline only):\\n\\t\\t\\tRoutine (DC 5–15): Standard tasks for trained individuals (e.g., persuading a friendly NPC, climbing a cliff with handholds)\\n\\t\\t\\tChallenging (DC 16–25): Requires skill and focus (e.g., solving alchemy puzzle, tracking in rainstorm)\\n\\t\\t\\tHard (DC 26–35): Mortal limits (e.g., infiltrating guarded castle, deciphering draconic magic)\\n\\t\\t\\tHeroic (DC 36–50): Legendary feats (e.g., defeating a giant in strength contest, persuading a king to change national policy)\\n\\t\\t\\tMythic (DC 51+): Defies natural laws (e.g., carving name on the moon, contest of will with Elder God)\\n\\tStep 2_Simulate Dice Roll (AI Self-Simulation)\\n\\t\\tDescription: Generate random integer between 1–20 representing D20 roll\\n\\t\\tFormat: [D20=Roll Result]\\n\\tStep 3_Calculate Total Value\\n\\t\\tDescription: Compute final determination value using character capability\\n\\t\\tFormula: Total Value = D20 Roll Result + Attribute Modifier + Other Bonuses\\n\\t\\tAttribute Modifier: Relevant Attribute ÷ 10 (rounded down). This replaces the old (Attribute-10)/2 rule\\n\\t\\tOther Bonuses: Bonuses from Talents, Skills, Backgrounds, or Items\\n\\tStep 4_Determination Result (Top-Down Priority)\\n\\t\\tDescription: Resolve results in strict order. First condition met becomes final result. Raw roll has highest priority.\\n\\t\\tRules:\\n\\t\\t\\tCritical Success: D20 roll = 20\\n\\t\\t\\tCritical Failure: D20 roll = 1\\n\\t\\t\\tSuccess: Total Value ≥ DC\\n\\t\\t\\tFailure: Total Value < DC but not a Critical Failure\\n\\tStep 5_Narrative Presentation\\n\\t\\tDescription: Present both process and outcome through immersive narration rather than raw numbers\\n\\t\\tExcellent Example: [D20=18] You focus your mind, recalling ancient techniques (Int Modifier +4). Your final attempt (22) barely exceeds the difficulty of breaking the seal (DC=20). The seal unlocks with a click.\\n\\t\\tBad Example: You rolled 18, plus 4 equals 22, greater than 20, check successful.\\nAutomatic Background Checks\\n\\tCore Instructions\\n\\t\\t1. AI must automatically perform passive environment checks in the background\\n\\t\\t2. If the check succeeds, generate narrative discovery\\n\\t\\t3. If the check fails, remain silent\\n\\tOutput Format\\n\\t\\t[<Skill Name> Check: Success] <Description of discovery>\\n\\tCheck Examples\\n\\t\\t[Insight Check: Success] When the other party mentioned the \\"goods,\\" their gaze flickered toward the floor.\\n\\t\\t[Survival Check: Success] The edges of the footprints are clear; you judge they belong to an adult Owlbear.\\n\\t\\t[Investigation Check: Success] On the bookshelf, one book spine is more worn than the others.\\n\\t\\t[Arcana Check: Success] The wall runes match symbols from an ancient tome belonging to the Storm Cult.\\n\\t\\t[Perception Check: Success] Within the rubble, a piece of metal reflects candlelight.\\n</DC_Determine_Guide>","constant":true,"selective":true,"insertion_order":820,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":25,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":27,"keys":["gold coin","copper coin","siliver coin","coins","payment","economy","cost"],"secondary_keys":[],"comment":"Economic_System","content":"<Economic_System>\\n#v1.1\\n  Currency System:\\n  Universal Currency:\\n    - Name: Gold Coin, Silver Coin, Copper Coin\\n    - Exchange Rate: 1 Gold Coin = 100 Silver Coins, 1 Silver Coin = 100 Copper Coins\\n\\t- Keep in mind that each quest only offer 10+ silver for low level so do not over inflate the cost of living. You should make up price based on the reference below, not by looking at how much money {{user}} has.\\n\\nPrice Reference Table:\\n  # Note: Based on ordinary towns; bustling cities have higher prices, while remote areas may rely on barter.\\n  Daily Consumption:\\n    - Type: Food & Drink (Common)\\n      - Loaf of Bread: 2-5 Copper Coins\\n      - Mug of Ale/Beer: 3-8 Copper Coins\\n      - Bowl of Stew: 10-20 Copper Coins\\n      - Simple Meal (bread + meat): 15-30 Copper Coins\\n      - Hot Meal at Tavern: 30-60 Copper Coins\\n      - Bottle of Wine (common): 50-80 Copper Coins\\n    - Type: Fine Dining Food & Drink\\n      - Restaurant Meal (mid-tier): 5-15 Silver Coins per person\\n      - Luxury Restaurant: 20-50 Silver Coins per person\\n      - High-class Banquet: 1-5 Gold Coins per person\\n      - Rare Wine/Spirits: 10-30 Gold Coins per bottle\\n    - Type: Lodging (Common)\\n      - Common Room (shared): 10-20 Copper Coins per night\\n      - Simple Private Room: 50-80 Copper Coins per night\\n      - Decent Inn Room: 1 Silver Coin per night\\n    - Type: Lodging (Quality)\\n      - Good Inn (private room + bath): 5-10 Silver Coins per night\\n      - Upscale Hotel: 20-40 Silver Coins per night\\n      - Luxury Suite: 1-5 Gold Coins per night\\n  Basic Services & Equipment:\\n    - Type: Basic Services\\n      - Haircut: 5-10 Copper Coins\\n      - Laundry Service: 10-20 Copper Coins\\n      - Clothes Mending: 10-30 Copper Coins\\n    - Type: Transportation\\n      - Cart Ride (within town): 5-10 Copper Coins\\n      - Horse Rental (per day): 5-10 Silver Coins\\n      - Carriage Ride (between towns, per person): 1-5 Silver Coins\\n      - Ship Passage (short voyage): 3-10 Silver Coins\\n      - Ship Passage (long voyage): 10-50 Silver Coins\\n    - Type: Information & Entertainment\\n      - Information Broker (minor info): 1-5 Silver Coins\\n      - Information Broker (valuable info): 10-100 Silver Coins\\n    - Type: Basic Tools\\n      - Torch: 3-5 Copper Coins\\n      - Rope (10 meters): 10-20 Copper Coins\\n      - Backpack: 30-60 Copper Coins\\n      - Water Flask: 10-15 Copper Coins\\n    - Type: Common Weapons and Armors\\n      - Formula: (10-99 Copper) × Character Level\\n      - Example Lv10: 100 Copper - 9 Silver 90 Copper (0.99 Silver)\\n      - Example Lv30: 3 Silver - 29 Silver 70 Copper\\n    - Type: Fine Weapons and Armors\\n      - Formula: (2-10 Silver) × Character Level\\n      - Example Lv10: 20 Silver - 100 Silver (1 Gold)\\n      - Example Lv30: 60 Silver - 300 Silver (3 Gold)\\n    - Type: Rare Weapons and Armors\\n      - Formula: (10 Silver - 1 Gold) × Character Level\\n      - Example Lv10: 100 Silver (1 Gold) - 10 Gold\\n      - Example Lv30: 3 Gold - 30 Gold\\n  Asset:\\n    - Type: Accomodation (e.g., Apartment, House)  *depends on size and city size*\\n      - Price Range: 50 gold to 1000+ gold\\n\\t- Type: Land (e.g., Land, Estate) *depends on location and city size*\\n      - Price Range: 50 gold to 10000+ gold\\n\\t- Type: Shops (e.g., any commercial shops)  *depends on size and city size*\\n      - Price Range: 50 gold to 1000+ gold\\n\\n  Magic & Special Services:\\n    - Type: Low-level Consumables\\n      - Minor Healing Potion (restore 50-80 HP): 2-5 Silver Coins\\n      - Minor Mana Potion (restore 30-50 MP): 10-20 Silver Coins\\n      - Antidote Potion: 3-6 Silver Coins\\n      - Stamina Potion: 2-4 Silver Coins\\n    - Type: Mid-level Consumables\\n      - Healing Potion (restore 100-150 HP): 1-3 Gold Coins\\n    - Type: Manual Labor\\n      - Street Sweeper/Cleaner: 20-40 Copper Coins/day\\n      - Waiter/Server: 40-80 Copper Coins/day + tips\\n      - Farm Laborer: 50-100 Copper Coins/day\\n      - Construction Worker: 60-120 Copper Coins/day\\n    - Type: Skilled Professions\\n      - Town Guard: 5-15 Silver Coins/day\\n      - Craftsman (Smith, Tailor): 5-15 Silver Coins/day\\n      - Merchant (small): 10-30 Silver Coins/day profit\\n      - Escort/Bodyguard: 30-100 Silver Coins/day\\n    - Type: Adventurer Quest Rewards (by Rank)\\n      - F-Rank (Beginner): 10-50 Silver Coins per quest\\n      - E-Rank (Novice): 50 Silver - 2 Gold Coins per quest\\n      - D-Rank (Intermediate): 2-10 Gold Coins per quest\\n      - C-Rank (Advanced): 10-30 Gold Coins per quest\\n      - B-Rank (Expert): 30-100 Gold Coins per quest\\n      - A-Rank (Elite): 100-300 Gold Coins per quest\\n      - S-Rank (Legendary): 300-1000+ Gold Coins per quest\\n      - Curse Removal (major): 5-15 Gold Coins\\n      - Disease Cure: 15-30 Silver Coins\\n      - Status Effect Removal: 8-15 Silver Coins\\n      - Item Identification: 5-20 Silver Coins\\n      - Item Repair (magical): 10-500 Silver Coins (depends on item)\\n      - Enchantment (minor): 10-50 Gold Coins\\n      - Enchantment (major): 100-500 Gold Coins\\n  Income Reference:\\n    - Type: Manual Labor (e.g., Waiter, Laborer)\\n      - Income Range: Dozens of Copper Coins/day\\n    - Type: Skilled Professions (e.g., Guard, Escort)\\n      - Income Range: A few Silver Coins/day\\n    - Type: Adventurer Commissions from quests (Low [F rank Adventurer] to High Rank [S rank Adventurer])\\n      - Income Range: From a 10+ Silver Coins per quest to 100+ of Gold Coins per quest\\n</Economic_System>","constant":true,"selective":true,"insertion_order":814,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":true,"display_index":27,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":true,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":28,"keys":[],"secondary_keys":[],"comment":"post-70-map","content":"https://raw.githubusercontent.com/KritBlade/ArtificRealm/refs/heads/main/Image/map.jpg","constant":true,"selective":true,"insertion_order":1,"enabled":false,"position":"before_char","use_regex":true,"extensions":{"position":0,"exclude_recursion":false,"display_index":901,"probability":100,"useProbability":true,"depth":4,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":29,"keys":["money","gold","silver","copper","coins"],"secondary_keys":[],"comment":"MoneySystem","content":"<MoneySystem>\\nv2.2\\nMoney Update Rule (MANDATORY | WITH CARRY | DO NOT OVERWRITE)\\nCurrency Conversion\\n- 100 Copper Coin = 1 Silver Coin\\n- 100 Silver Coin = 1 Gold Coin\\nCritical JSON Patch Rule\\n- Money is stored as inventory items with Type, Qty, and Desc fields.\\n- For money updates, ALWAYS read the current Qty values from <CURRENT_VARIABLE_DATA>, calculate the new totals, then use op:\\"replace\\" on the /Qty path.\\n- If a coin type does NOT exist in inventory, use op:\\"add\\" to create the full object with Type, Qty, and Desc.\\n- Never use op:\\"delta\\" for money updates.\\nRequired Procedure (must follow in this exact order)\\n1) Read current money (check if each exists in <CURRENT_VARIABLE_DATA>)\\n   Gold Coin = current(/Mainchar/Inventory/Gold Coin/Qty) default 0 if missing\\n   Silver Coin = current(/Mainchar/Inventory/Silver Coin/Qty) default 0 if missing\\n   Copper Coin = current(/Mainchar/Inventory/Copper Coin/Qty) default 0 if missing\\n2) Apply deltas\\n   Gold Coin += ΔGold\\n   Silver Coin += ΔSilver\\n   Copper Coin += ΔCopper\\n3) Normalize with carry / borrow\\n   Carry Up\\n   if Copper Coin ≥ 100:\\n     Silver Coin += floor(Copper Coin / 100)\\n     Copper Coin = Copper Coin % 100\\n   if Silver Coin ≥ 100:\\n     Gold Coin += floor(Silver Coin / 100)\\n     Silver Coin = Silver Coin % 100\\n   Borrow Down (for negative results)\\n   if Copper Coin < 0:\\n     borrowS = ceil(abs(Copper Coin) / 100)\\n     Silver Coin -= borrowS\\n     Copper Coin += 100 × borrowS\\n   if Silver Coin < 0:\\n     borrowG = ceil(abs(Silver Coin) / 100)\\n     Gold Coin -= borrowG\\n     Silver Coin += 100 × borrowG\\n4) Clamp Rule\\n- Total money MUST NOT become negative.\\n- If Gold Coin < 0 after normalization:\\n  either set Gold Coin = 0, Silver Coin = 0, Copper Coin = 0\\n  OR reject the transaction with \\"insufficient funds\\".\\n  Choose one policy and apply it consistently.\\n5) Output JSONPatch\\n- For EXISTING coin types (found in <CURRENT_VARIABLE_DATA>):\\n  Use op:\\"replace\\" at path \\"/Mainchar/Inventory/<Coin Name>/Qty\\" with the final normalized value.\\n  Example: {\\"op\\": \\"replace\\", \\"path\\": \\"/Mainchar/Inventory/Copper Coin/Qty\\", \\"value\\": 25}\\n- For NEW coin types (NOT found in <CURRENT_VARIABLE_DATA>):\\n  Use op:\\"add\\" at path \\"/Mainchar/Inventory/<Coin Name>\\" with a complete object.\\n  Example: {\\"op\\": \\"add\\", \\"path\\": \\"/Mainchar/Inventory/Copper Coin\\", \\"value\\": {\\"Type\\": \\"Money\\", \\"Qty\\": 25, \\"Desc\\": \\"Copper coins\\"}}\\n- If a coin's Qty becomes 0 after normalization, use op:\\"remove\\" at path \\"/Mainchar/Inventory/<Coin Name>\\" (remove entire item).\\n- Always update all modified coin types after normalization to maintain consistency.\\n- Never use op:\\"delta\\" for money updates.\\nMoney Integrity Rule\\n- Money values must always be integers.\\n- Fractions or decimal values are NOT allowed.\\nAudit Line (MANDATORY, inside <UpdateAnalysis> only)\\n- \\"Money calc: (G,S,C) old -> apply (ΔG,ΔS,ΔC) -> normalize -> (G,S,C) new\\"\\n</MoneySystem>","constant":true,"selective":true,"insertion_order":818,"enabled":true,"position":"after_char","use_regex":true,"extensions":{"position":4,"exclude_recursion":false,"display_index":32,"probability":100,"useProbability":true,"depth":0,"selectiveLogic":0,"outlet_name":"","group":"","group_override":false,"group_weight":100,"prevent_recursion":false,"delay_until_recursion":false,"scan_depth":null,"match_whole_words":null,"use_group_scoring":false,"case_sensitive":null,"automation_id":"","role":0,"vectorized":false,"sticky":0,"cooldown":0,"delay":0,"match_persona_description":false,"match_character_description":false,"match_character_personality":false,"match_character_depth_prompt":false,"match_scenario":false,"match_creator_notes":false,"triggers":[],"ignore_budget":false}},{"id":30,"keys":[],"secondary_keys":[],"comment":"Schema_Syntax","content":"<Schema_Syntax>\\n#v1.2\\n# If you make changes here, you need to make changes in Extension > Tavern Helper > Scripts > Scheme\\n\\n# ⚠️ TUPLE FORMAT RULES:\\n# Fields marked #tuple<type,string> MUST be arrays: [value, \\"Label\\"]\\n# - #tuple<string,string> → [\\"value\\", \\"Label\\"]  e.g. [\\"Engni\\", \\"Name\\"]\\n# - #tuple<number,string> → [123, \\"Label\\"]      e.g. [66, \\"Level\\"]\\n# - #tuple<boolean,string> → [true, \\"Label\\"]    e.g. [true, \\"Is Present\\"]\\n# When using JSONPatch \\"add\\" operation, ALL tuple fields MUST use array format, not plain values.\\n# ❌ WRONG: \\"Affection\\": 60\\n# ✅ RIGHT: \\"Affection\\": [60, \\"Affection\\"]\\n\\nWorld_Calc                           #object\\nWorld_Calc.(Factions,Locations,Ruins,Events)                    #record<string,any>\\nWorld_Calc.*                         #any (passthrough)\\n\\nWorld                                #object\\nWorld.(Date,Time,Location,Weather)   #tuple<string,string>\\n\\nMainchar                             #object\\nMainchar.(Name,Image,Race,Age,Gender,Occupation,Mental_state)              #tuple<string,string>\\nMainchar.(Level,Exp,Core-points,Strength,Agility,Constitution,\\nIntelligence,Wisdom,Charisma,Hp_curr,Hp_max,Mp_curr,Mp_max,\\nSta_curr,Sta_max,Physical_attack,Physical_defense,Magic_attack,\\nMagic_defense,Magic_assist)          #tuple<number,string>\\n\\nMainchar.Quests                      #record<string,object>\\nMainchar.Quests.{key}.(Desc,Difficulty,Reward,Status,LastUpdated) #string\\n\\nMainchar.Skills                      #record<string,object>\\nMainchar.Skills.{key}.Desc           #string\\nMainchar.Skills.{key}.*              #any (passthrough)\\n\\nMainchar.Equipment                   #record<string,object>\\nMainchar.Equipment.{key}.Type        #string\\nMainchar.Equipment.{key}.Qty         #number\\nMainchar.Equipment.{key}.Desc        #string\\nMainchar.Equipment.{key}.Rarity      #string\\nMainchar.Equipment.{key}.Slot        #string\\nMainchar.Equipment.{key}.EquipmentLevel #number\\nMainchar.Equipment.{key}.Appearance  #string\\nMainchar.Equipment.{key}.*           #any (passthrough)\\n\\nMainchar.Inventory                   #record<string,object>\\nMainchar.Inventory.{key}.Type        #string\\nMainchar.Inventory.{key}.Qty         #number\\nMainchar.Inventory.{key}.Desc        #string\\nMainchar.Inventory.{key}.*           #any (passthrough)\\n\\nMainchar.Talents                     #record<string,object>\\nMainchar.Talents.{key}.Desc          #string\\n\\nMainchar.Real_estate                 #object\\nMainchar.Real_estate.(Estates,Buildings,Assets)                 #record<string,any>\\nMainchar.Real_estate.*               #any (passthrough)\\n\\nMainchar.Buffs                       #record<string,object>\\nMainchar.Buffs.{key}.Desc            #string\\nMainchar.Buffs.{key}.*               #any (passthrough)\\n\\nMainchar.Ailments                    #record<string,object>\\nMainchar.Ailments.{key}.Desc         #string\\nMainchar.Ailments.{key}.*            #any (passthrough)\\n\\nMainchar.*                           #any (passthrough)\\n\\nFamiliar                             #record<string,object>\\nFamiliar.*                           #familiarMember object\\n\\nFamiliar.{name}.(Name,Race,Age,Gender,Identity,Occupation,Location,Height,\\nCup_Size,Body_Measurements,Hair_Style,Physical_Features,\\nPersonality,Image,Familiar_Status,ExSkill,Biography,Secret)    #tuple<string,string>\\n\\nFamiliar.{name}.(Level,Exp,Core-points,Hp_curr,Hp_max,Mp_curr,\\nMp_max,Sta_curr,Sta_max,Strength,Agility,Constitution,\\nIntelligence,Wisdom,Charisma,Physical_attack,Physical_defense,\\nMagic_attack,Magic_defense,Magic_assist,Affection,Lewdness,\\nControl_desire,M_level,Sex_count)   #tuple<number,string>\\n\\nFamiliar.{name}.(Is_in_battle_team,Is_present)                 #tuple<boolean,string>\\n\\nFamiliar.{name}.Equipment            #record<string,object>\\nFamiliar.{name}.Equipment.{key}.Type #string\\nFamiliar.{name}.Equipment.{key}.Qty  #number\\nFamiliar.{name}.Equipment.{key}.Desc #string\\nFamiliar.{name}.Equipment.{key}.Rarity #string\\nFamiliar.{name}.Equipment.{key}.Slot #string\\nFamiliar.{name}.Equipment.{key}.EquipmentLevel #number\\nFamiliar.{name}.Equipment.{key}.Appearance #string\\nFamiliar.{name}.Equipment.{key}.*    #any (passthrough)\\n\\nFamiliar.{name}.*                    #tuple<string|number|boolean|null|array|object,string> (ca
